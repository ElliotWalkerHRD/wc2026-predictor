<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=50">
  <style>
    .round-entry-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--grey-300);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      transition: background 0.2s;
    }
    .round-entry-card:hover::before { background: var(--ink); }
    .round-entry-card.complete::before { background: var(--green); }

    /* ---- Lock pills ---- */
    .lock-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      border-radius: 9999px;
      padding: 0.35rem 0.85rem 0.35rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
      margin: 0.375rem 0 0.625rem;
    }
    .lock-pill > i { font-size: 1rem; flex-shrink: 0; }
    .lock-pill--open     { background: rgba(200,241,53,0.18); color: #5c7000; border: 1px solid rgba(200,241,53,0.45); }
    .lock-pill--locked   { background: var(--grey-100); color: var(--grey-500); border: 1px solid var(--grey-200); }
    .lock-pill--upcoming { background: var(--grey-50,#f9f9f9); color: var(--grey-400); border: 1px solid var(--grey-200); }
    .lock-pill-status { display: block; }
    .lock-pill-detail { display: block; font-size: 0.68rem; font-weight: 400; opacity: 0.8; margin-top: 0.1rem; }

    @keyframes lockPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(200,241,53,0.55); }
      50%       { opacity: 0.82; box-shadow: 0 0 0 5px rgba(200,241,53,0); }
    }
    .lock-pill--open.urgent { animation: lockPulse 1.8s ease-in-out infinite; }
    .round-card.not-yet { opacity: 0.6; cursor: default; pointer-events: none; }
  </style>
</head>
<body>
  <style>
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #f9f9f8;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .placeholder-card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 2.75rem 2.25rem;
      text-align: center;
    }
    .placeholder-icon { font-size: 2.5rem; color: #e8b923; margin-bottom: 1rem; }
    .placeholder-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .placeholder-card p { color: #6b7280; font-size: 0.92rem; line-height: 1.6; margin: 0 0 1.5rem; }
    .placeholder-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d0d0d;
      color: #c8f135;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
    }
  </style>
  <div class="placeholder-card">
    <div class="placeholder-icon"><i class="ti ti-trophy"></i></div>
    <h1>Tournament complete</h1>
    <p>The WC2026 Prediction Game has finished and this page is no longer active. Final results are on the home page.</p>
    <a href="../index.html"><i class="ti ti-arrow-left"></i> Back to results</a>
  </div>
</body>
</html>
