<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { background: var(--bg); }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo a {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 2rem;
      color: var(--ink);
      text-decoration: none;
    }

    .auth-logo a .lime { color: #5a6e00; }

    .auth-logo p {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--grey-400);
      margin-top: 0.25rem;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-lg);
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 1.75rem;
    }

    .auth-tab {
      flex: 1;
      padding: 0.6rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--grey-400);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1.5px;
    }

    .auth-tab.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .form-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--grey-400);
    }

    .invite-notice {
      background: rgba(200,241,53,0.1);
      border: 1px solid rgba(200,241,53,0.35);
      border-radius: var(--radius-md);
      padding: 0.875rem;
      font-size: 0.82rem;
      color: var(--grey-700);
      margin-bottom: 1.25rem;
      line-height: 1.5;
      display: flex;
      gap: 0.5rem;
    }

    .invite-notice i { flex-shrink: 0; margin-top: 0.1rem; color: #5a6e00; }

    .color-picker-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--grey-700);
      margin-bottom: 0.5rem;
      display: block;
    }

    .color-swatches {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: all 0.15s;
    }

    .color-swatch.selected {
      border-color: var(--ink);
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="../index.html"><span class="lime">WC</span> 2026</a>
        <p>World Cup Prediction Game</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="signin">Sign In</button>
          <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>

        <!-- Sign In -->
        <div class="auth-panel active" id="panel-signin">
          <div id="signinAlert"></div>
          <div class="form-group">
            <label class="form-label" for="siEmail">Email</label>
            <input class="form-control" type="email" id="siEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="siPassword">Password</label>
            <input class="form-control" type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="btn btn-lime btn-block btn-lg" id="signinBtn">
            Sign In <i class="ti ti-arrow-right"></i>
          </button>
        </div>

        <!-- Sign Up -->
        <div class="auth-panel" id="panel-signup">
          <div class="invite-notice">
            <i class="ti ti-lock"></i>
            <span><strong>Invite only.</strong> You need an invite code from the group admin to join.</span>
          </div>
          <div id="signupAlert"></div>
          <div class="form-group">
            <label class="form-label" for="suInvite">Invite Code</label>
            <input class="form-control" type="text" id="suInvite" placeholder="e.g. AB12CD" autocomplete="off" style="text-transform:uppercase;letter-spacing:0.1em">
          </div>
          <div class="form-group">
            <label class="form-label" for="suName">Display Name</label>
            <input class="form-control" type="text" id="suName" placeholder="Your name (shown to all players)" maxlength="24">
          </div>
          <div class="form-group">
            <label class="form-label" for="suEmail">Email</label>
            <input class="form-control" type="email" id="suEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="suPassword">Password</label>
            <input class="form-control" type="password" id="suPassword" placeholder="Min. 8 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <span class="color-picker-label">Choose avatar colour</span>
            <div class="color-swatches" id="colorSwatches"></div>
            <input type="hidden" id="suColor" value="#c8f135">
          </div>
          <button class="btn btn-lime btn-block btn-lg" id="signupBtn">
            Create Account <i class="ti ti-arrow-right"></i>
          </button>
          <div class="form-footer mt-2">
            By signing up you agree to have fun and accept all controversial referee decisions.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/scoring.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    DB.initSupabase();

    (async () => {
      const session = await DB.getSession();
      if (session) window.location.href = '../index.html';
    })();

    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    const swatchContainer = document.getElementById('colorSwatches');
    const colorInput = document.getElementById('suColor');
    AVATAR_COLORS.forEach(color => {
      const s = document.createElement('div');
      s.className = 'color-swatch' + (color === '#c8f135' ? ' selected' : '');
      s.style.background = color;
      s.title = color;
      s.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
        s.classList.add('selected');
        colorInput.value = color;
      });
      swatchContainer.appendChild(s);
    });

    const params = new URLSearchParams(window.location.search);
    if (params.get('invite')) {
      document.getElementById('suInvite').value = params.get('invite').toUpperCase();
      document.querySelector('[data-tab="signup"]').click();
    }

    function showAlert(id, message, type = 'error') {
      const icon = type === 'error' ? 'ti-alert-triangle' : type === 'success' ? 'ti-check' : 'ti-info-circle';
      document.getElementById(id).innerHTML = `<div class="alert alert-${type}"><i class="ti ${icon}"></i>${message}</div>`;
    }
    function clearAlert(id) { document.getElementById(id).innerHTML = ''; }

    document.getElementById('signinBtn').addEventListener('click', async () => {
      clearAlert('signinAlert');
      const email    = document.getElementById('siEmail').value.trim();
      const password = document.getElementById('siPassword').value;
      if (!email || !password) return showAlert('signinAlert', 'Please fill in all fields.');
      const btn = document.getElementById('signinBtn');
      btn.disabled = true;
      btn.innerHTML = 'Signing in&hellip;';
      try {
        await DB.signIn(email, password);
        window.location.href = '../index.html';
      } catch (err) {
        showAlert('signinAlert', err.message || 'Sign-in failed. Check your credentials.');
        btn.disabled = false;
        btn.innerHTML = 'Sign In <i class="ti ti-arrow-right"></i>';
      }
    });

    document.getElementById('signupBtn').addEventListener('click', async () => {
      clearAlert('signupAlert');
      const invite   = document.getElementById('suInvite').value.trim().toUpperCase();
      const name     = document.getElementById('suName').value.trim();
      const email    = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPassword').value;
      const color    = document.getElementById('suColor').value;

      if (!invite)  return showAlert('signupAlert', 'Please enter your invite code.');
      if (!name)    return showAlert('signupAlert', 'Please enter a display name.');
      if (!email)   return showAlert('signupAlert', 'Please enter your email.');
      if (password.length < 8) return showAlert('signupAlert', 'Password must be at least 8 characters.');

      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.innerHTML = 'Creating account&hellip;';

      try {
        const valid = await DB.validateInviteCode(invite);
        if (!valid) {
          showAlert('signupAlert', 'Invalid or expired invite code. Ask the admin for a fresh one.');
          btn.disabled = false;
          btn.innerHTML = 'Create Account <i class="ti ti-arrow-right"></i>';
          return;
        }

        await DB.signUp(email, password, name);

        try {
          const { data } = await DB.signIn(email, password);
          if (data?.user) {
            await DB.upsertProfile(data.user.id, {
              display_name: name,
              avatar_color: color,
              invite_code_used: invite
            });
          }
        } catch (_) {}

        showAlert('signupAlert', 'Account created! Check your email to confirm, then sign in.', 'success');
        btn.innerHTML = 'Account Created!';
      } catch (err) {
        showAlert('signupAlert', err.message || 'Sign-up failed. Please try again.');
        btn.disabled = false;
        btn.innerHTML = 'Create Account <i class="ti ti-arrow-right"></i>';
      }
    });

    ['siEmail','siPassword'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('signinBtn').click();
      });
    });
  </script>
</body>
</html>
