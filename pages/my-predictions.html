<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — My Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .round-tabs {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 1.75rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .round-tab-btn {
      position: relative;
      padding: 0.55rem 0.875rem;
      background: transparent;
      border: none;
      border-bottom: 2.5px solid transparent;
      color: var(--grey-500);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      margin-bottom: -1.5px;
      transition: color 0.15s;
    }

    .round-tab-btn:hover { color: var(--ink); }
    .round-tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

    .tab-pts {
      position: absolute;
      top: 3px;
      right: 2px;
      background: var(--lime);
      color: var(--ink);
      border-radius: 10px;
      font-size: 0.5rem;
      padding: 0 4px;
      font-weight: 700;
      line-height: 1.5;
    }

    .round-panel { display: none; }
    .round-panel.active { display: block; }

    .pred-item {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 0.625rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
    }

    .pred-question {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--grey-500);
      margin-bottom: 0.3rem;
    }

    .pred-answer { font-size: 0.95rem; font-weight: 600; color: var(--ink); }

    .pred-pts { text-align: right; }
    .pts-number { font-family: var(--font-serif); font-size: 1.5rem; line-height: 1; }
    .pts-number.positive { color: var(--green); }
    .pts-number.zero { color: var(--grey-300); }
    .pts-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-400); margin-top: 0.15rem; }

    .round-total-bar {
      background: var(--grey-100);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-md);
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .round-total-label { font-size: 0.8rem; font-weight: 600; color: var(--grey-500); }
    .round-total-pts { font-family: var(--font-serif); font-size: 1.6rem; color: var(--ink); }

    .match-pred-row {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      padding: 0.875rem 1.25rem;
      margin-bottom: 0.5rem;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
    }

    .match-pred-row.exact { border-color: var(--green); }
    .match-pred-row.result { border-color: var(--lime-dark); }
    .match-pred-row.wrong { border-color: var(--red); }

    .match-pred-teams { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 600; flex-wrap: wrap; }

    .match-pred-score { font-family: var(--font-serif); font-size: 1.1rem; text-align: center; color: var(--grey-500); }
    .match-pred-score.exact { color: var(--green); }
    .match-pred-score.result { color: var(--lime-dark); }
    .match-pred-score.wrong { color: var(--red); }

    .empty-round {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--grey-400);
    }

    .empty-round a { color: var(--ink); font-weight: 600; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <span>My Predictions</span></nav>
      <h1 class="page-title">My Picks</h1>
      <p class="page-desc">All your predictions &middot; Correct/incorrect indicators &middot; Points earned</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem">

      <div class="stats-strip mb-4" id="summaryStrip">
        <div class="stat-box">
          <div class="stat-value" id="sumTotal">—</div>
          <div class="stat-label">Total Points</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="sumRank">—</div>
          <div class="stat-label">Rank</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="sumCorrect">—</div>
          <div class="stat-label">Correct Results</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="sumExact">—</div>
          <div class="stat-label">Exact Scores</div>
        </div>
      </div>

      <div class="round-tabs" id="roundTabs"></div>

      <div id="roundPanels">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/scoring.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    DB.initSupabase();
    Nav.render('mypreds');

    let activeRound = 'round1';
    let allPreds = {};
    let allResults = {};
    let userScore = null;
    let scores = [];
    let userId = null;

    async function load() {
      const session = await requireAuthFromPages();
      if (!session) return;
      userId = session.user.id;

      const [preds, results, uScore, allScores] = await Promise.all([
        DB.getUserPredictions(userId).catch(() => []),
        DB.getMatchResults().catch(() => []),
        DB.getUserScore(userId).catch(() => null),
        DB.getScores().catch(() => [])
      ]);

      results.forEach(r => { allResults[r.match_id] = r; });
      userScore = uScore;
      scores = allScores;

      preds.forEach(p => {
        if (!allPreds[p.round]) allPreds[p.round] = [];
        allPreds[p.round].push(p);
      });

      if (userScore) {
        document.getElementById('sumTotal').textContent = userScore.total_points || 0;
        const rank = scores.findIndex(s => s.user_id === userId) + 1;
        document.getElementById('sumRank').textContent = rank > 0 ? `#${rank}` : '—';
      }

      let totalCorrect = 0, totalExact = 0;
      preds.forEach(p => {
        if (!p.question_key.startsWith('m')) return;
        const matchId = parseInt(p.question_key.slice(1));
        const result = allResults[matchId];
        if (!result || result.home_score === null) return;
        let val;
        try { val = JSON.parse(p.value); } catch { return; }
        if (val.home === result.home_score && val.away === result.away_score) {
          totalExact++; totalCorrect++;
        } else if (Math.sign(val.home - val.away) === Math.sign(result.home_score - result.away_score)) {
          totalCorrect++;
        }
      });
      document.getElementById('sumCorrect').textContent = totalCorrect;
      document.getElementById('sumExact').textContent = totalExact;

      renderTabs();
      renderActivePanel();
    }

    const ROUNDS_INFO = [
      { id: 'round1', label: 'Pre-Tournament', icon: 'ti-sparkles' },
      { id: 'round2', label: 'Group Winners',  icon: 'ti-medal' },
      { id: 'round3', label: 'Group Scores',   icon: 'ti-ball-football' },
      { id: 'round4', label: 'Round of 32',    icon: 'ti-tournament' },
      { id: 'round5', label: 'Round of 16',    icon: 'ti-tournament' },
      { id: 'round6', label: 'Quarter Finals', icon: 'ti-tournament' },
      { id: 'round7', label: 'Semi Finals',    icon: 'ti-star' },
      { id: 'round8', label: 'Final',          icon: 'ti-trophy' },
    ];

    function renderTabs() {
      const tabsEl = document.getElementById('roundTabs');
      tabsEl.innerHTML = ROUNDS_INFO.map(r => {
        const pts = userScore?.[r.id + '_points'];
        return `
          <button class="round-tab-btn ${r.id === activeRound ? 'active' : ''}" data-round="${r.id}">
            <i class="ti ${r.icon}" style="font-size:0.85rem;margin-right:0.25rem"></i>${r.label}
            ${pts ? `<span class="tab-pts">${pts}</span>` : ''}
          </button>
        `;
      }).join('');

      tabsEl.querySelectorAll('.round-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeRound = btn.dataset.round;
          tabsEl.querySelectorAll('.round-tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderActivePanel();
        });
      });
    }

    function renderActivePanel() {
      const panel = document.getElementById('roundPanels');
      const preds = allPreds[activeRound] || [];

      if (!preds.length) {
        panel.innerHTML = `
          <div class="empty-round">
            <i class="ti ti-inbox" style="font-size:2.5rem;color:var(--grey-300);display:block;margin-bottom:1rem"></i>
            <p style="font-weight:600;color:var(--grey-500)">No predictions submitted for this round yet.</p>
            <p style="margin-top:0.5rem;font-size:0.875rem">
              <a href="${activeRound}.html"><i class="ti ti-arrow-right"></i> Go make your predictions</a>
            </p>
          </div>
        `;
        return;
      }

      const pts = userScore?.[activeRound + '_points'];
      const totalBar = `
        <div class="round-total-bar">
          <span class="round-total-label"><i class="ti ti-chart-bar" style="margin-right:0.35rem"></i>Round Points</span>
          <span class="round-total-pts">${pts !== undefined && pts !== null ? pts : '—'}</span>
        </div>
      `;

      let content = '';
      if (activeRound === 'round1') content = renderRound1Panel(preds);
      else if (activeRound === 'round2') content = renderRound2Panel(preds);
      else content = renderScorePanel(preds, activeRound);

      panel.innerHTML = totalBar + content;
    }

    function renderRound1Panel(preds) {
      const R1_LABELS = {
        '1.1':  'Tournament winner',
        '1.2':  'Runner-up',
        '1.3a': 'Beaten semi-finalist #1',
        '1.3b': 'Beaten semi-finalist #2',
        '1.4':  'England top scorer',
        '1.5':  'England top scorer goals',
        '1.6':  'Golden boot winner',
        '1.7':  'Golden boot goals',
        '1.8':  'Host nations group goals',
        '1.9':  'Most goals: ENG/FRA/BRA/ARG',
        '1.10': 'Group stage red cards',
        '1.11': 'Group stage total goals',
        '1.12': 'Hardest group',
      };

      return preds.map(p => {
        let val;
        try { val = JSON.parse(p.value); } catch { val = p.value; }
        let displayVal = val;
        if (['1.1','1.2','1.3a','1.3b','1.9'].includes(p.question_key)) {
          const t = getTeam(val);
          displayVal = t ? `${teamFlagImg(val)} ${t.name}` : val;
        }

        return `
          <div class="pred-item">
            <div>
              <div class="pred-question">${R1_LABELS[p.question_key] || p.question_key}</div>
              <div class="pred-answer">${displayVal}</div>
            </div>
            <div class="pred-pts">
              <div class="pts-number zero">?</div>
              <div class="pts-label">pts</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderRound2Panel(preds) {
      const grouped = {};
      preds.forEach(p => {
        const match = p.question_key.match(/^2\.(w|r)\.([A-L])$/);
        if (!match) return;
        const [, pos, g] = match;
        if (!grouped[g]) grouped[g] = {};
        grouped[g][pos] = p.value.replace(/"/g,'');
      });

      return Object.entries(grouped).map(([g, gPreds]) => {
        const winner = gPreds.w ? getTeam(gPreds.w) : null;
        const runner = gPreds.r ? getTeam(gPreds.r) : null;
        return `
          <div class="pred-item">
            <div>
              <div class="pred-question">Group ${g}</div>
              <div class="pred-answer">
                <i class="ti ti-trophy" style="color:var(--lime-dark);font-size:0.9rem"></i>
                ${winner ? `${teamFlagImg(gPreds.w)} ${winner.name}` : '—'}
                &nbsp;&middot;&nbsp;
                <i class="ti ti-medal" style="color:var(--grey-400);font-size:0.9rem"></i>
                ${runner ? `${teamFlagImg(gPreds.r)} ${runner.name}` : '—'}
              </div>
            </div>
            <div class="pred-pts">
              <div class="pts-number zero">?</div>
              <div class="pts-label">pts</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderScorePanel(preds, round) {
      const isFinale = round === 'round8';
      const exactPts = isFinale ? 10 : 7;
      const resultPts = isFinale ? 7 : 5;

      return preds.map(p => {
        if (!p.question_key.startsWith('m')) return '';
        const matchId = parseInt(p.question_key.slice(1));
        let val;
        try { val = JSON.parse(p.value); } catch { return ''; }

        const result = allResults[matchId];
        const hasResult = result && result.home_score !== null;

        const fixture = GROUP_FIXTURES.find(f => f[0] === matchId);
        let homeTeam, awayTeam;
        if (fixture) {
          homeTeam = getTeam(fixture[4]);
          awayTeam = getTeam(fixture[5]);
        } else {
          homeTeam = { code: 'TBD', name: 'TBD' };
          awayTeam = { code: 'TBD', name: 'TBD' };
        }

        let pts = 0, scoreClass = '', indicator = '';
        if (hasResult) {
          const actH = result.home_score, actA = result.away_score;
          if (val.home === actH && val.away === actA) {
            pts = exactPts; scoreClass = 'exact'; indicator = 'Exact';
          } else if (Math.sign(val.home - val.away) === Math.sign(actH - actA)) {
            pts = resultPts; scoreClass = 'result'; indicator = 'Result';
          } else {
            pts = 0; scoreClass = 'wrong'; indicator = 'Wrong';
          }
        }

        return `
          <div class="match-pred-row ${scoreClass}">
            <div class="match-pred-teams">
              <span>${teamFlagImg(homeTeam.code)} ${homeTeam.name}</span>
              <span style="color:var(--grey-400)">vs</span>
              <span>${teamFlagImg(awayTeam.code)} ${awayTeam.name}</span>
            </div>
            <div class="match-pred-score ${scoreClass}">
              ${val.home} – ${val.away}
              ${hasResult ? `<div style="font-size:0.65rem;margin-top:0.15rem">${indicator}</div>` : ''}
              ${hasResult ? `<div style="font-size:0.65rem;color:var(--grey-400)">Actual: ${result.home_score}–${result.away_score}</div>` : ''}
            </div>
            <div class="pred-pts" style="min-width:40px">
              <div class="pts-number ${pts > 0 ? 'positive' : 'zero'}">${hasResult ? pts : '?'}</div>
              <div class="pts-label">pts</div>
            </div>
          </div>
        `;
      }).join('');
    }

    DB.subscribeToMatchResults(() => {
      DB.getMatchResults().then(r => {
        allResults = {};
        r.forEach(res => { allResults[res.match_id] = res; });
        renderActivePanel();
      });
    });

    load();
  </script>
</body>
</html>
