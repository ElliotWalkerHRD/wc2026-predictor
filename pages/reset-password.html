<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=50">
  <style>
    body { background: var(--bg); }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo a {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 2rem;
      color: var(--ink);
      text-decoration: none;
    }

    .auth-logo a .lime { color: #5a6e00; }

    .auth-logo p {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--grey-400);
      margin-top: 0.25rem;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-lg);
    }

    .auth-card-title {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      margin: 0 0 0.35rem;
    }

    .auth-card-desc {
      font-size: 0.875rem;
      color: var(--grey-500);
      margin: 0 0 1.5rem;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 0;
      color: var(--grey-400);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <style>
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #f9f9f8;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .placeholder-card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 2.75rem 2.25rem;
      text-align: center;
    }
    .placeholder-icon { font-size: 2.5rem; color: #e8b923; margin-bottom: 1rem; }
    .placeholder-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .placeholder-card p { color: #6b7280; font-size: 0.92rem; line-height: 1.6; margin: 0 0 1.5rem; }
    .placeholder-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d0d0d;
      color: #c8f135;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
    }
  </style>
  <div class="placeholder-card">
    <div class="placeholder-icon"><i class="ti ti-trophy"></i></div>
    <h1>Tournament complete</h1>
    <p>The WC2026 Prediction Game has finished and this page is no longer active. Final results are on the home page.</p>
    <a href="../index.html"><i class="ti ti-arrow-left"></i> Back to results</a>
  </div>
</body>
</html>
