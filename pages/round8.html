<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Knockout Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=31">
  <style>
    .ko-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .ko-match-label { flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--grey-400); }
    .ko-teams-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .ko-team {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .ko-team.away { flex-direction: row-reverse; text-align: right; }
    .ko-team > span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ko-team-flag { font-size: 1.3rem; }
    .ko-score-inputs {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      justify-content: center;
      flex-shrink: 0;
    }
    .score-num {
      width: 46px;
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      padding: 0.3rem;
      border: 1.5px solid var(--grey-300);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .score-num:focus { border-color: var(--ink); }
    .score-num:disabled { background: var(--grey-100); color: var(--grey-400); }
    .score-sep { font-size: 1.2rem; color: var(--grey-400); }
    .ko-result {
      text-align: center;
      font-size: 0.72rem;
      color: var(--grey-500);
      margin-top: 0.4rem;
      font-weight: 500;
    }
    .tbd-notice {
      text-align: center;
      padding: 0.875rem 0.5rem;
      font-size: 0.82rem;
      color: var(--grey-400);
    }
    /* ---- View picks button ---- */
    .view-picks-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.35rem;
      width: 100%; margin-top: 0.5rem; padding: 0.35rem;
      background: none; border: 1px solid var(--grey-200);
      border-radius: var(--radius-md);
      font-size: 0.72rem; font-weight: 600; color: var(--grey-500);
      cursor: pointer; transition: background 0.12s, color 0.12s;
    }
    .view-picks-btn:hover { background: var(--grey-100); color: var(--ink); }
    /* ---- Pick comparison modal ---- */
    .pred-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 1000; display: flex; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(2px);
    }
    @media (min-width: 560px) { .pred-modal-overlay { align-items: center; padding: 1.5rem; } }
    .pred-modal-panel {
      background: var(--white); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; max-height: 85vh; overflow: hidden;
      display: flex; flex-direction: column; box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
    }
    @media (min-width: 560px) { .pred-modal-panel { border-radius: var(--radius-lg); max-width: 460px; max-height: 80vh; } }
    .pred-modal-header {
      position: relative; padding: 1rem 3rem 0.875rem 1.25rem;
      border-bottom: 1px solid var(--grey-200); flex-shrink: 0;
    }
    .pred-modal-teams {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.92rem; font-weight: 700; margin-bottom: 0.25rem;
    }
    .pred-modal-meta { font-size: 0.72rem; color: var(--grey-500); margin-top: 0.15rem; }
    .pred-modal-close {
      position: absolute; top: 0.875rem; right: 1rem;
      background: none; border: none; cursor: pointer; color: var(--grey-500);
      padding: 0.25rem; border-radius: var(--radius-sm); font-size: 1.1rem; line-height: 1;
    }
    .pred-modal-close:hover { background: var(--grey-100); }
    .pred-modal-league-bar {
      padding: 0.5rem 1.25rem; border-bottom: 1px solid var(--grey-100);
      flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem;
    }
    .pred-modal-body { overflow-y: auto; flex: 1; }
    .player-pred-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 1.25rem; border-bottom: 1px solid var(--grey-100);
    }
    .player-pred-row:last-child { border-bottom: none; }
    .player-pred-row.is-you { background: rgba(200,241,53,0.08); }
    .player-pred-name {
      flex: 1; font-size: 0.875rem; font-weight: 600;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .player-pred-score { font-family: var(--font-serif); font-size: 1.05rem; color: var(--ink); flex-shrink: 0; min-width: 44px; text-align: center; }
    .player-pred-score.no-pred { font-family: var(--font-sans); font-size: 0.75rem; color: var(--grey-400); font-weight: 400; }
    .pred-chip { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em; padding: 0.12rem 0.42rem; border-radius: 9999px; flex-shrink: 0; }
    .pred-chip.exact  { background: rgba(34,197,94,0.15); color: #15803d; }
    .pred-chip.result { background: rgba(200,241,53,0.3); color: #5c7000; }
    .pred-chip.wrong  { background: rgba(239,68,68,0.12); color: #b91c1c; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <a href="predictions.html">Predictions</a> &rsaquo; <span id="breadcrumbRound">Knockout</span></nav>
      <h1 class="page-title" id="pageTitle">Knockout Stage</h1>
      <p class="page-desc" id="pageSubtitle">Loading&hellip;</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:6rem">

      <div id="lockedBanner" class="alert alert-info hidden mb-3">
        <i class="ti ti-lock"></i> This round is locked. Your predictions are saved and can no longer be edited.
      </div>

      <div class="info-box mb-3" id="scoringNote">
        <strong>Scoring:</strong> 7 pts for exact score &middot; 5 pts for correct result
      </div>

      <div class="knockout-grid" id="matchesContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

      <div class="sticky-dock" id="stickySave" style="display:none">
        <div class="sticky-dock-inner">
          <div class="dock-status" id="saveStatus">Make your predictions</div>
          <div class="dock-actions">
            <a href="predictions.html" class="btn btn-ghost btn-sm"><i class="ti ti-arrow-left"></i> Back</a>
            <button class="btn btn-lime" id="saveBtn"><i class="ti ti-device-floppy"></i> Save Predictions</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=31"></script>
  <script src="../js/data.js?v=31"></script>
  <script src="../js/supabase-client.js?v=45"></script>
  <script src="../js/scoring.js?v=31"></script>
  <script src="../js/ui.js?v=31"></script>
  <script>
    DB.initSupabase();
    Nav.render('predictions');

    const filename = window.location.pathname.split('/').pop().replace('.html','');
    const ROUND_MAP = {
      round4: { id:'round4', name:'Round of 32',    roundKey:'round32',      exactPts:7,  resultPts:5 },
      round5: { id:'round5', name:'Round of 16',    roundKey:'round16',      exactPts:7,  resultPts:5 },
      round6: { id:'round6', name:'Quarter Finals', roundKey:'quarterfinals',exactPts:7,  resultPts:5 },
      round7: { id:'round7', name:'Semi Finals',    roundKey:'semifinals',   exactPts:7,  resultPts:5 },
      round8: { id:'round8', name:'The Final',      roundKey:'final',        exactPts:10, resultPts:7 },
    };

    const roundMeta = ROUND_MAP[filename] || ROUND_MAP.round4;
    const { id: roundId, name: roundName, roundKey, exactPts, resultPts } = roundMeta;

    document.getElementById('breadcrumbRound').textContent = roundName;
    document.getElementById('pageTitle').textContent = roundName;
    document.getElementById('scoringNote').innerHTML =
      `<strong>Scoring:</strong> <strong>${exactPts} pts</strong> for exact score &middot; <strong>${resultPts} pts</strong> for correct result`;

    const roundData = KNOCKOUT_ROUNDS[roundKey];
    if (roundData) {
      document.getElementById('pageSubtitle').innerHTML =
        `${roundData.matches.length} matches &middot; Up to ${roundData.matches.length * exactPts} pts`;
    }

    let userId = null;
    let saved = {};
    let results = {};
    let locked = false;
    let leagues          = [];
    let activePredLeague = 'global';
    let memberCache      = {};
    let profileCache     = {};

    function getMatchKey(id) { return `m${id}`; }

    async function load() {
      const session = await requireAuthFromPages();
      if (!session) return;
      userId = session.user.id;

      leagues = await DB.getMyLeagues(userId).catch(() => []);

      await DB.initRoundOverrides();
      locked = DB.isRoundLocked(roundId);
      if (locked) document.getElementById('lockedBanner').classList.remove('hidden');
      else document.getElementById('stickySave').style.display = 'block';

      const [preds, matchResults] = await Promise.all([
        DB.getUserPredictions(userId, roundId).catch(() => []),
        DB.getMatchResults().catch(() => [])
      ]);

      preds.forEach(p => {
        try { saved[p.question_key] = JSON.parse(p.value); }
        catch { saved[p.question_key] = p.value; }
      });

      matchResults.forEach(r => { results[r.match_id] = r; });
      DB.patchKnockoutBracket(matchResults);
      renderMatches();
    }

    function renderMatches() {
      const container = document.getElementById('matchesContent');
      if (!roundData) { container.innerHTML = '<p class="text-muted">No matches found.</p>'; return; }

      container.innerHTML = roundData.matches.map(m => {
        const result  = results[m.id];
        const pred    = saved[getMatchKey(m.id)] || {};
        const homeVal = pred.home !== undefined ? pred.home : '';
        const awayVal = pred.away !== undefined ? pred.away : '';

        const homeTeam = m.home_team ? getTeam(m.home_team) : null;
        const awayTeam = m.away_team ? getTeam(m.away_team) : null;
        const hasTeams  = homeTeam && awayTeam;
        const hasResult = result && result.home_score !== null;

        let teamRowHtml = '';
        if (hasTeams) {
          teamRowHtml = `
            <div class="ko-teams-row">
              <div class="ko-team">
                ${teamFlagImg(homeTeam.code)}
                <span>${homeTeam.name}</span>
              </div>
              <div class="ko-score-inputs">
                <input type="number" id="h_${m.id}" class="score-num" min="0" max="20"
                  inputmode="numeric" pattern="[0-9]*"
                  value="${homeVal}" placeholder="0" ${locked ? 'disabled' : ''}>
                <span class="score-sep">–</span>
                <input type="number" id="a_${m.id}" class="score-num" min="0" max="20"
                  inputmode="numeric" pattern="[0-9]*"
                  value="${awayVal}" placeholder="0" ${locked ? 'disabled' : ''}>
              </div>
              <div class="ko-team away">
                ${teamFlagImg(awayTeam.code)}
                <span>${awayTeam.name}</span>
              </div>
            </div>
          `;
        } else {
          teamRowHtml = `
            <div class="tbd-notice">
              <i class="ti ti-clock"></i> Teams TBD — ${m.note || 'Drawn once qualified'}
              ${!locked ? `
                <div class="ko-score-inputs" style="justify-content:center;margin-top:0.625rem">
                  <input type="number" id="h_${m.id}" class="score-num" min="0" max="20"
                    inputmode="numeric" pattern="[0-9]*"
                    value="${homeVal}" placeholder="–" style="opacity:0.5">
                  <span class="score-sep">–</span>
                  <input type="number" id="a_${m.id}" class="score-num" min="0" max="20"
                    inputmode="numeric" pattern="[0-9]*"
                    value="${awayVal}" placeholder="–" style="opacity:0.5">
                </div>
                <small style="font-size:0.68rem;color:var(--grey-400)">You can enter score now or wait</small>
              ` : ''}
            </div>
          `;
        }

        let resultHtml = '';
        if (hasResult && homeVal !== '' && awayVal !== '') {
          const actH = result.home_score, actA = result.away_score;
          const pH = parseInt(homeVal), pA = parseInt(awayVal);
          let pts = 0, label = '<i class="ti ti-x"></i> Wrong';
          if (!isNaN(pH) && !isNaN(pA)) {
            if (pH === actH && pA === actA) { pts = exactPts; label = '<i class="ti ti-check"></i> Exact!'; }
            else if (Math.sign(pH - pA) === Math.sign(actH - actA)) { pts = resultPts; label = '<i class="ti ti-check"></i> Result'; }
          }
          resultHtml = `
            <div class="ko-result">
              Result: <strong>${actH}–${actA}</strong>
              ${pts > 0
                ? `<span style="color:var(--green);margin-left:0.4rem">+${pts} pts &middot; ${label}</span>`
                : `<span style="color:var(--red);margin-left:0.4rem">${label}</span>`}
            </div>
          `;
        } else if (hasResult) {
          resultHtml = `<div class="ko-result">Result: <strong>${result.home_score}–${result.away_score}</strong></div>`;
        }

        return `
          <div class="ko-card ${!hasTeams && !locked ? 'tbd' : ''}">
            <div class="ko-card-top">
              <span class="ko-match-label">${m.match_label} &middot; ${formatDate(m.date || '2026-07-01')}</span>
              ${hasResult ? '<span class="finished-badge">Final</span>' : '<span class="chip chip-grey">Upcoming</span>'}
            </div>
            ${teamRowHtml}
            ${resultHtml}
            ${locked ? `<button class="view-picks-btn" data-match="${m.id}"><i class="ti ti-eye"></i> See picks</button>` : ''}
          </div>
        `;
      }).join('');
    }

    async function openMatchModal(matchId) {
      const m = roundData?.matches?.find(m => m.id === matchId);
      const dbRes = results[matchId];
      const homeCode = m?.home_team || dbRes?.home_team || null;
      const awayCode = m?.away_team || dbRes?.away_team || null;
      const home = homeCode ? (getTeam(homeCode) || { name: homeCode }) : { name: 'TBD' };
      const away = awayCode ? (getTeam(awayCode) || { name: awayCode }) : { name: 'TBD' };
      const result = results[matchId];
      const hasResult = result && result.home_score !== null;

      const privateLeagues = leagues.filter(l => !l.is_global);
      const leagueBarHtml = privateLeagues.length ? `
        <div class="pred-modal-league-bar">
          <i class="ti ti-users-group" style="color:var(--grey-400)"></i>
          <select id="modalLeaguePicker" class="form-control" style="min-width:160px;max-width:240px;font-size:0.82rem;padding:0.25rem 0.6rem;height:auto">
            <option value="global">All Players</option>
            ${privateLeagues.map(l =>
              `<option value="${l.id}" ${activePredLeague === l.id ? 'selected' : ''}>${l.name}</option>`
            ).join('')}
          </select>
        </div>
      ` : '';

      document.getElementById('pickModal').innerHTML = `
        <div class="pred-modal-overlay" id="modalOverlay">
          <div class="pred-modal-panel" role="dialog" aria-modal="true">
            <div class="pred-modal-header">
              <div class="pred-modal-teams">
                ${homeCode ? teamFlagImg(homeCode) : ''}
                <span>${home.name}</span>
                <span style="color:var(--grey-400);font-weight:400;font-size:0.8rem;margin:0 0.1rem">vs</span>
                <span>${away.name}</span>
                ${awayCode ? teamFlagImg(awayCode) : ''}
              </div>
              <div class="pred-modal-meta">${m?.match_label || `Match ${matchId}`}${m?.date ? ' · ' + formatDate(m.date) : ''}</div>
              ${hasResult ? `<div class="pred-modal-meta" style="color:var(--ink);font-weight:700;margin-top:0.2rem">Result: ${result.home_score}–${result.away_score}</div>` : ''}
              <button class="pred-modal-close" id="modalCloseBtn" aria-label="Close"><i class="ti ti-x"></i></button>
            </div>
            ${leagueBarHtml}
            <div id="modalBody" class="pred-modal-body">
              <div style="padding:2.5rem;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('modalOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });
      document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

      if (privateLeagues.length) {
        document.getElementById('modalLeaguePicker').addEventListener('change', e => {
          activePredLeague = e.target.value;
          loadModalBody(matchId, hasResult, result);
        });
      }

      await loadModalBody(matchId, hasResult, result);
    }

    async function loadModalBody(matchId, hasResult, result) {
      const bodyEl = document.getElementById('modalBody');
      if (!bodyEl) return;
      bodyEl.innerHTML = `<div style="padding:2.5rem;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>`;

      try {
        let memberIds = null;
        if (activePredLeague !== 'global') {
          if (!memberCache[activePredLeague]) {
            memberCache[activePredLeague] = await DB.getLeagueMemberIds(activePredLeague).catch(() => []);
          }
          memberIds = memberCache[activePredLeague];
        }

        const preds = await DB.getMatchPredictions(matchId, { userIds: memberIds, currentUserId: userId, isLocked: true });
        const predMap = {};
        preds.forEach(p => { predMap[p.user_id] = p; });

        let rows;
        if (memberIds) {
          const missing = memberIds.filter(id => !predMap[id] && !profileCache[id]);
          if (missing.length) {
            const profiles = await DB.getProfiles(missing).catch(() => []);
            profiles.forEach(p => { profileCache[p.id] = p; });
          }
          rows = memberIds.map(uid => {
            const pred = predMap[uid];
            return {
              uid,
              profile: pred ? pred.profiles : (profileCache[uid] || { display_name: 'Player', avatar_color: '#c8f135' }),
              value: pred ? pred.value : null
            };
          });
        } else {
          rows = preds.map(p => ({ uid: p.user_id, profile: p.profiles, value: p.value }));
        }

        rows.sort((a, b) => {
          if (a.uid === userId) return -1;
          if (b.uid === userId) return 1;
          return (a.profile?.display_name || '').localeCompare(b.profile?.display_name || '');
        });

        if (!rows.length) {
          bodyEl.innerHTML = `
            <div style="padding:2.5rem 1.25rem;text-align:center">
              <i class="ti ti-user-x" style="font-size:2rem;color:var(--grey-300);display:block;margin-bottom:0.75rem"></i>
              <p style="font-weight:600;color:var(--grey-500)">No predictions for this match yet.</p>
            </div>
          `;
          return;
        }

        bodyEl.innerHTML = rows.map(row => {
          const isYou = row.uid === userId;
          let scoreHtml = `<span class="player-pred-score no-pred">—</span>`;
          let chipHtml = '';
          if (row.value !== null) {
            let val;
            try { val = JSON.parse(row.value); } catch {}
            if (val && val.home !== undefined && val.away !== undefined) {
              scoreHtml = `<span class="player-pred-score">${val.home}–${val.away}</span>`;
              if (hasResult) {
                const actH = result.home_score, actA = result.away_score;
                const pH = parseInt(val.home), pA = parseInt(val.away);
                if (pH === actH && pA === actA)
                  chipHtml = `<span class="pred-chip exact">Exact</span>`;
                else if (Math.sign(pH - pA) === Math.sign(actH - actA))
                  chipHtml = `<span class="pred-chip result">Result</span>`;
                else
                  chipHtml = `<span class="pred-chip wrong">Wrong</span>`;
              }
            }
          }
          return `
            <div class="player-pred-row ${isYou ? 'is-you' : ''}">
              ${renderAvatar(row.profile, 'avatar', 'width:30px;height:30px;font-size:0.78rem')}
              <span class="player-pred-name">${row.profile?.display_name || 'Player'}${isYou ? ' <span class="you-badge">You</span>' : ''}</span>
              ${scoreHtml}
              ${chipHtml}
            </div>
          `;
        }).join('');

      } catch (err) {
        const b = document.getElementById('modalBody');
        if (b) b.innerHTML = `<div class="alert alert-error" style="margin:1rem"><i class="ti ti-alert-triangle"></i> ${err.message}</div>`;
      }
    }

    function closeModal() {
      const el = document.getElementById('pickModal');
      if (el) el.innerHTML = '';
    }

    async function savePredictions() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> Saving&hellip;';

      const updates = [];
      if (roundData) {
        roundData.matches.forEach(m => {
          const hEl = document.getElementById(`h_${m.id}`);
          const aEl = document.getElementById(`a_${m.id}`);
          if (!hEl || !aEl || hEl.value === '' || aEl.value === '') return;
          updates.push(DB.savePrediction(userId, roundId, getMatchKey(m.id), {
            home: parseInt(hEl.value), away: parseInt(aEl.value)
          }));
        });
      }

      try {
        await Promise.all(updates);
        Toast.success(`Saved ${updates.length} predictions!`);
        document.getElementById('saveStatus').textContent = 'Saved at ' + new Date().toLocaleTimeString();
      } catch (err) {
        Toast.error('Save failed: ' + err.message);
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save Predictions';
    }

    document.getElementById('saveBtn')?.addEventListener('click', savePredictions);
    document.getElementById('matchesContent').addEventListener('click', e => {
      const btn = e.target.closest('.view-picks-btn');
      if (!btn) return;
      openMatchModal(parseInt(btn.dataset.match));
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    DB.subscribeToMatchResults(async () => {
      // Do NOT call load() — it resets `saved` and wipes unsaved typed picks.
      // Snapshot current inputs first so typed-but-unsaved values survive the re-render.
      if (roundData) {
        roundData.matches.forEach(m => {
          const hEl = document.getElementById(`h_${m.id}`);
          const aEl = document.getElementById(`a_${m.id}`);
          if (hEl && aEl) saved[getMatchKey(m.id)] = { home: hEl.value, away: aEl.value };
        });
      }
      try {
        const fresh = await DB.getMatchResults();
        fresh.forEach(r => { results[r.match_id] = r; });
        DB.patchKnockoutBracket(fresh);
        renderMatches();
      } catch (e) { console.error(`[${roundId}] live result refresh failed:`, e); }
    });
    load();
  </script>
  <div id="pickModal"></div>
</body>
</html>
