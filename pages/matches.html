<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Match Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=30">
  <style>
    .round-section { margin-bottom: 2.5rem; }

    .round-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.625rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 1rem;
    }

    .round-section-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .match-count { font-size: 0.75rem; color: var(--grey-400); }

    .match-list { display: flex; flex-direction: column; gap: 0.625rem; }

    .match-row {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s;
    }

    .match-row.live { border-color: var(--red); }
    .match-row.finished { border-color: var(--grey-300); }

    .match-row-main {
      display: grid;
      grid-template-columns: 140px 1fr auto 1fr 100px;
      align-items: center;
      padding: 0.875rem 1.25rem;
      gap: 0.875rem;
    }

    @media (max-width: 880px) {
      .match-row-main {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .match-status-block { display: none; }
      .match-team-block.right { flex-direction: row; }
    }

    .match-info { font-size: 0.75rem; color: var(--grey-500); }
    .match-info .match-num { font-weight: 600; color: var(--ink); margin-bottom: 0.15rem; }
    .match-info .match-venue { margin-top: 0.15rem; }

    .match-team-block { display: flex; align-items: center; gap: 0.5rem; }
    .match-team-block.right { flex-direction: row-reverse; }
    .match-team-flag { font-size: 1.4rem; }
    .match-team-name { font-size: 0.875rem; font-weight: 600; }

    .match-score-centre { text-align: center; min-width: 80px; }
    .match-scoreline { font-family: var(--font-serif); font-size: 1.5rem; color: var(--ink); line-height: 1; }
    .match-vs-text { font-size: 0.75rem; color: var(--grey-400); letter-spacing: 0.08em; }

    .preds-row {
      border-top: 1px solid var(--grey-100);
      padding: 0.55rem 1.25rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .preds-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey-400); margin-right: 0.25rem; }

    .pred-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: var(--grey-100);
      border: 1px solid var(--grey-300);
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .pred-pill.exact { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.06); }
    .pred-pill.result { border-color: var(--lime-dark); color: var(--lime-dark); background: rgba(184,224,32,0.08); }
    .pred-pill.wrong { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.05); }
    .pred-pill.pending { color: var(--grey-500); border-color: var(--grey-300); }
    .pred-pill.live-wait { border-color: #f59e0b; color: #b45309; background: rgba(245,158,11,0.06); }

    .pred-name { color: var(--grey-500); margin-right: 0.1rem; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--red);
      color: white;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .live-dot-sm {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: white;
      animation: blink 1s ease-in-out infinite;
    }

    .finished-badge {
      display: inline-flex;
      align-items: center;
      background: var(--grey-100);
      color: var(--grey-500);
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .live-badge.sm { font-size: 0.58rem; padding: 0.1rem 0.35rem; gap: 0.2rem; }
    .match-scoreline.live { color: var(--red); }

    .no-matches {
      text-align: center;
      padding: 3rem;
      color: var(--grey-400);
      font-size: 0.9rem;
    }

    /* ---- Per-match predictions modal ---- */
    .match-row[data-match-id] { cursor: pointer; }
    .match-row[data-match-id]:hover { border-color: var(--grey-400); }

    .mpred-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    @media (min-width: 560px) {
      .mpred-overlay { align-items: center; padding: 1.5rem; }
    }
    .mpred-panel {
      background: var(--white);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
    }
    @media (min-width: 560px) {
      .mpred-panel { border-radius: var(--radius-lg); max-width: 480px; max-height: 80vh; }
    }
    .mpred-header {
      position: relative;
      padding: 1rem 3rem 0.875rem 1.25rem;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .mpred-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    .mpred-meta { font-size: 0.72rem; color: var(--grey-500); }
    .mpred-close {
      position: absolute;
      top: 0.875rem; right: 1rem;
      background: none; border: none;
      cursor: pointer; color: var(--grey-500);
      padding: 0.25rem; border-radius: var(--radius-sm);
      font-size: 1.1rem; line-height: 1;
    }
    .mpred-close:hover { background: var(--grey-100); }
    .mpred-league-bar {
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mpred-body { overflow-y: auto; flex: 1; padding: 0.5rem 0; min-height: 120px; }
    .mpred-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.625rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
    }
    .mpred-row:last-child { border-bottom: none; }
    .mpred-you { background: rgba(200,241,53,0.1); }
    .mpred-name { flex: 1; font-size: 0.875rem; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mpred-score { font-family: var(--font-serif); font-size: 1.05rem; color: var(--ink); min-width: 40px; text-align: center; flex-shrink: 0; }
    .mpred-lock-note {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      font-size: 0.8rem;
      color: var(--grey-500);
      background: var(--grey-100);
      border-top: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .mpred-status-note {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      font-size: 0.8rem;
      flex-shrink: 0;
      border-bottom: 1px solid var(--grey-200);
    }
    .mpred-status-note.pending-note { color: var(--grey-500); background: var(--grey-100); }
    .mpred-status-note.live-note { color: #b45309; background: rgba(245,158,11,0.06); border-bottom-color: rgba(245,158,11,0.2); }
    .pred-pill.auto { border-style: dashed; color: var(--grey-500); }
    .auto-tag { display: inline-block; font-size: 0.62em; background: var(--grey-200); color: var(--grey-500); border-radius: 3px; padding: 0 3px; margin-left: 2px; vertical-align: middle; font-weight: 700; letter-spacing: 0; }
    .mpred-auto .mpred-score { color: var(--grey-400); }
    .auto-badge { display: inline-block; font-size: 0.65rem; background: var(--grey-200); color: var(--grey-500); border-radius: 3px; padding: 1px 5px; margin-left: 3px; font-weight: 600; letter-spacing: 0.02em; vertical-align: middle; }
    .match-info-score { font-family: var(--font-serif); font-weight: 600; font-size: 0.9rem; color: var(--ink); }
    .match-kickoff { color: var(--grey-600); }

    /* ---- Match centre controls ---- */
    .filter-bar.mc-controls { flex-direction: column; gap: 0.5rem; flex-wrap: nowrap; align-items: stretch; margin-bottom: 1.25rem; }
    .mc-top-row { display: flex; align-items: center; gap: 0.5rem; justify-content: space-between; flex-wrap: wrap; }
    .mc-top-left { display: flex; align-items: center; gap: 0.5rem; }
    /* Segmented sort control */
    .mc-seg-group { display: flex; border: 1px solid var(--grey-300); border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0; }
    .mc-seg-btn { background: var(--grey-100); border: none; padding: 0.375rem 0.75rem; font-size: 0.82rem; font-weight: 600; color: var(--grey-500); cursor: pointer; display: flex; align-items: center; gap: 0.3rem; transition: background 0.15s, color 0.15s; white-space: nowrap; line-height: 1.4; }
    .mc-seg-btn + .mc-seg-btn { border-left: 1px solid var(--grey-300); }
    .mc-seg-btn.active { background: var(--ink); color: var(--white); }
    .mc-seg-btn:hover:not(.active) { background: var(--grey-200); color: var(--ink); }
    /* Round filter strip */
    .mc-filter-strip { display: flex; align-items: center; gap: 0.375rem; flex-wrap: wrap; }
    .mc-filter-strip > * { flex-shrink: 0; }
    .mc-filter-btns { display: flex; align-items: center; gap: 0.375rem; }
    .mc-filter-btns > * { flex-shrink: 0; }
    .mc-filter-select { display: none; font-size: 0.85rem; border: 1px solid var(--grey-300); border-radius: var(--radius-md); background: var(--white); padding: 0.375rem 0.6rem; color: var(--ink); }
    @media (max-width: 600px) {
      .mc-filter-select { min-height: 44px; flex: 1; }
    }

    /* ---- Win probability bar ---- */
    .prob-bar-section {
      border-top: 1px solid var(--grey-100);
      padding: 0.55rem 1.25rem 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .prob-bar-section:hover { background: #fafafa; }

    .prob-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .prob-bar-title {
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--grey-400);
    }
    .prob-chevron {
      font-size: 0.8rem;
      color: var(--grey-400);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .prob-chevron.open { transform: rotate(180deg); }

    .prob-bar {
      display: flex;
      height: 26px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      gap: 2px;
    }
    .prob-seg {
      min-width: 0;
      transition: flex 0.3s ease;
    }
    .prob-seg.home { background: #c8f135; border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .prob-seg.draw { background: #9ca3af; }
    .prob-seg.away { background: #3b82f6; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

    .prob-label-row {
      display: flex;
      justify-content: space-between;
      margin-top: 0.3rem;
      font-size: 0.68rem;
      color: var(--grey-600);
      font-weight: 500;
    }
    .prob-label-row span:first-child  { color: #4a6a00; }
    .prob-label-row span:last-child   { text-align: right; color: #1d4ed8; }
    .prob-label-row span:nth-child(2) { text-align: center; color: var(--grey-400); }

    /* Expanded factor rows */
    .prob-factors { padding-top: 0.45rem; flex-direction: column; gap: 0.3rem; border-top: 1px solid var(--grey-100); margin-top: 0.45rem; }
    .prob-factors:not([hidden]) { display: flex; }

    .prob-factor-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .prob-factor-label {
      width: 118px;
      flex-shrink: 0;
      font-size: 0.67rem;
      color: var(--grey-500);
      line-height: 1.3;
    }
    .prob-mini-bar {
      flex: 1;
      display: flex;
      height: 8px;
      border-radius: 3px;
      overflow: hidden;
      gap: 1px;
      min-width: 0;
    }
    .prob-mini-seg.home { background: #c8f135; border-radius: 3px 0 0 3px; }
    .prob-mini-seg.draw { background: #9ca3af; }
    .prob-mini-seg.away { background: #3b82f6; border-radius: 0 3px 3px 0; }

    .prob-factor-pcts {
      flex-shrink: 0;
      font-size: 0.65rem;
      color: var(--grey-500);
      text-align: right;
      width: 86px;
    }
    .prob-low-sample {
      display: inline-block;
      background: var(--grey-200);
      color: var(--grey-500);
      border-radius: 3px;
      padding: 0 3px;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      vertical-align: middle;
    }
    .prob-no-crowd { color: var(--grey-400); font-size: 0.67rem; font-style: italic; flex: 1; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <span>Match Centre</span></nav>
      <h1 class="page-title">Match Centre</h1>
      <p class="page-desc">All 104 fixtures &middot; Live scores &middot; Everyone's predictions</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem">

      <div class="filter-bar mc-controls mb-4">
        <div class="mc-top-row">
          <div class="mc-top-left">
            <div class="mc-seg-group">
              <button class="mc-seg-btn" data-sort="round"><i class="ti ti-layout-list"></i> <span class="mc-seg-label">By round</span></button>
              <button class="mc-seg-btn active" data-sort="kickoff"><i class="ti ti-sort-ascending-2"></i> <span class="mc-seg-label">By kickoff</span></button>
            </div>
            <button class="btn btn-outline btn-sm" id="jumpCurrentBtn" title="Jump to current match">
              <i class="ti ti-player-skip-forward"></i> <span class="jump-label">Jump to current</span>
            </button>
          </div>
          <div id="leaguePickerSlot"></div>
        </div>
        <div class="mc-filter-strip">
          <span class="filter-label">Round:</span>
          <div class="mc-filter-btns">
            <button class="btn btn-lime btn-sm" data-filter="all">All</button>
            <button class="btn btn-outline btn-sm" data-filter="group">Group Stage</button>
            <button class="btn btn-outline btn-sm" data-filter="r32">R32</button>
            <button class="btn btn-outline btn-sm" data-filter="r16">R16</button>
            <button class="btn btn-outline btn-sm" data-filter="qf">QF</button>
            <button class="btn btn-outline btn-sm" data-filter="sf">SF</button>
            <button class="btn btn-outline btn-sm" data-filter="final">Final</button>
          </div>
          <select class="mc-filter-select" id="roundFilterSelect">
            <option value="all">All rounds</option>
            <option value="group">Group Stage</option>
            <option value="r32">Round of 32</option>
            <option value="r16">Round of 16</option>
            <option value="qf">Quarter Finals</option>
            <option value="sf">Semi Finals</option>
            <option value="final">Final</option>
          </select>
        </div>
      </div>

      <div id="matchCentreContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

    </div>
  </main>

  <div id="matchPredModal"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=30"></script>
  <script src="../js/data.js?v=30"></script>
  <script src="../js/supabase-client.js?v=30"></script>
  <script src="../js/scoring.js?v=30"></script>
  <script src="../js/elo.js?v=30"></script>
  <script src="../js/match-probs.js?v=30"></script>
  <script src="../js/ui.js?v=30"></script>
  <script>
    DB.initSupabase();
    Nav.render('matches');

    let allResults       = {};
    let allPreds         = [];
    let currentFilter    = 'all';
    let currentUserId    = null;
    let myLeagues        = [];
    let activePredLeague = 'global';
    let memberCache      = {};
    let currentSort      = 'kickoff';
    let allProfiles      = [];
    let eloRatings       = {};  // teamCode → Elo rating
    let crowdPickMap     = {};  // matchId  → { homeWin, draw, awayWin, pickCount } | null
    let calibrationMap   = {};  // matchId  → model_calibration row (pre-kickoff snapshot)
    const probExpanded   = new Set(); // matchIds currently expanded

    async function load() {
      const session = await DB.getSession();
      currentUserId = session?.user?.id || null;

      // Compute which match question_keys have already kicked off
      const now = Date.now();
      const lockedKeys = [
        ...GROUP_FIXTURES
          .filter(f => now >= new Date(`${f[1]}T${f[2]}:00Z`).getTime())
          .map(f => `m${f[0]}`),
        ...Object.values(KNOCKOUT_ROUNDS)
          .flatMap(r => r.matches || [])
          .filter(m => m.date && m.time && now >= new Date(`${m.date}T${m.time}:00Z`).getTime())
          .map(m => `m${m.id}`)
      ];

      // Own predictions (always safe) + all-user preds only for kicked-off matches
      const ownPredsPromise    = currentUserId ? DB.getUserPredictions(currentUserId).catch(() => []) : Promise.resolve([]);
      const ownProfilePromise  = currentUserId ? DB.getProfiles([currentUserId]).catch(() => [])      : Promise.resolve([]);
      const lockedPredsPromise = lockedKeys.length ? DB.getAllPredictions(null, lockedKeys).catch(() => []) : Promise.resolve([]);

      // ---- Elo ratings (public read) ----
      const sb = window._supabase;
      const eloPromise = sb.from('team_elo').select('team_code,rating')
        .then(({ data }) => { (data || []).forEach(r => { eloRatings[r.team_code] = Number(r.rating); }); })
        .catch(() => {});

      // ---- Pre-kickoff model snapshots — used to freeze the prob bar for live/finished matches ----
      const calibrationPromise = sb.from('model_calibration')
        .select('match_id,blend_home,blend_draw,blend_away,elo_home,elo_draw,elo_away,crowd_home,crowd_draw,crowd_away,crowd_n')
        .then(({ data }) => { (data || []).forEach(r => { calibrationMap[r.match_id] = r; }); })
        .catch(() => {});

      // ---- Crowd picks for upcoming group + knockout matches (aggregated only — no user IDs) ----
      const upcomingGroupIds = GROUP_FIXTURES
        .filter(f => now < new Date(`${f[1]}T${f[2]}:00Z`).getTime())
        .map(f => f[0]);
      const upcomingKoIds = Object.values(KNOCKOUT_ROUNDS)
        .flatMap(r => r.matches || [])
        .filter(m => {
          if (m.kickoff_utc) return now < new Date(m.kickoff_utc).getTime();
          if (m.date && m.time) return now < new Date(`${m.date}T${m.time}:00Z`).getTime();
          return true;
        })
        .map(m => m.id);
      const upcomingCrowdIds = [...upcomingGroupIds, ...upcomingKoIds];
      const crowdPromise = upcomingCrowdIds.length
        ? sb.from('predictions')
            .select('question_key,value')
            .in('question_key', upcomingCrowdIds.map(id => `m${id}`))
            .then(({ data }) => {
              if (!data) return;
              const byMatch = {};
              data.forEach(p => {
                const mid = parseInt(p.question_key.slice(1));
                if (!byMatch[mid]) byMatch[mid] = [];
                byMatch[mid].push(p);
              });
              upcomingCrowdIds.forEach(id => {
                crowdPickMap[id] = MatchProbs.computeCrowdPicks(byMatch[id] || []);
              });
            })
            .catch(() => {})
        : Promise.resolve();

      const [matchResults, ownPreds, ownProfiles, lockedPreds] = await Promise.all([
        DB.getMatchResults().catch(() => []),
        ownPredsPromise,
        ownProfilePromise,
        lockedPredsPromise,
        eloPromise,
        crowdPromise,
        calibrationPromise,
      ]);

      matchResults.forEach(r => { allResults[r.match_id] = r; });
      const ownProfile = ownProfiles[0] || null;

      // Pre-kickoff matches: own prediction only, enriched with own profile for modal avatar rendering
      const lockedKeySet = new Set(lockedKeys);
      const ownPreKickoffPreds = ownPreds
        .filter(p => !lockedKeySet.has(p.question_key))
        .map(p => ({ ...p, profiles: ownProfile }));

      // allPreds: all-user data for locked matches + own-only for pre-kickoff
      // Others' pre-kickoff predictions are never fetched — enforcement is at query level above
      allPreds = [...lockedPreds, ...ownPreKickoffPreds];

      // crowdPickMap for kicked-off matches — derive from already-fetched lockedPreds
      // (the crowdPromise above only queries upcoming matches)
      const lockedByMatch = {};
      lockedPreds.forEach(p => {
        if (!p.question_key?.startsWith('m')) return;
        const mid = parseInt(p.question_key.slice(1));
        if (!lockedByMatch[mid]) lockedByMatch[mid] = [];
        lockedByMatch[mid].push(p);
      });
      Object.entries(lockedByMatch).forEach(([mid, preds]) => {
        crowdPickMap[parseInt(mid)] = MatchProbs.computeCrowdPicks(preds);
      });

      if (currentUserId) {
        myLeagues = await DB.getMyLeagues(currentUserId).catch(() => []);
      }
      allProfiles = await DB.getAllProfiles().catch(() => []);

      render();
      renderLeagueFilter();
    }

    function renderLeagueFilter() {
      const privateLeagues = myLeagues.filter(l => !l.is_global);
      if (!privateLeagues.length) return;
      const slot = document.getElementById('leaguePickerSlot');
      if (!slot || document.getElementById('inlineLeagueGroup')) return;
      const group = document.createElement('div');
      group.id = 'inlineLeagueGroup';
      group.style.cssText = 'display:flex;align-items:center;gap:0.5rem';
      group.innerHTML = `
        <i class="ti ti-users-group" style="color:var(--grey-400);font-size:0.9rem"></i>
        <select id="inlineLeaguePicker" class="form-control" style="font-size:0.82rem;padding:0.25rem 0.6rem;height:auto;min-width:150px">
          <option value="global">All Players</option>
          ${privateLeagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}
        </select>`;
      slot.appendChild(group);
      document.getElementById('inlineLeaguePicker').value = activePredLeague;
      document.getElementById('inlineLeaguePicker').addEventListener('change', async e => {
        activePredLeague = e.target.value;
        if (activePredLeague !== 'global' && !memberCache[activePredLeague]) {
          memberCache[activePredLeague] = await DB.getLeagueMemberIds(activePredLeague).catch(() => []);
        }
        // Sync modal picker if open
        const modalPicker = document.getElementById('mpredLeaguePicker');
        if (modalPicker) modalPicker.value = activePredLeague;
        render();
      });
    }

    // ---- Per-match kick-off time (UTC) ----
    function formatLocalKickoff(dt) {
      const d = dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
      const t = dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      return `${d}, ${t}`;
    }

    function getMatchKickoff(matchId) {
      const gf = GROUP_FIXTURES.find(f => f[0] === matchId);
      if (gf) return new Date(`${gf[1]}T${gf[2]}:00Z`);
      for (const round of Object.values(KNOCKOUT_ROUNDS)) {
        const m = round.matches?.find(m => m.id === matchId);
        if (m?.date && m?.time) return new Date(`${m.date}T${m.time}:00Z`);
      }
      return null;
    }

    // ---- Match predictions modal ----
    async function openMatchModal(matchId) {
      const kickoff  = getMatchKickoff(matchId);
      // FAIRNESS: only reveal others' predictions after the match has kicked off
      const isLocked = kickoff ? Date.now() >= kickoff.getTime() : false;

      let home = { name: 'TBD', code: null }, away = { name: 'TBD', code: null };
      let matchLabel = `Match ${matchId}`, matchDate = '';
      const gf = GROUP_FIXTURES.find(f => f[0] === matchId);
      if (gf) {
        home = getTeam(gf[4]); away = getTeam(gf[5]);
        matchLabel = `Match ${matchId} · Group ${gf[3]}`;
        matchDate  = gf[1];
      } else {
        for (const round of Object.values(KNOCKOUT_ROUNDS)) {
          const m = round.matches?.find(m => m.id === matchId);
          if (m) {
            const dbRes = allResults[matchId];
            const homeCode = m.home_team || dbRes?.home_team || null;
            const awayCode = m.away_team || dbRes?.away_team || null;
            home      = homeCode ? getTeam(homeCode) : home;
            away      = awayCode ? getTeam(awayCode) : away;
            matchLabel = m.match_label || matchLabel;
            matchDate  = m.date || '';
            break;
          }
        }
      }

      const result        = allResults[matchId];
      const hasResult     = result && result.home_score !== null;
      const isLiveModal   = result?.status === 'IN_PLAY' || result?.status === 'PAUSED' || result?.status === 'LIVE';
      const modalScoreHtml = hasResult
        ? ` · ${isLiveModal ? '<span class="live-badge sm"><span class="live-dot-sm"></span>LIVE</span> ' : ''}<strong>${result.home_score}–${result.away_score}</strong>`
        : '';

      const privateLeagues = myLeagues.filter(l => !l.is_global);
      const leagueOpts = [
        `<option value="global">All Players</option>`,
        ...privateLeagues.map(l => `<option value="${l.id}">${l.name}</option>`)
      ].join('');
      const leagueBarHtml = privateLeagues.length ? `
        <div class="mpred-league-bar">
          <i class="ti ti-users-group" style="color:var(--grey-400);flex-shrink:0"></i>
          <select id="mpredLeaguePicker" class="form-control" style="flex:1;min-width:0;font-size:0.82rem;padding:0.25rem 0.5rem;height:auto">${leagueOpts}</select>
        </div>` : '';

      document.getElementById('matchPredModal').innerHTML = `
        <div class="mpred-overlay" id="mpredOverlay">
          <div class="mpred-panel">
            <div class="mpred-header">
              <div class="mpred-teams">
                ${home.code ? teamFlagImg(home.code) : ''}<span>${home.name}</span>
                <span style="color:var(--grey-400);font-weight:400;font-size:0.8rem">vs</span>
                <span>${away.name}</span>${away.code ? teamFlagImg(away.code) : ''}
              </div>
              <div class="mpred-meta">${matchLabel}${matchDate ? ' · ' + formatDate(matchDate) : ''}${modalScoreHtml}</div>
              <button class="mpred-close" onclick="closeMatchModal()"><i class="ti ti-x"></i></button>
            </div>
            ${leagueBarHtml}
            <div id="mpredBody" class="mpred-body"><div class="spinner" style="margin:2rem auto;display:block;width:32px;height:32px"></div></div>
          </div>
        </div>`;

      document.body.style.overflow = 'hidden';
      document.getElementById('mpredOverlay').addEventListener('click', e => {
        if (e.target.id === 'mpredOverlay') closeMatchModal();
      });
      if (privateLeagues.length) {
        const picker = document.getElementById('mpredLeaguePicker');
        picker.value = activePredLeague;
        picker.addEventListener('change', e => {
          activePredLeague = e.target.value;
          loadMatchModalBody(matchId, isLocked);
        });
      }

      await loadMatchModalBody(matchId, isLocked);
    }

    async function loadMatchModalBody(matchId, isLocked) {
      const bodyEl = document.getElementById('mpredBody');
      if (!bodyEl) return;
      bodyEl.innerHTML = '<div class="spinner" style="margin:2rem auto;display:block;width:32px;height:32px"></div>';

      // Current user's own prediction (always visible, regardless of lock)
      const myPredRow = allPreds.find(p => p.user_id === currentUserId && p.question_key === `m${matchId}`);
      let myVal = null;
      if (myPredRow) { try { myVal = JSON.parse(myPredRow.value); } catch {} }

      if (!isLocked) {
        // Pre-kickoff: own prediction only + lock note
        const myHtml = myVal
          ? `<div class="mpred-row mpred-you">
              ${renderAvatar(myPredRow.profiles, 'avatar', 'width:32px;height:32px;font-size:0.85rem')}
              <span class="mpred-name">You <span class="you-badge">You</span></span>
              <span class="mpred-score">${myVal.home}–${myVal.away}</span>
            </div>`
          : `<div class="mpred-row mpred-you" style="color:var(--grey-400)">
              <i class="ti ti-circle-dashed" style="font-size:1.5rem;flex-shrink:0"></i>
              <span class="mpred-name">You haven't predicted this match yet</span>
            </div>`;
        bodyEl.innerHTML = myHtml +
          `<div class="mpred-lock-note"><i class="ti ti-lock"></i> Other predictions reveal at kick-off</div>`;
        return;
      }

      // Post-kickoff: filter allPreds by league if needed, then render all
      let memberIds = null;
      if (activePredLeague !== 'global') {
        if (!memberCache[activePredLeague]) {
          memberCache[activePredLeague] = await DB.getLeagueMemberIds(activePredLeague).catch(() => []);
        }
        memberIds = memberCache[activePredLeague];
      }

      let matchPreds = allPreds.filter(p => p.question_key === `m${matchId}`);
      if (memberIds) matchPreds = matchPreds.filter(p => memberIds.includes(p.user_id));

      const result          = allResults[matchId];
      const hasResult       = result && result.home_score !== null;
      const isMatchFinished = result?.status === 'FINISHED';
      const isMatchLive     = result?.status === 'IN_PLAY' || result?.status === 'PAUSED' || result?.status === 'LIVE';

      // Auto-defaults (4-4) only apply once the match is fully finished — not during live play
      if (isMatchFinished && allProfiles.length) {
        const predictedSet = new Set(matchPreds.map(p => p.user_id));
        const pool = memberIds ? allProfiles.filter(pr => memberIds.includes(pr.id)) : allProfiles;
        pool.filter(pr => !predictedSet.has(pr.id)).forEach(pr => {
          matchPreds.push({ user_id: pr.id, profiles: pr, _auto: true });
        });
      }

      if (!matchPreds.length) {
        bodyEl.innerHTML = `<div style="text-align:center;padding:2rem 1rem;color:var(--grey-400)">
          <i class="ti ti-inbox" style="font-size:2rem;display:block;margin-bottom:0.75rem"></i>
          No predictions for this match.</div>`;
        return;
      }

      // Sort: current user first, then alphabetical
      matchPreds.sort((a, b) => {
        if (a.user_id === currentUserId) return -1;
        if (b.user_id === currentUserId) return 1;
        return (a.profiles?.display_name || '').localeCompare(b.profiles?.display_name || '');
      });

      let statusNote = '';
      if (isMatchLive) {
        statusNote = `<div class="mpred-status-note live-note"><i class="ti ti-live-view"></i> Match in progress — picks are locked and will score at full time</div>`;
      } else if (!isMatchFinished) {
        statusNote = `<div class="mpred-status-note pending-note"><i class="ti ti-clock"></i> Awaiting result — all picks are saved and will score once the match finishes</div>`;
      }

      bodyEl.innerHTML = statusNote + matchPreds.map(p => {
        const isYou = p.user_id === currentUserId;
        if (p._auto) {
          let chip = '';
          if (isMatchFinished && hasResult) {
            const actH = result.home_score, actA = result.away_score;
            if (actH === 4 && actA === 4) chip = `<span class="pred-pill exact">Exact</span>`;
            else if (actH === actA)        chip = `<span class="pred-pill result">Result</span>`;
            else                           chip = `<span class="pred-pill auto">Wrong</span>`;
          } else if (isMatchLive) {
            chip = `<span class="pred-pill live-wait">Live</span>`;
          } else {
            chip = `<span class="pred-pill pending">Pending</span>`;
          }
          const isAiAuto = isAiPlayer(p.profiles) && !isYou;
          return `<div class="mpred-row mpred-auto${isYou ? ' mpred-you' : ''}${isAiAuto ? ' ai-player-row' : ''}">
            ${renderAvatar(p.profiles, 'avatar', 'width:32px;height:32px;font-size:0.85rem')}
            <span class="mpred-name">${p.profiles?.display_name || 'Player'}${isYou ? ' <span class="you-badge">You</span>' : ''}${isAiAuto ? ' <span class="ai-tag">AI</span>' : ''} <span class="auto-badge">auto</span></span>
            <span class="mpred-score">4–4</span>
            ${chip}
          </div>`;
        }
        let val = null;
        try { val = JSON.parse(p.value); } catch {}
        let chipHtml = '';
        if (isMatchFinished && hasResult && val !== null) {
          const actH = result.home_score, actA = result.away_score;
          if (val.home === actH && val.away === actA)
            chipHtml = `<span class="pred-pill exact">Exact</span>`;
          else if (Math.sign(val.home - val.away) === Math.sign(actH - actA))
            chipHtml = `<span class="pred-pill result">Result</span>`;
          else
            chipHtml = `<span class="pred-pill wrong">Wrong</span>`;
        } else if (isMatchLive) {
          chipHtml = `<span class="pred-pill live-wait">Live</span>`;
        } else {
          chipHtml = `<span class="pred-pill pending">Pending</span>`;
        }
        const isAiRow = isAiPlayer(p.profiles) && !isYou;
        return `<div class="mpred-row${isYou ? ' mpred-you' : ''}${isAiRow ? ' ai-player-row' : ''}">
          ${renderAvatar(p.profiles, 'avatar', 'width:32px;height:32px;font-size:0.85rem')}
          <span class="mpred-name">${p.profiles?.display_name || 'Player'}${isYou ? ' <span class="you-badge">You</span>' : ''}${isAiRow ? ' <span class="ai-tag">AI</span>' : ''}</span>
          <span class="mpred-score">${val !== null ? `${val.home}–${val.away}` : '—'}</span>
          ${chipHtml}
        </div>`;
      }).join('');
    }

    function closeMatchModal() {
      document.getElementById('matchPredModal').innerHTML = '';
      document.body.style.overflow = '';
    }

    function buildPredMap() {
      // Apply league filter if active
      const memberIds = (activePredLeague !== 'global' && memberCache[activePredLeague])
        ? new Set(memberCache[activePredLeague])
        : null;

      const map = {};
      allPreds.forEach(p => {
        if (!p.question_key.startsWith('m')) return;
        if (memberIds && !memberIds.has(p.user_id)) return;
        const matchId = parseInt(p.question_key.slice(1));
        if (isNaN(matchId)) return;
        let val;
        try { val = JSON.parse(p.value); } catch { return; }
        if (!map[matchId]) map[matchId] = [];
        map[matchId].push({
          name: p.profiles?.display_name || 'Player',
          isAi: p.profiles?.display_name === 'Claude',
          home: val.home,
          away: val.away,
          userId: p.user_id
        });
      });
      return map;
    }

    function render() {
      const predMap = buildPredMap();
      const content = document.getElementById('matchCentreContent');

      if (currentSort === 'kickoff') {
        const flat = [];

        if (currentFilter === 'all' || currentFilter === 'group') {
          GROUP_FIXTURES.forEach(m => flat.push({
            kickoff: getMatchKickoff(m[0]), date: m[1],
            html: buildGroupMatchRow(m, predMap, allResults)
          }));
        }

        const koMap = {
          r32:   KNOCKOUT_ROUNDS.round32,
          r16:   KNOCKOUT_ROUNDS.round16,
          qf:    KNOCKOUT_ROUNDS.quarterfinals,
          sf:    KNOCKOUT_ROUNDS.semifinals,
          final: KNOCKOUT_ROUNDS.final,
        };
        const koSources = currentFilter === 'all'
          ? Object.values(koMap)
          : (koMap[currentFilter] ? [koMap[currentFilter]] : []);
        koSources.forEach(ko => (ko.matches || []).forEach(m => flat.push({
          kickoff: getMatchKickoff(m.id), date: m.date || '',
          html: buildKoMatchRow(m, predMap, allResults)
        })));

        if (!flat.length) {
          content.innerHTML = '<div class="no-matches"><i class="ti ti-circle-x" style="font-size:2rem;display:block;margin-bottom:1rem"></i>No matches for selected filter.</div>';
          return;
        }

        flat.sort((a, b) => {
          const ta = a.kickoff ? a.kickoff.getTime() : Infinity;
          const tb = b.kickoff ? b.kickoff.getTime() : Infinity;
          return ta - tb;
        });

        const byDate = {};
        const dateOrder = [];
        flat.forEach(f => {
          const key = f.date || '';
          if (!byDate[key]) { byDate[key] = []; dateOrder.push(key); }
          byDate[key].push(f.html);
        });

        content.innerHTML = dateOrder.map(d => {
          const htmls = byDate[d];
          const label = d
            ? new Date(d + 'T12:00:00Z').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })
            : 'TBD';
          return `<div class="round-section">
            <div class="round-section-header">
              <span class="round-section-title"><i class="ti ti-calendar"></i> ${label}</span>
              <span class="match-count">${htmls.length} match${htmls.length !== 1 ? 'es' : ''}</span>
            </div>
            <div class="match-list">${htmls.join('')}</div>
          </div>`;
        }).join('');
        return;
      }

      const sections = [];

      if (currentFilter === 'all' || currentFilter === 'group') {
        'ABCDEFGHIJKL'.split('').forEach(g => {
          const matches = GROUP_FIXTURES.filter(m => m[3] === g);
          sections.push({
            title: `Group ${g}`,
            matches: matches.map(m => buildGroupMatchRow(m, predMap, allResults)),
          });
        });
      }

      const koFilters = {
        r32:   { title: 'Round of 32',    data: KNOCKOUT_ROUNDS.round32 },
        r16:   { title: 'Round of 16',    data: KNOCKOUT_ROUNDS.round16 },
        qf:    { title: 'Quarter Finals', data: KNOCKOUT_ROUNDS.quarterfinals },
        sf:    { title: 'Semi Finals',    data: KNOCKOUT_ROUNDS.semifinals },
        final: { title: 'The Final',      data: KNOCKOUT_ROUNDS.final },
      };

      if (currentFilter === 'all') {
        Object.entries(koFilters).forEach(([, val]) => {
          sections.push({
            title: val.title,
            matches: val.data.matches.map(m => buildKoMatchRow(m, predMap, allResults)),
          });
        });
      } else if (koFilters[currentFilter]) {
        const { title, data } = koFilters[currentFilter];
        sections.push({
          title,
          matches: data.matches.map(m => buildKoMatchRow(m, predMap, allResults)),
        });
      }

      if (!sections.length) {
        content.innerHTML = '<div class="no-matches"><i class="ti ti-circle-x" style="font-size:2rem;display:block;margin-bottom:1rem"></i>No matches for selected filter.</div>';
        return;
      }

      content.innerHTML = sections.map(s => `
        <div class="round-section">
          <div class="round-section-header">
            <span class="round-section-title"><i class="ti ti-ball-football"></i> ${s.title}</span>
            <span class="match-count">${s.matches.length} matches</span>
          </div>
          <div class="match-list">${s.matches.join('')}</div>
        </div>
      `).join('');
    }

    // ---- Win probability bar (upcoming group matches only) ----

    function buildProbBar(matchId, homeCode, awayCode, result) {
      const isFinished = result?.status === 'FINISHED';
      const isLive     = result?.status === 'IN_PLAY' || result?.status === 'PAUSED' || result?.status === 'LIVE';
      const homeName   = getTeam(homeCode).name;
      const awayName   = getTeam(awayCode).name;

      if (isFinished || isLive) {
        // Show frozen pre-kickoff snapshot from model_calibration
        const cal = calibrationMap[matchId];
        if (!cal) return '';

        const hPct = Math.round(cal.blend_home * 100);
        const dPct = Math.round(cal.blend_draw * 100);
        const aPct = Math.round(cal.blend_away * 100);
        const eH   = Math.round(cal.elo_home   * 100);
        const eD   = Math.round(cal.elo_draw   * 100);
        const eA   = Math.round(cal.elo_away   * 100);

        let crowdHtml;
        if (cal.crowd_home != null && cal.crowd_n > 0) {
          const cH = Math.round(cal.crowd_home * 100);
          const cD = Math.round(cal.crowd_draw * 100);
          const cA = Math.round(cal.crowd_away * 100);
          const lowNote = cal.crowd_n < MatchProbs.MIN_CROWD_SIZE
            ? ` <span class="prob-low-sample">low sample</span>` : '';
          crowdHtml = `
            <div class="prob-factor-row">
              <span class="prob-factor-label">Crowd&thinsp;(${cal.crowd_n} picks)${lowNote}</span>
              <div class="prob-mini-bar">
                <div class="prob-mini-seg home" style="flex:${cal.crowd_home}"></div>
                <div class="prob-mini-seg draw" style="flex:${cal.crowd_draw}"></div>
                <div class="prob-mini-seg away" style="flex:${cal.crowd_away}"></div>
              </div>
              <span class="prob-factor-pcts">${cH}%&thinsp;/&thinsp;${cD}%&thinsp;/&thinsp;${cA}%</span>
            </div>`;
        } else {
          crowdHtml = `
            <div class="prob-factor-row">
              <span class="prob-factor-label">Crowd</span>
              <span class="prob-no-crowd">No picks at kickoff</span>
            </div>`;
        }

        return `
          <div class="prob-bar-section" onclick="event.stopPropagation();toggleProbFactors(${matchId})">
            <div class="prob-bar-header">
              <span class="prob-bar-title">Pre-match prediction</span>
              <i class="ti ti-chevron-down prob-chevron" id="prob-icon-${matchId}"></i>
            </div>
            <div class="prob-bar">
              <div class="prob-seg home" style="flex:${cal.blend_home}"></div>
              <div class="prob-seg draw" style="flex:${cal.blend_draw}"></div>
              <div class="prob-seg away" style="flex:${cal.blend_away}"></div>
            </div>
            <div class="prob-label-row">
              <span>${homeName}&ensp;${hPct}%</span>
              <span>Draw&ensp;${dPct}%</span>
              <span>${aPct}%&ensp;${awayName}</span>
            </div>
            <div class="prob-factors" id="prob-factors-${matchId}" hidden>
              <div class="prob-factor-row">
                <span class="prob-factor-label">Model&thinsp;(Elo)</span>
                <div class="prob-mini-bar">
                  <div class="prob-mini-seg home" style="flex:${cal.elo_home}"></div>
                  <div class="prob-mini-seg draw" style="flex:${cal.elo_draw}"></div>
                  <div class="prob-mini-seg away" style="flex:${cal.elo_away}"></div>
                </div>
                <span class="prob-factor-pcts">${eH}%&thinsp;/&thinsp;${eD}%&thinsp;/&thinsp;${eA}%</span>
              </div>
              ${crowdHtml}
            </div>
          </div>`;
      }

      const homeR = eloRatings[homeCode];
      const awayR = eloRatings[awayCode];
      if (!homeR || !awayR) return '';  // ratings not loaded yet

      const crowd  = crowdPickMap[matchId] ?? null;
      const probs  = MatchProbs.getMatchProbs(homeR, awayR, crowd);
      const b = probs.blended, e = probs.elo;

      const hPct = Math.round(b.homeWin * 100);
      const dPct = Math.round(b.draw    * 100);
      const aPct = Math.round(b.awayWin * 100);
      const eH   = Math.round(e.homeWin * 100);
      const eD   = Math.round(e.draw    * 100);
      const eA   = Math.round(e.awayWin * 100);

      // Crowd factor row
      let crowdHtml;
      if (crowd) {
        const cH = Math.round(crowd.homeWin * 100);
        const cD = Math.round(crowd.draw    * 100);
        const cA = Math.round(crowd.awayWin * 100);
        const lowNote = crowd.pickCount < MatchProbs.MIN_CROWD_SIZE
          ? ` <span class="prob-low-sample">low sample</span>` : '';
        crowdHtml = `
          <div class="prob-factor-row">
            <span class="prob-factor-label">Crowd&thinsp;(${crowd.pickCount} picks)${lowNote}</span>
            <div class="prob-mini-bar">
              <div class="prob-mini-seg home" style="flex:${crowd.homeWin}"></div>
              <div class="prob-mini-seg draw" style="flex:${crowd.draw}"></div>
              <div class="prob-mini-seg away" style="flex:${crowd.awayWin}"></div>
            </div>
            <span class="prob-factor-pcts">${cH}%&thinsp;/&thinsp;${cD}%&thinsp;/&thinsp;${cA}%</span>
          </div>`;
      } else {
        crowdHtml = `
          <div class="prob-factor-row">
            <span class="prob-factor-label">Crowd</span>
            <span class="prob-no-crowd">No picks yet</span>
          </div>`;
      }

      return `
        <div class="prob-bar-section" onclick="event.stopPropagation();toggleProbFactors(${matchId})">
          <div class="prob-bar-header">
            <span class="prob-bar-title">Win probability</span>
            <i class="ti ti-chevron-down prob-chevron" id="prob-icon-${matchId}"></i>
          </div>
          <div class="prob-bar">
            <div class="prob-seg home" style="flex:${b.homeWin}"></div>
            <div class="prob-seg draw" style="flex:${b.draw}"></div>
            <div class="prob-seg away" style="flex:${b.awayWin}"></div>
          </div>
          <div class="prob-label-row">
            <span>${homeName}&ensp;${hPct}%</span>
            <span>Draw&ensp;${dPct}%</span>
            <span>${aPct}%&ensp;${awayName}</span>
          </div>
          <div class="prob-factors" id="prob-factors-${matchId}" hidden>
            <div class="prob-factor-row">
              <span class="prob-factor-label">Model&thinsp;(Elo)</span>
              <div class="prob-mini-bar">
                <div class="prob-mini-seg home" style="flex:${e.homeWin}"></div>
                <div class="prob-mini-seg draw" style="flex:${e.draw}"></div>
                <div class="prob-mini-seg away" style="flex:${e.awayWin}"></div>
              </div>
              <span class="prob-factor-pcts">${eH}%&thinsp;/&thinsp;${eD}%&thinsp;/&thinsp;${eA}%</span>
            </div>
            ${crowdHtml}
          </div>
        </div>`;
    }

    function toggleProbFactors(matchId) {
      const open = probExpanded.has(matchId);
      if (open) probExpanded.delete(matchId); else probExpanded.add(matchId);
      const factors = document.getElementById(`prob-factors-${matchId}`);
      const icon    = document.getElementById(`prob-icon-${matchId}`);
      if (factors) factors.toggleAttribute('hidden', open);
      if (icon)    icon.classList.toggle('open', !open);
    }

    function buildGroupMatchRow(m, predMap, results) {
      const [id, date, , group, homeCode, awayCode, venue, city] = m;
      const home = getTeam(homeCode);
      const away = getTeam(awayCode);
      const result = results[id];
      const probBarHtml = buildProbBar(id, homeCode, awayCode, result);
      return buildMatchRowHtml(id, date, home, away, result, predMap[id] || [], `Match ${id} · Group ${group}`, venue, city, 7, 5, probBarHtml);
    }

    function buildKoMatchRow(m, predMap, results) {
      const result = results[m.id];
      const homeCode = m.home_team || result?.home_team || null;
      const awayCode = m.away_team || result?.away_team || null;
      const home = homeCode ? getTeam(homeCode) : { flag: 'ðŸ³ï¸', name: 'TBD', code: 'TBD' };
      const away = awayCode ? getTeam(awayCode) : { flag: 'ðŸ³ï¸', name: 'TBD', code: 'TBD' };
      const exactPts = m.id === 104 ? 10 : 7;
      const resultPts = m.id === 104 ? 7 : 5;
      const probBarHtml = (homeCode && awayCode) ? buildProbBar(m.id, homeCode, awayCode, result) : '';
      return buildMatchRowHtml(m.id, m.date, home, away, result, predMap[m.id] || [], m.match_label, '', '', exactPts, resultPts, probBarHtml);
    }

    function buildMatchRowHtml(id, date, home, away, result, preds, label, venue, city, exactPts, resultPts, probBarHtml = '') {
      const hasResult  = result && result.home_score !== null;
      const isLive     = result?.status === 'IN_PLAY' || result?.status === 'PAUSED' || result?.status === 'LIVE';
      const isFinished = hasResult && result.status === 'FINISHED';
      const kickoff = getMatchKickoff(id);

      let statusBadge = kickoff
        ? `<span class="chip chip-grey">${kickoff.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</span>`
        : `<span class="chip chip-grey">${formatDate(date)}</span>`;
      let scoreLine = `<span class="match-vs-text">VS</span>`;

      if (isLive) {
        statusBadge = `<div class="live-badge"><div class="live-dot-sm"></div>LIVE</div>`;
        scoreLine = `<div class="match-scoreline live">${result.home_score} – ${result.away_score}</div>`;
      } else if (isFinished) {
        statusBadge = `<span class="finished-badge">FT</span>`;
        scoreLine = `<div class="match-scoreline">${result.home_score} – ${result.away_score}</div>`;
      }

      let predsHtml = '';
      const autoPill = isFinished && currentUserId && !preds.some(p => p.userId === currentUserId)
        ? `<span class="pred-pill auto"><span class="pred-name"><strong>You</strong>:</span>4–4 <span class="auto-tag">auto</span></span>`
        : '';
      if (preds.length > 0 || autoPill) {
        const pills = [autoPill, ...preds.map(p => {
          const predText = `${p.home}–${p.away}`;
          let cls = '';
          if (isFinished) {
            const actH = result.home_score, actA = result.away_score;
            if (p.home === actH && p.away === actA) cls = 'exact';
            else if (Math.sign(p.home - p.away) === Math.sign(actH - actA)) cls = 'result';
            else cls = 'wrong';
          } else if (isLive) {
            cls = 'live-wait';
          } else {
            cls = 'pending';
          }
          const isYou = p.userId === currentUserId;
          const nameHtml = isYou ? `${p.name} <span class="you-badge">YOU</span>` : (p.isAi ? `${p.name} <span class="ai-tag">AI</span>` : p.name);
          return `<span class="pred-pill ${cls}${p.isAi ? ' ai-pill' : ''}"><span class="pred-name">${nameHtml}:</span>${predText}</span>`;
        })].filter(Boolean).join('');
        predsHtml = `<div class="preds-row"><span class="preds-label"><i class="ti ti-list-check"></i> Picks:</span>${pills}</div>`;
      }

      return `
        <div class="match-row ${isLive ? 'live' : isFinished ? 'finished' : ''}" data-match-id="${id}">
          <div class="match-row-main">
            <div class="match-info">
              <div class="match-num">${label}</div>
              <div class="match-kickoff">${
                isLive  ? `<span class="live-badge sm"><span class="live-dot-sm"></span>LIVE</span>` :
                kickoff ? formatLocalKickoff(kickoff) :
                          formatDate(date)
              }</div>
              ${venue ? `<div class="match-venue">${venue}${city ? `, ${city}` : ''}</div>` : ''}
            </div>
            <div class="match-team-block">
              ${teamFlagImg(home.code)}
              <span class="match-team-name">${home.name}</span>
            </div>
            <div class="match-score-centre">
              ${scoreLine}
              ${statusBadge}
            </div>
            <div class="match-team-block right">
              ${teamFlagImg(away.code)}
              <span class="match-team-name">${away.name}</span>
            </div>
            <div class="match-status-block"></div>
          </div>
          ${probBarHtml}
          ${predsHtml}
        </div>
      `;
    }

    function setFilter(val) {
      currentFilter = val;
      document.querySelectorAll('.filter-bar [data-filter]').forEach(b => {
        b.className = b.dataset.filter === currentFilter ? 'btn btn-lime btn-sm' : 'btn btn-outline btn-sm';
      });
      const sel = document.getElementById('roundFilterSelect');
      if (sel) sel.value = currentFilter;
      render();
    }

    document.querySelector('.filter-bar').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      setFilter(btn.dataset.filter);
    });

    document.getElementById('roundFilterSelect').addEventListener('change', e => {
      setFilter(e.target.value);
    });

    // Click any match row to open the predictions modal
    document.getElementById('matchCentreContent').addEventListener('click', e => {
      if (e.target.closest('button, a, select')) return;
      const row = e.target.closest('.match-row[data-match-id]');
      if (!row) return;
      openMatchModal(parseInt(row.dataset.matchId));
    });

    function jumpToCurrent() {
      const now = Date.now();
      const rows = [...document.querySelectorAll('.match-row[data-match-id]')];
      if (!rows.length) return;

      // Priority 1: any live match
      let target = rows.find(r => {
        const res = allResults[parseInt(r.dataset.matchId)];
        return res?.status === 'IN_PLAY' || res?.status === 'PAUSED' || res?.status === 'LIVE';
      });

      if (!target) {
        // Priority 2: earliest upcoming match (kickoff >= now)
        const sorted = rows
          .map(r => ({ el: r, kickoff: getMatchKickoff(parseInt(r.dataset.matchId)) }))
          .sort((a, b) => {
            const ta = a.kickoff ? a.kickoff.getTime() : Infinity;
            const tb = b.kickoff ? b.kickoff.getTime() : Infinity;
            return ta - tb;
          });
        const upcoming = sorted.find(c => c.kickoff && c.kickoff.getTime() >= now);
        target = (upcoming || sorted[sorted.length - 1])?.el;
      }

      target?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    document.querySelector('.filter-bar').addEventListener('click', e => {
      const sortBtn = e.target.closest('[data-sort]');
      if (sortBtn) {
        currentSort = sortBtn.dataset.sort;
        document.querySelectorAll('[data-sort]').forEach(b => {
          b.classList.toggle('active', b.dataset.sort === currentSort);
        });
        render();
        return;
      }
      if (e.target.closest('#jumpCurrentBtn')) jumpToCurrent();
    });

    function applyFilterLayout() {
      const mobile = window.innerWidth <= 600;
      const btns = document.querySelector('.mc-filter-btns');
      const sel  = document.getElementById('roundFilterSelect');
      if (btns) btns.style.display = mobile ? 'none' : 'flex';
      if (sel)  sel.style.display  = mobile ? 'block' : 'none';
    }
    applyFilterLayout();
    window.addEventListener('resize', applyFilterLayout);

    DB.subscribeToMatchResults(() => {
      DB.getMatchResults().then(r => {
        allResults = {};
        r.forEach(res => { allResults[res.match_id] = res; });
        render();
      });
    });

    load();
  </script>
</body>
</html>
