<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Knockout Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=19">
  <style>
    .ko-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .ko-match-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--grey-400); }
    .ko-teams-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .ko-team {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .ko-team.away { flex-direction: row-reverse; text-align: right; }
    .ko-team-flag { font-size: 1.3rem; }
    .ko-score-inputs {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      justify-content: center;
    }
    .score-num {
      width: 46px;
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      padding: 0.3rem;
      border: 1.5px solid var(--grey-300);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .score-num:focus { border-color: var(--ink); }
    .score-num:disabled { background: var(--grey-100); color: var(--grey-400); }
    .score-sep { font-size: 1.2rem; color: var(--grey-400); }
    .ko-result {
      text-align: center;
      font-size: 0.72rem;
      color: var(--grey-500);
      margin-top: 0.4rem;
      font-weight: 500;
    }
    .tbd-notice {
      text-align: center;
      padding: 0.875rem 0.5rem;
      font-size: 0.82rem;
      color: var(--grey-400);
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <a href="predictions.html">Predictions</a> &rsaquo; <span id="breadcrumbRound">Knockout</span></nav>
      <h1 class="page-title" id="pageTitle">Knockout Stage</h1>
      <p class="page-desc" id="pageSubtitle">Loading&hellip;</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:6rem">

      <div id="lockedBanner" class="alert alert-info hidden mb-3">
        <i class="ti ti-lock"></i> This round is locked. Your predictions are saved and can no longer be edited.
      </div>

      <div class="info-box mb-3" id="scoringNote">
        <strong>Scoring:</strong> 7 pts for exact score &middot; 5 pts for correct result
      </div>

      <div class="knockout-grid" id="matchesContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

      <div class="sticky-dock" id="stickySave" style="display:none">
        <div class="sticky-dock-inner">
          <div class="dock-status" id="saveStatus">Make your predictions</div>
          <div class="dock-actions">
            <a href="predictions.html" class="btn btn-ghost btn-sm"><i class="ti ti-arrow-left"></i> Back</a>
            <button class="btn btn-lime" id="saveBtn"><i class="ti ti-device-floppy"></i> Save Predictions</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=19"></script>
  <script src="../js/data.js?v=19"></script>
  <script src="../js/supabase-client.js?v=19"></script>
  <script src="../js/scoring.js?v=19"></script>
  <script src="../js/ui.js?v=19"></script>
  <script>
    DB.initSupabase();
    Nav.render('predictions');

    const filename = window.location.pathname.split('/').pop().replace('.html','');
    const ROUND_MAP = {
      round4: { id:'round4', name:'Round of 32',    roundKey:'round32',      exactPts:7,  resultPts:5 },
      round5: { id:'round5', name:'Round of 16',    roundKey:'round16',      exactPts:7,  resultPts:5 },
      round6: { id:'round6', name:'Quarter Finals', roundKey:'quarterfinals',exactPts:7,  resultPts:5 },
      round7: { id:'round7', name:'Semi Finals',    roundKey:'semifinals',   exactPts:7,  resultPts:5 },
      round8: { id:'round8', name:'The Final',      roundKey:'final',        exactPts:10, resultPts:7 },
    };

    const roundMeta = ROUND_MAP[filename] || ROUND_MAP.round4;
    const { id: roundId, name: roundName, roundKey, exactPts, resultPts } = roundMeta;

    document.getElementById('breadcrumbRound').textContent = roundName;
    document.getElementById('pageTitle').textContent = roundName;
    document.getElementById('scoringNote').innerHTML =
      `<strong>Scoring:</strong> <strong>${exactPts} pts</strong> for exact score &middot; <strong>${resultPts} pts</strong> for correct result`;

    const roundData = KNOCKOUT_ROUNDS[roundKey];
    if (roundData) {
      document.getElementById('pageSubtitle').textContent =
        `${roundData.matches.length} matches &middot; Up to ${roundData.matches.length * exactPts} pts`;
    }

    let userId = null;
    let saved = {};
    let results = {};
    let locked = false;

    function getMatchKey(id) { return `m${id}`; }

    async function load() {
      const session = await requireAuthFromPages();
      if (!session) return;
      userId = session.user.id;

      await DB.initRoundOverrides();
      locked = DB.isRoundLocked(roundId);
      if (locked) document.getElementById('lockedBanner').classList.remove('hidden');
      else document.getElementById('stickySave').style.display = 'block';

      const [preds, matchResults] = await Promise.all([
        DB.getUserPredictions(userId, roundId).catch(() => []),
        DB.getMatchResults().catch(() => [])
      ]);

      preds.forEach(p => {
        try { saved[p.question_key] = JSON.parse(p.value); }
        catch { saved[p.question_key] = p.value; }
      });

      matchResults.forEach(r => { results[r.match_id] = r; });
      renderMatches();
    }

    function renderMatches() {
      const container = document.getElementById('matchesContent');
      if (!roundData) { container.innerHTML = '<p class="text-muted">No matches found.</p>'; return; }

      container.innerHTML = roundData.matches.map(m => {
        const result  = results[m.id];
        const pred    = saved[getMatchKey(m.id)] || {};
        const homeVal = pred.home !== undefined ? pred.home : '';
        const awayVal = pred.away !== undefined ? pred.away : '';

        const homeTeam = m.home_team ? getTeam(m.home_team) : null;
        const awayTeam = m.away_team ? getTeam(m.away_team) : null;
        const hasTeams  = homeTeam && awayTeam;
        const hasResult = result && result.home_score !== null;

        let teamRowHtml = '';
        if (hasTeams) {
          teamRowHtml = `
            <div class="ko-teams-row">
              <div class="ko-team">
                ${teamFlagImg(homeTeam.code)}
                <span>${homeTeam.name}</span>
              </div>
              <div class="ko-score-inputs">
                <input type="number" id="h_${m.id}" class="score-num" min="0" max="20"
                  inputmode="numeric" pattern="[0-9]*"
                  value="${homeVal}" placeholder="0" ${locked ? 'disabled' : ''}>
                <span class="score-sep">–</span>
                <input type="number" id="a_${m.id}" class="score-num" min="0" max="20"
                  inputmode="numeric" pattern="[0-9]*"
                  value="${awayVal}" placeholder="0" ${locked ? 'disabled' : ''}>
              </div>
              <div class="ko-team away">
                ${teamFlagImg(awayTeam.code)}
                <span>${awayTeam.name}</span>
              </div>
            </div>
          `;
        } else {
          teamRowHtml = `
            <div class="tbd-notice">
              <i class="ti ti-clock"></i> Teams TBD — ${m.note || 'Drawn once qualified'}
              ${!locked ? `
                <div class="ko-score-inputs" style="justify-content:center;margin-top:0.625rem">
                  <input type="number" id="h_${m.id}" class="score-num" min="0" max="20"
                    inputmode="numeric" pattern="[0-9]*"
                    value="${homeVal}" placeholder="–" style="opacity:0.5">
                  <span class="score-sep">–</span>
                  <input type="number" id="a_${m.id}" class="score-num" min="0" max="20"
                    inputmode="numeric" pattern="[0-9]*"
                    value="${awayVal}" placeholder="–" style="opacity:0.5">
                </div>
                <small style="font-size:0.68rem;color:var(--grey-400)">You can enter score now or wait</small>
              ` : ''}
            </div>
          `;
        }

        let resultHtml = '';
        if (hasResult && homeVal !== '' && awayVal !== '') {
          const actH = result.home_score, actA = result.away_score;
          const pH = parseInt(homeVal), pA = parseInt(awayVal);
          let pts = 0, label = '<i class="ti ti-x"></i> Wrong';
          if (!isNaN(pH) && !isNaN(pA)) {
            if (pH === actH && pA === actA) { pts = exactPts; label = '<i class="ti ti-check"></i> Exact!'; }
            else if (Math.sign(pH - pA) === Math.sign(actH - actA)) { pts = resultPts; label = '<i class="ti ti-check"></i> Result'; }
          }
          resultHtml = `
            <div class="ko-result">
              Result: <strong>${actH}–${actA}</strong>
              ${pts > 0
                ? `<span style="color:var(--green);margin-left:0.4rem">+${pts} pts &middot; ${label}</span>`
                : `<span style="color:var(--red);margin-left:0.4rem">${label}</span>`}
            </div>
          `;
        } else if (hasResult) {
          resultHtml = `<div class="ko-result">Result: <strong>${result.home_score}–${result.away_score}</strong></div>`;
        }

        return `
          <div class="ko-card ${!hasTeams && !locked ? 'tbd' : ''}">
            <div class="ko-card-top">
              <span class="ko-match-label">${m.match_label} &middot; ${formatDate(m.date || '2026-07-01')}</span>
              ${hasResult ? '<span class="finished-badge">Final</span>' : '<span class="chip chip-grey">Upcoming</span>'}
            </div>
            ${teamRowHtml}
            ${resultHtml}
          </div>
        `;
      }).join('');
    }

    async function savePredictions() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> Saving&hellip;';

      const updates = [];
      if (roundData) {
        roundData.matches.forEach(m => {
          const hEl = document.getElementById(`h_${m.id}`);
          const aEl = document.getElementById(`a_${m.id}`);
          if (!hEl || !aEl || hEl.value === '' || aEl.value === '') return;
          updates.push(DB.savePrediction(userId, roundId, getMatchKey(m.id), {
            home: parseInt(hEl.value), away: parseInt(aEl.value)
          }));
        });
      }

      try {
        await Promise.all(updates);
        Toast.success(`Saved ${updates.length} predictions!`);
        document.getElementById('saveStatus').textContent = 'Saved at ' + new Date().toLocaleTimeString();
      } catch (err) {
        Toast.error('Save failed: ' + err.message);
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save Predictions';
    }

    document.getElementById('saveBtn')?.addEventListener('click', savePredictions);
    DB.subscribeToMatchResults(() => load());
    load();
  </script>
</body>
</html>
