<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=29">
  <style>
    .round-entry-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--grey-300);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      transition: background 0.2s;
    }
    .round-entry-card:hover::before { background: var(--ink); }
    .round-entry-card.complete::before { background: var(--green); }

    /* ---- Lock pills ---- */
    .lock-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      border-radius: 9999px;
      padding: 0.35rem 0.85rem 0.35rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
      margin: 0.375rem 0 0.625rem;
    }
    .lock-pill > i { font-size: 1rem; flex-shrink: 0; }
    .lock-pill--open     { background: rgba(200,241,53,0.18); color: #5c7000; border: 1px solid rgba(200,241,53,0.45); }
    .lock-pill--locked   { background: var(--grey-100); color: var(--grey-500); border: 1px solid var(--grey-200); }
    .lock-pill--upcoming { background: var(--grey-50,#f9f9f9); color: var(--grey-400); border: 1px solid var(--grey-200); }
    .lock-pill-status { display: block; }
    .lock-pill-detail { display: block; font-size: 0.68rem; font-weight: 400; opacity: 0.8; margin-top: 0.1rem; }

    @keyframes lockPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(200,241,53,0.55); }
      50%       { opacity: 0.82; box-shadow: 0 0 0 5px rgba(200,241,53,0); }
    }
    .lock-pill--open.urgent { animation: lockPulse 1.8s ease-in-out infinite; }
    .round-card.not-yet { opacity: 0.6; cursor: default; pointer-events: none; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb" aria-label="breadcrumb">WC2026 &rsaquo; <span>Predictions</span></nav>
      <h1 class="page-title">Your Predictions</h1>
      <p class="page-desc">Select a round to submit or edit your predictions</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem">

      <!-- Stats -->
      <div class="stats-strip mb-4" id="statsStrip">
        <div class="stat-box">
          <div class="stat-value" id="totalPts">—</div>
          <div class="stat-label">Total Points</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="yourRank">—</div>
          <div class="stat-label">Your Rank</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="roundsDone">0</div>
          <div class="stat-label">Rounds Submitted</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="roundsOpen">—</div>
          <div class="stat-label">Rounds Open</div>
        </div>
      </div>

      <!-- Rounds grid -->
      <div class="rounds-grid" id="roundsGrid">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

      <p style="margin-top:1.5rem;font-size:0.82rem;color:var(--grey-500);text-align:center">
        <i class="ti ti-chart-treemap" style="vertical-align:-0.1em"></i>
        Not sure what to pick? <a href="calculator.html" style="color:var(--ink);font-weight:600">Try the Calculator</a> — play out every result and push the scenario straight to your predictions.
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=29"></script>
  <script src="../js/data.js?v=29"></script>
  <script src="../js/supabase-client.js?v=29"></script>
  <script src="../js/scoring.js?v=29"></script>
  <script src="../js/ui.js?v=29"></script>
  <script>
    DB.initSupabase();
    Nav.render('predictions');

    const ROUNDS_META = [
      { id:'round1', icon:'ti-help-octagon', title:'Pre-Tournament',      desc:'Winner, runner-up, beaten semi-finalists, golden boot, top scorer & more.', points:150, questions:13, page:'round1.html' },
      { id:'round2', icon:'ti-layout-grid', title:'Group Winners',         desc:'Predict the winner and runner-up of all 12 groups (A–L). Bonus points for perfection.', points:240, questions:24, page:'round2.html' },
      { id:'round3', icon:'ti-ball-football', title:'Group Stage Scores',  desc:'Exact score predictions for all 72 group stage matches. 7pts exact, 5pts result.', points:504, questions:72, page:'round3.html' },
      { id:'round4', icon:'ti-flame',        title:'Round of 32',          desc:'Predict scores for the 16 knockout matches. Teams revealed once drawn.', points:112, questions:16, page:'round4.html' },
      { id:'round5', icon:'ti-bolt',         title:'Round of 16',          desc:'8 matches. Exact score = 7pts, correct result = 5pts.', points:56, questions:8, page:'round5.html' },
      { id:'round6', icon:'ti-star',         title:'Quarter Finals',       desc:'4 matches. 7pts exact, 5pts correct result.', points:28, questions:4, page:'round6.html' },
      { id:'round7', icon:'ti-medal',        title:'Semi Finals',          desc:'2 matches. 7pts exact, 5pts correct result.', points:14, questions:2, page:'round7.html' },
      { id:'round8', icon:'ti-trophy',       title:'The Final',            desc:'One match to rule them all. 10pts exact score, 7pts correct result.', points:10, questions:1, page:'round8.html' },
    ];


    async function load() {
      const session = await requireAuthFromPages();
      if (!session) return;
      const userId = session.user.id;

      const [userScore, allPreds] = await Promise.all([
        DB.getUserScore(userId).catch(() => null),
        DB.getUserPredictions(userId).catch(() => [])
      ]);

      if (userScore) document.getElementById('totalPts').textContent = userScore.total_points || 0;

      const submittedRounds = new Set(allPreds.map(p => p.round));
      document.getElementById('roundsDone').textContent = submittedRounds.size;

      try {
        const scores = await DB.getScores();
        const rank = scores.findIndex(s => s.user_id === userId) + 1;
        document.getElementById('yourRank').textContent = rank > 0 ? `#${rank}` : '—';
      } catch (_) {}

      await DB.initRoundOverrides();
      const openRounds = ROUNDS_META.filter(r => !DB.isRoundLocked(r.id) && bracketReady(r.id)).length;
      document.getElementById('roundsOpen').textContent = openRounds;

      const _now = Date.now();

      const grid = document.getElementById('roundsGrid');
      grid.innerHTML = ROUNDS_META.map((round, idx) => {
        const lockDate  = DB.getRoundLockDate(round.id);
        const lockTime  = lockDate?.getTime();
        const locked     = DB.isRoundLocked(round.id);
        const forceOpen  = !locked && lockTime && lockTime <= _now;
        const bracketSet = bracketReady(round.id);
        const isOpen     = !locked && bracketSet;
        const submitted = submittedRounds.has(round.id);
        const preds     = allPreds.filter(p => p.round === round.id);
        const progress  = Math.min(100, Math.round((preds.length / round.questions) * 100));
        const hasScore  = userScore && userScore[round.id + '_points'] != null;

        const urgent = isOpen && !forceOpen && lockTime && (lockTime - _now) < 86400000;

        let lockPill;
        if (locked) {
          lockPill = `
            <div class="lock-pill lock-pill--locked">
              <i class="ti ti-lock"></i>
              <div>
                <span class="lock-pill-status">Locked${hasScore ? ' &middot; Scored' : ''}</span>
              </div>
            </div>`;
        } else if (!bracketSet) {
          lockPill = `
            <div class="lock-pill lock-pill--upcoming">
              <i class="ti ti-clock"></i>
              <div>
                <span class="lock-pill-status">Opens once the bracket is set</span>
              </div>
            </div>`;
        } else {
          lockPill = `
            <div class="lock-pill lock-pill--open${urgent ? ' urgent' : ''}">
              <i class="ti ti-lock-open"></i>
              <div>
                <span class="lock-pill-status">Open</span>
                <span class="lock-pill-detail">${forceOpen ? 'Admin override' : `Locks in <span class="lock-cd" data-lock="${lockDate.toISOString()}"></span>`}</span>
              </div>
            </div>`;
        }

        const completedClass = locked ? 'locked' : !bracketSet ? 'not-yet' : (submitted && progress >= 100) ? 'complete' : '';

        return `
          <a class="round-card ${completedClass}" href="${round.page}">
            <span class="round-num-bg">${idx + 1}</span>
            <div class="round-icon"><i class="ti ${round.icon}"></i></div>
            <div class="round-title">${round.title}</div>
            ${lockPill}
            <p class="round-desc">${round.desc}</p>
            <div class="progress-bar">
              <div class="progress-fill ${progress >= 100 ? 'complete' : ''}" style="width:${locked ? 100 : progress}%"></div>
            </div>
            <div class="round-meta">
              <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
                ${submitted ? '<span class="chip chip-green"><i class="ti ti-check"></i> Submitted</span>' : ''}
              </div>
              <span class="points-avail">Up to ${round.points} pts</span>
            </div>
          </a>
        `;
      }).join('');

      // Tick open-round countdowns live
      function tickCountdowns() {
        document.querySelectorAll('.lock-cd[data-lock]').forEach(el => {
          const diff = new Date(el.dataset.lock) - new Date();
          if (diff <= 0) { el.textContent = 'now'; return; }
          const d = Math.floor(diff / 86400000);
          const h = Math.floor((diff % 86400000) / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          el.textContent = d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${m}m` : `${m}m`;
          el.closest('.lock-pill')?.classList.toggle('urgent', diff < 86400000);
        });
      }
      tickCountdowns();
      const _cdTick = setInterval(tickCountdowns, 10_000);
      window.addEventListener('pagehide', () => clearInterval(_cdTick));
    }

    load();
  </script>
</body>
</html>
