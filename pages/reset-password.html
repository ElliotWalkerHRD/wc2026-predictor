<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=7">
  <style>
    body { background: var(--bg); }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo a {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 2rem;
      color: var(--ink);
      text-decoration: none;
    }

    .auth-logo a .lime { color: #5a6e00; }

    .auth-logo p {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--grey-400);
      margin-top: 0.25rem;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-lg);
    }

    .auth-card-title {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      margin: 0 0 0.35rem;
    }

    .auth-card-desc {
      font-size: 0.875rem;
      color: var(--grey-500);
      margin: 0 0 1.5rem;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 0;
      color: var(--grey-400);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="../index.html"><span class="lime">WC</span> 2026</a>
        <p>World Cup Prediction Game</p>
      </div>

      <div class="auth-card">
        <h2 class="auth-card-title">Reset your password</h2>

        <!-- Shown while waiting for Supabase to process the recovery token -->
        <div id="stateChecking">
          <div class="spinner-wrap">
            <div class="spinner"></div>
            Verifying reset link&hellip;
          </div>
        </div>

        <!-- Shown if the link is invalid or expired -->
        <div id="stateInvalid" style="display:none">
          <div class="alert alert-error" style="margin-bottom:1.25rem">
            <i class="ti ti-alert-triangle"></i>
            This reset link has expired or is invalid. Reset links are single-use and expire after 1 hour.
          </div>
          <a href="auth.html" class="btn btn-outline btn-block">
            <i class="ti ti-arrow-left"></i> Back to sign in
          </a>
        </div>

        <!-- Shown once the PASSWORD_RECOVERY event fires -->
        <div id="stateForm" style="display:none">
          <p class="auth-card-desc">Enter your new password below.</p>
          <div id="resetAlert"></div>
          <div class="form-group">
            <label class="form-label" for="newPassword">New password</label>
            <input class="form-control" type="password" id="newPassword" placeholder="Min. 8 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm new password</label>
            <input class="form-control" type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
          </div>
          <button class="btn btn-lime btn-block btn-lg" id="resetBtn">
            Set new password <i class="ti ti-check"></i>
          </button>
        </div>

        <!-- Shown on success -->
        <div id="stateSuccess" style="display:none">
          <div class="alert alert-success" style="margin-bottom:1.25rem">
            <i class="ti ti-check"></i>
            Password updated! Redirecting you to sign in&hellip;
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=4"></script>
  <script src="../js/data.js?v=4"></script>
  <script src="../js/supabase-client.js?v=5"></script>
  <script src="../js/ui.js?v=4"></script>
  <script>
    const sb = DB.initSupabase();

    function show(id) {
      ['stateChecking','stateInvalid','stateForm','stateSuccess'].forEach(s => {
        document.getElementById(s).style.display = s === id ? '' : 'none';
      });
    }

    function showAlert(message, type = 'error') {
      const icon = type === 'error' ? 'ti-alert-triangle' : 'ti-check';
      document.getElementById('resetAlert').innerHTML =
        `<div class="alert alert-${type}"><i class="ti ${icon}"></i>${message}</div>`;
    }

    let handled = false;

    // Supabase processes the recovery fragment automatically on client init
    // and fires PASSWORD_RECOVERY via onAuthStateChange.
    sb.auth.onAuthStateChange((event, session) => {
      if (handled) return;
      if (event === 'PASSWORD_RECOVERY') {
        handled = true;
        show('stateForm');
      } else if (event === 'SIGNED_IN' && session) {
        // Some Supabase versions fire SIGNED_IN for recovery; treat the same way.
        // Only do this if we know we're on a recovery page (hash contains type=recovery).
        const hash = window.location.hash;
        if (hash.includes('type=recovery')) {
          handled = true;
          show('stateForm');
        }
      }
    });

    // Fallback: if no recovery event fires within 4s, the link is invalid/expired.
    setTimeout(() => {
      if (!handled) {
        handled = true;
        show('stateInvalid');
      }
    }, 4000);

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const pwd  = document.getElementById('newPassword').value;
      const pwd2 = document.getElementById('confirmPassword').value;
      document.getElementById('resetAlert').innerHTML = '';

      if (pwd.length < 8) return showAlert('Password must be at least 8 characters.');
      if (pwd !== pwd2)   return showAlert('Passwords do not match.');

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.innerHTML = 'Updating&hellip;';

      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) {
        showAlert(error.message || 'Update failed. Please try again.');
        btn.disabled = false;
        btn.innerHTML = 'Set new password <i class="ti ti-check"></i>';
        return;
      }

      show('stateSuccess');
      await sb.auth.signOut();
      setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
    });

    ['newPassword','confirmPassword'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('resetBtn').click();
      });
    });
  </script>
</body>
</html>
