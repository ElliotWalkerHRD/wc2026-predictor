<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=50">
  <style>
    /* Tabs */
    .scenario-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--grey-200); margin-bottom: 1.5rem; overflow-x: auto; }
    .s-tab-btn {
      background: none; border: none; padding: 0.6rem 1.1rem; font-size: 0.82rem; font-weight: 600;
      color: var(--grey-500); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; white-space: nowrap;
    }
    .s-tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
    .s-tab-btn:hover:not(.active) { color: var(--ink); }
    .s-tab-content { display: none; }
    .s-tab-content.active { display: block; }
    .s-clear-all-btn {
      margin-left: auto; background: none; border: none; padding: 0.5rem 0.75rem;
      font-size: 0.75rem; font-weight: 600; color: var(--grey-400); cursor: pointer;
      white-space: nowrap; display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0;
    }
    .s-clear-all-btn:hover { color: #ef4444; }
    .clear-group-btn {
      background: none; border: 1px solid rgba(255,255,255,0.28); border-radius: 4px;
      color: rgba(255,255,255,0.6); font-size: 0.62rem; font-weight: 600;
      padding: 0.12rem 0.45rem; cursor: pointer; letter-spacing: 0.03em; line-height: 1.4;
    }
    .clear-group-btn:hover { background: rgba(255,255,255,0.12); color: var(--white); }

    /* Load picks bar */
    .load-picks-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 1.25rem; padding: 0.65rem 1rem;
      background: var(--grey-100); border-radius: var(--radius-md); border: 1px solid var(--grey-200);
    }
    .load-picks-bar span { font-size: 0.82rem; color: var(--grey-500); }

    /* Group stage grid */
    .groups-input-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem;
    }
    @media (max-width: 800px) { .groups-input-grid { grid-template-columns: 1fr; } }

    .scen-group-card { border: 1px solid var(--grey-300); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
    .scen-group-header {
      background: var(--ink); color: var(--white); padding: 0.45rem 0.85rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .scen-group-label { font-family: var(--font-serif); font-size: 1rem; }
    .scen-group-count { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em; color: rgba(255,255,255,0.55); }

    /* Fixture rows */
    .fixture-row {
      display: grid; grid-template-columns: 3.5rem 1fr auto 1fr;
      align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.75rem; border-bottom: 1px solid var(--grey-100); font-size: 0.78rem;
    }
    .fixture-row.fx-locked { opacity: 0.45; }
    .fixture-row:last-of-type { border-bottom: none; }
    .fx-date { font-size: 0.65rem; color: var(--grey-400); white-space: nowrap; }
    .fx-home { display: flex; align-items: center; gap: 0.25rem; justify-content: flex-end; min-width: 0; }
    .fx-away { display: flex; align-items: center; gap: 0.25rem; min-width: 0; }
    .fx-home .team-flag, .fx-away .team-flag { width: 18px; height: 12px; flex-shrink: 0; object-fit: cover; border-radius: 2px; }
    .fx-name { color: var(--grey-700); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fx-score { display: flex; align-items: center; gap: 0.2rem; }
    .fx-score-input {
      width: 32px; height: 28px; text-align: center; border: 1px solid var(--grey-300);
      border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; color: var(--ink);
      background: var(--white); padding: 0;
      -moz-appearance: textfield;
    }
    @media (max-width: 559px) {
      .fx-score-input, .bm-score-input { min-height: 40px; min-width: 40px; }
    }
    .fx-score-input::-webkit-outer-spin-button,
    .fx-score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .fx-score-input:focus { border-color: var(--ink); outline: none; }
    .fx-score-sep { color: var(--grey-400); font-weight: 700; font-size: 0.75rem; }

    /* Mini standings */
    .scen-standings-wrap { overflow-x: auto; border-top: 1px solid var(--grey-200); }
    .scen-standings { width: 100%; border-collapse: collapse; font-size: 0.72rem; table-layout: fixed; }
    .scen-standings th { background: var(--grey-100); color: var(--grey-500); font-weight: 700; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.3rem 0.4rem; text-align: center; border-bottom: 1px solid var(--grey-200); white-space: nowrap; overflow: hidden; }
    .scen-standings th.tc { text-align: left; padding-left: 0.6rem; }
    .scen-standings th:not(.tc) { width: 26px; }
    .scen-standings th:last-child { width: 30px; padding-right: 0.5rem; overflow: visible; }
    .scen-standings td { padding: 0.28rem 0.4rem; text-align: center; border-bottom: 1px solid var(--grey-100); color: var(--grey-700); white-space: nowrap; }
    .scen-standings td:last-child { padding-right: 0.5rem; }
    .scen-standings td.tc { text-align: left; padding-left: 0.6rem; }
    .scen-standings tr.q1, .scen-standings tr.q2 { background: rgba(200,241,53,0.06); }
    .scen-standings tr.q3 { background: rgba(99,102,241,0.04); }
    .pos-num { display: inline-block; width: 14px; color: var(--grey-400); font-size: 0.65rem; }
    .standing-team { display: inline-flex; align-items: center; gap: 0.25rem; vertical-align: middle; }

    /* Bracket */
    .bracket-round { margin-bottom: 2.5rem; }
    .bracket-round-title { font-family: var(--font-serif); font-size: 1.15rem; margin: 0 0 0.75rem; }
    .bracket-matches-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.75rem;
    }
    .bracket-match-card { border: 1px solid var(--grey-200); border-radius: var(--radius-lg); overflow: hidden; }
    .bracket-match-head {
      background: var(--grey-100); padding: 0.35rem 0.75rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap;
      font-size: 0.65rem; color: var(--grey-500); font-weight: 600; letter-spacing: 0.04em;
    }
    .bm-row {
      display: flex; align-items: center; padding: 0.5rem 0.75rem; gap: 0.5rem;
      border-bottom: 1px solid var(--grey-100); font-size: 0.82rem;
    }
    .bm-row:last-of-type { border-bottom: none; }
    .bm-team { flex: 1; display: flex; align-items: center; gap: 0.3rem; }
    .bm-team.home { justify-content: flex-end; flex-direction: row-reverse; }
    .bm-team img { width: 20px; height: 13px; object-fit: cover; border-radius: 2px; }
    .bm-team .tbd { color: var(--grey-400); font-style: italic; font-size: 0.78rem; }
    .bm-score-area { display: flex; align-items: center; gap: 0.25rem; }
    .bm-score-input {
      width: 34px; height: 30px; text-align: center; border: 1px solid var(--grey-300);
      border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; color: var(--ink);
      background: var(--white); padding: 0; -moz-appearance: textfield;
    }
    .bm-score-input::-webkit-outer-spin-button,
    .bm-score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .bm-score-input:focus { border-color: var(--ink); outline: none; }
    .bm-score-input:disabled { background: var(--grey-100); color: var(--grey-400); cursor: not-allowed; }
    .bm-team.bm-advancing .bm-team-name { font-weight: 700; color: var(--ink); }
    .bm-team.bm-advancing { background: rgba(200,241,53,0.08); border-radius: var(--radius-sm); padding: 0 0.2rem; }
    .winner-sel { border-top: 1px solid var(--grey-100); padding: 0.4rem 0.75rem; background: rgba(200,241,53,0.07); font-size: 0.72rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .winner-sel span { color: var(--grey-500); font-weight: 600; }
    .winner-sel label { display: flex; align-items: center; gap: 0.25rem; cursor: pointer; color: var(--grey-700); font-weight: 500; }

    /* Populate tab */
    .populate-section { max-width: 720px; }
    .derived-card { border: 1px solid var(--grey-200); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.75rem; }
    .derived-card-title { background: var(--grey-100); padding: 0.55rem 1rem; font-weight: 700; font-size: 0.8rem; color: var(--grey-600); letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--grey-200); }
    .derived-rows { padding: 0.25rem 0; }
    .derived-row { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 1rem; border-bottom: 1px solid var(--grey-100); font-size: 0.82rem; gap: 0.5rem; }
    .derived-row:last-child { border-bottom: none; }
    .derived-key { color: var(--grey-500); flex-shrink: 0; }
    .derived-val { font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 0.3rem; }
    .derived-val.dim { color: var(--grey-400); font-weight: 400; font-style: italic; }
    .derived-val img { width: 20px; height: 13px; object-fit: cover; border-radius: 2px; }

    .pop-rounds-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 0.75rem; }
    @media (max-width: 600px) { .pop-rounds-grid { grid-template-columns: repeat(2, 1fr); } }
    .pop-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      padding: 0.65rem 0.5rem; border: 1px solid var(--grey-200); border-radius: var(--radius-md);
      background: var(--white); cursor: pointer; font-size: 0.75rem; font-weight: 600;
      color: var(--ink); transition: box-shadow 0.15s;
    }
    .pop-btn:hover:not(:disabled) { box-shadow: var(--shadow-md); }
    .pop-btn:disabled { background: var(--grey-100); color: var(--grey-400); cursor: not-allowed; border-color: var(--grey-100); }
    .pop-btn-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; }
    .pop-btn-status { font-size: 0.65rem; font-weight: 500; }
    .pop-btn-status.open  { color: #5c7000; }
    .pop-btn-status.locked { color: var(--grey-400); }
    .pop-btn-status.nodata { color: var(--grey-400); }
    .pop-all-btn { width: 100%; padding: 0.75rem; font-size: 0.85rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 900; display: flex; align-items: center; justify-content: center; }
    .modal-overlay.hidden { display: none; }
    .modal-box { background: var(--white); border-radius: var(--radius-lg); padding: 1.75rem; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); }
    .modal-title { font-family: var(--font-serif); font-size: 1.15rem; margin: 0 0 0.6rem; }
    .modal-body { font-size: 0.88rem; color: var(--grey-600); margin: 0 0 0.25rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <style>
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #f9f9f8;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .placeholder-card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 2.75rem 2.25rem;
      text-align: center;
    }
    .placeholder-icon { font-size: 2.5rem; color: #e8b923; margin-bottom: 1rem; }
    .placeholder-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .placeholder-card p { color: #6b7280; font-size: 0.92rem; line-height: 1.6; margin: 0 0 1.5rem; }
    .placeholder-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d0d0d;
      color: #c8f135;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
    }
  </style>
  <div class="placeholder-card">
    <div class="placeholder-icon"><i class="ti ti-trophy"></i></div>
    <h1>Tournament complete</h1>
    <p>The WC2026 Prediction Game has finished and this page is no longer active. Final results are on the home page.</p>
    <a href="../index.html"><i class="ti ti-arrow-left"></i> Back to results</a>
  </div>
</body>
</html>
