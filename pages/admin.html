<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=50">
  <style>
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .users-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .users-table th { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--grey-500); padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--grey-300); text-align: left; }
    .users-table td { padding: 0.75rem; border-bottom: 1px solid var(--grey-100); }

    .result-card {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      padding: 1.125rem;
      box-shadow: var(--shadow-sm);
    }

    .result-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }

    .result-teams {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .result-inputs { display: flex; align-items: center; gap: 0.4rem; }

    .result-num {
      width: 52px;
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      padding: 0.3rem;
      border: 1.5px solid var(--grey-300);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--ink);
      outline: none;
    }

    .result-num:focus { border-color: var(--ink); }

    .status-select { font-size: 0.8rem; }

    .group-filter-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }

    @media (max-width: 559px) {
      .override-grid { grid-template-columns: 1fr !important; }
    }

    .recalc-card {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .recalc-icon { font-size: 2.5rem; color: var(--grey-400); margin-bottom: 1rem; }

    /* ---- Auto-Score component styles ---- */
    .as-card { background: var(--grey-50, #f9f9f9); border: 1px solid var(--grey-200); border-radius: var(--radius-md); padding: 1rem 1.15rem; margin-bottom: 1rem; }
    .as-card-hd { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--grey-500); margin-bottom: 0.65rem; }
    .as-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; border-top: 1px solid var(--grey-100); font-size: 0.83rem; flex-wrap: wrap; }
    .as-row:first-of-type { border-top: none; }
    .as-qkey { font-family: var(--font-mono, monospace); font-size: 0.72rem; background: var(--grey-100); border-radius: 4px; padding: 0.1rem 0.35rem; white-space: nowrap; flex-shrink: 0; color: var(--grey-600); }
    .as-qlabel { color: var(--grey-700); flex: 1; min-width: 160px; }
    .as-chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.55rem; border-radius: 9999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .as-ok      { background: rgba(200,241,53,0.18); color: #5c7000; border: 1px solid rgba(200,241,53,0.45); }
    .as-pending { background: var(--grey-100); color: var(--grey-400); border: 1px solid var(--grey-200); }
    .as-input-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.35rem 0; border-top: 1px solid var(--grey-100); flex-wrap: wrap; font-size: 0.83rem; }
    .as-input-row label { flex: 1; min-width: 160px; color: var(--grey-700); }
    .as-input-row .form-control { max-width: 220px; }
    .as-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .as-table th { text-align: left; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--grey-500); padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--grey-200); }
    .as-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--grey-100); vertical-align: middle; }
    @media (max-width: 600px) { .as-input-row .form-control { max-width: 100%; width: 100%; } }
  </style>
</head>
<body>
  <style>
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #f9f9f8;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .placeholder-card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 2.75rem 2.25rem;
      text-align: center;
    }
    .placeholder-icon { font-size: 2.5rem; color: #e8b923; margin-bottom: 1rem; }
    .placeholder-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .placeholder-card p { color: #6b7280; font-size: 0.92rem; line-height: 1.6; margin: 0 0 1.5rem; }
    .placeholder-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d0d0d;
      color: #c8f135;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
    }
  </style>
  <div class="placeholder-card">
    <div class="placeholder-icon"><i class="ti ti-trophy"></i></div>
    <h1>Tournament complete</h1>
    <p>The WC2026 Prediction Game has finished and this page is no longer active. Final results are on the home page.</p>
    <a href="../index.html"><i class="ti ti-arrow-left"></i> Back to results</a>
  </div>
</body>
</html>
