<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=15">
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <span>Leaderboard</span></nav>
      <h1 class="page-title">Leaderboard</h1>
      <p class="page-desc">Real-time standings &middot; Updates automatically</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem">
      <div id="leagueSwitcher"></div>
      <div id="leaderboardContent">
        <div class="loading-overlay">
          <div class="spinner"></div>
          <span>Loading standings&hellip;</span>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=15"></script>
  <script src="../js/data.js?v=15"></script>
  <script src="../js/supabase-client.js?v=15"></script>
  <script src="../js/scoring.js?v=15"></script>
  <script src="../js/ui.js?v=15"></script>
  <script>
    DB.initSupabase();
    Nav.render('leaderboard');

    let currentUserId     = null;
    let allScores         = [];
    let memberCache       = {};   // leagueId -> userId[]
    let profileCache      = {};   // userId -> { display_name, avatar_color }
    let allProfilesFetched = false;
    let dropdownBuilt     = false;

    async function loadLeaderboard() {
      const session = await DB.getSession();
      currentUserId = session?.user?.id || null;

      try {
        const [scores, leagues] = await Promise.all([
          DB.getScores(),
          currentUserId
            ? DB.getMyLeagues(currentUserId).catch(() => [])
            : Promise.resolve([])
        ]);
        allScores = scores;

        if (!dropdownBuilt) {
          buildDropdown(leagues);
          dropdownBuilt = true;
        }

        await applyFilter();
      } catch (err) {
        document.getElementById('leaderboardContent').innerHTML =
          `<div class="alert alert-error"><i class="ti ti-alert-triangle"></i> Failed to load: ${err.message}</div>`;
      }
    }

    function buildDropdown(leagues) {
      const switcher = document.getElementById('leagueSwitcher');
      const privateLeagues = leagues.filter(l => !l.is_global);

      if (!currentUserId || privateLeagues.length === 0) {
        switcher.innerHTML = '';
        return;
      }

      const globalLeague = leagues.find(l => l.is_global);
      const globalLabel  = globalLeague ? globalLeague.name : 'Global';

      const opts = [
        `<option value="global">${globalLabel} — All Players</option>`,
        ...privateLeagues.map(l => {
          const n = l.member_count || 1;
          return `<option value="${l.id}">${l.name} (${n} ${n === 1 ? 'player' : 'players'})</option>`;
        })
      ].join('');

      switcher.innerHTML = `
        <div class="filter-bar" style="margin-bottom:1.5rem;align-items:center">
          <label class="filter-label" for="leaguePicker" style="white-space:nowrap">
            <i class="ti ti-users-group"></i> View:
          </label>
          <select id="leaguePicker" class="form-control" style="min-width:200px;max-width:320px">${opts}</select>
        </div>
      `;

      document.getElementById('leaguePicker').addEventListener('change', applyFilter);
    }

    // Build synthetic zero-point entries for members not yet in the scores array.
    // Reads profile data from profileCache (must be populated before calling).
    function fillZeroEntries(scores, memberIds) {
      const scoredIds = new Set(scores.map(s => s.user_id));
      const zeros = memberIds
        .filter(id => !scoredIds.has(id))
        .map(id => {
          const p = profileCache[id] || {};
          return {
            user_id: id,
            total_points: 0,
            profiles: {
              display_name: p.display_name || 'Player',
              avatar_color: p.avatar_color || '#c8f135',
              avatar_url:   p.avatar_url   || null
            }
          };
        });
      return [...scores, ...zeros];
    }

    async function applyFilter() {
      const picker = document.getElementById('leaguePicker');
      const val = picker ? picker.value : 'global';

      if (val === 'global' || !val) {
        if (!allProfilesFetched) {
          try {
            const profiles = await DB.getAllProfiles();
            profiles.forEach(p => { profileCache[p.id] = p; });
            allProfilesFetched = true;
          } catch (_) {}
        }
        const allIds = Object.keys(profileCache);
        renderLeaderboard(fillZeroEntries(allScores, allIds));
        return;
      }

      if (!memberCache[val]) {
        try {
          memberCache[val] = await DB.getLeagueMemberIds(val);
        } catch {
          renderLeaderboard(allScores);
          return;
        }
      }

      const memberIds = memberCache[val];
      const memberSet = new Set(memberIds);
      const filtered = allScores.filter(s => memberSet.has(s.user_id));

      // Fetch profiles for any member who has no score row yet and isn't cached
      const scoredIds = new Set(filtered.map(s => s.user_id));
      const missing = memberIds.filter(id => !scoredIds.has(id) && !profileCache[id]);
      if (missing.length) {
        try {
          const profiles = await DB.getProfiles(missing);
          profiles.forEach(p => { profileCache[p.id] = p; });
        } catch (_) {}
      }

      renderLeaderboard(fillZeroEntries(filtered, memberIds));
    }

    function renderLeaderboard(scores) {
      if (!scores.length) {
        document.getElementById('leaderboardContent').innerHTML = `
          <div class="loading-overlay" style="padding:3rem">
            <i class="ti ti-trophy" style="font-size:3rem;color:var(--grey-300)"></i>
            <p class="text-muted">No players yet.</p>
          </div>
        `;
        return;
      }

      const allZero = scores.every(s => (s.total_points || 0) === 0);

      const sorted = [...scores].sort((a, b) => {
        if (allZero) {
          return (a.profiles?.display_name || '').localeCompare(b.profiles?.display_name || '');
        }
        const diff = (b.total_points || 0) - (a.total_points || 0);
        if (diff !== 0) return diff;
        return (a.profiles?.display_name || '').localeCompare(b.profiles?.display_name || '');
      });

      let podiumSection = '';
      if (!allZero) {
        const podiumOrder = [sorted[1] || null, sorted[0] || null, sorted[2] || null];
        podiumSection = '<div class="podium-grid mb-4">' + podiumOrder.map((s, idx) => {
          if (!s) return '<div></div>';
          const rankNum = idx === 0 ? 2 : idx === 1 ? 1 : 3;
          const rankLabel = rankNum === 1 ? '1st' : rankNum === 2 ? '2nd' : '3rd';
          const isYou = s.user_id === currentUserId;
          const isAi  = isAiPlayer(s.profiles);
          return `
            <div class="podium-card rank-${rankNum}${isAi ? ' ai-player-row' : ''}">
              <div class="podium-position">${rankLabel}</div>
              ${renderAvatar(s.profiles, 'podium-avatar')}
              <div class="podium-name">${s.profiles?.display_name || 'Player'}${isYou ? ' <span class="you-badge">You</span>' : ''}${isAi ? ' <span class="ai-tag">AI</span>' : ''}</div>
              <div class="podium-pts">${s.total_points || 0}</div>
              <div class="podium-pts-label">Points</div>
            </div>
          `;
        }).join('') + '</div>';
      }

      const preNote = allZero
        ? `<div class="alert alert-info" style="margin-bottom:1.25rem">
             <i class="ti ti-clock"></i> Scoring begins when the tournament kicks off. Full roster shown alphabetically.
           </div>`
        : '';

      const rounds = ['round1','round2','round3','round4','round5','round6','round7','round8'];
      const roundLabels = ['R1','R2','GS','R32','R16','QF','SF','Final'];

      const rowsHTML = sorted.map((s, i) => {
        const rankNum = i + 1;
        const isYou = s.user_id === currentUserId;
        const isAi  = isAiPlayer(s.profiles);
        const rankClass = rankNum <= 3 ? `rank-${rankNum}` : 'rank-other';

        const roundPts = rounds.map(r => {
          const pts = s[r + '_points'];
          return `<td class="round-col hide-mobile">${pts != null ? pts : '—'}</td>`;
        }).join('');

        return `
          <tr class="${isYou ? 'current-user-row' : ''}${isAi ? ' ai-player-row' : ''}">
            <td><div class="rank-badge ${rankClass}">${rankNum}</div></td>
            <td>
              <div class="player-cell">
                ${renderAvatar(s.profiles, 'avatar', 'width:30px;height:30px;font-size:0.8rem')}
                <div class="player-info">
                  <span class="name">${s.profiles?.display_name || 'Player'}</span>
                  ${isYou ? '<span class="you-badge">You</span>' : ''}${isAi ? '<span class="ai-tag">AI</span>' : ''}
                </div>
              </div>
            </td>
            ${roundPts}
            <td class="total-col">${s.total_points || 0}</td>
          </tr>
        `;
      }).join('');

      const roundHeaders = roundLabels.map(r =>
        `<th class="hide-mobile centre">${r}</th>`
      ).join('');

      document.getElementById('leaderboardContent').innerHTML = `
        ${podiumSection}
        ${preNote}
        <div class="leaderboard-card">
          <div class="leaderboard-card-header">
            <h3><i class="ti ti-list-numbers"></i> Full Standings</h3>
            <div class="live-indicator">
              <div class="live-dot"></div>
              Live
            </div>
          </div>
          <div style="overflow-x:auto">
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th style="width:44px">#</th>
                  <th>Player</th>
                  ${roundHeaders}
                  <th class="centre">Total</th>
                </tr>
              </thead>
              <tbody>${rowsHTML}</tbody>
            </table>
          </div>
        </div>

        <div style="margin-top:0.875rem;text-align:right">
          <span class="text-xs text-muted">R1=Pre-tournament &middot; R2=Group winners &middot; GS=Group stage &middot; R32/R16/QF/SF/Final=Knockouts</span>
        </div>
      `;
    }

    loadLeaderboard().then(() => {
      DB.subscribeToLeaderboard(async () => {
        allScores = await DB.getScores().catch(() => allScores);
        applyFilter();
      });
    });
  </script>
</body>
</html>
