<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 â€” Match Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=8">
  <style>
    .round-section { margin-bottom: 2.5rem; }

    .round-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.625rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 1rem;
    }

    .round-section-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .match-count { font-size: 0.75rem; color: var(--grey-400); }

    .match-list { display: flex; flex-direction: column; gap: 0.625rem; }

    .match-row {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s;
    }

    .match-row.live { border-color: var(--red); }
    .match-row.finished { border-color: var(--grey-300); }

    .match-row-main {
      display: grid;
      grid-template-columns: 140px 1fr auto 1fr 100px;
      align-items: center;
      padding: 0.875rem 1.25rem;
      gap: 0.875rem;
    }

    @media (max-width: 880px) {
      .match-row-main {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .match-status-block { display: none; }
      .match-team-block.right { flex-direction: row; }
    }

    .match-info { font-size: 0.75rem; color: var(--grey-500); }
    .match-info .match-num { font-weight: 600; color: var(--ink); margin-bottom: 0.15rem; }
    .match-info .match-venue { margin-top: 0.15rem; }

    .match-team-block { display: flex; align-items: center; gap: 0.5rem; }
    .match-team-block.right { flex-direction: row-reverse; }
    .match-team-flag { font-size: 1.4rem; }
    .match-team-name { font-size: 0.875rem; font-weight: 600; }

    .match-score-centre { text-align: center; min-width: 80px; }
    .match-scoreline { font-family: var(--font-serif); font-size: 1.5rem; color: var(--ink); line-height: 1; }
    .match-vs-text { font-size: 0.75rem; color: var(--grey-400); letter-spacing: 0.08em; }

    .preds-row {
      border-top: 1px solid var(--grey-100);
      padding: 0.55rem 1.25rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .preds-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey-400); margin-right: 0.25rem; }

    .pred-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: var(--grey-100);
      border: 1px solid var(--grey-300);
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .pred-pill.exact { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.06); }
    .pred-pill.result { border-color: var(--lime-dark); color: var(--lime-dark); background: rgba(184,224,32,0.08); }
    .pred-pill.wrong { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.05); }

    .pred-name { color: var(--grey-500); margin-right: 0.1rem; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--red);
      color: white;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .live-dot-sm {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: white;
      animation: blink 1s ease-in-out infinite;
    }

    .no-matches {
      text-align: center;
      padding: 3rem;
      color: var(--grey-400);
      font-size: 0.9rem;
    }

    /* ---- Per-match predictions modal ---- */
    .match-row[data-match-id] { cursor: pointer; }
    .match-row[data-match-id]:hover { border-color: var(--grey-400); }

    .mpred-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    @media (min-width: 560px) {
      .mpred-overlay { align-items: center; padding: 1.5rem; }
    }
    .mpred-panel {
      background: var(--white);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
    }
    @media (min-width: 560px) {
      .mpred-panel { border-radius: var(--radius-lg); max-width: 480px; max-height: 80vh; }
    }
    .mpred-header {
      position: relative;
      padding: 1rem 3rem 0.875rem 1.25rem;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .mpred-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    .mpred-meta { font-size: 0.72rem; color: var(--grey-500); }
    .mpred-close {
      position: absolute;
      top: 0.875rem; right: 1rem;
      background: none; border: none;
      cursor: pointer; color: var(--grey-500);
      padding: 0.25rem; border-radius: var(--radius-sm);
      font-size: 1.1rem; line-height: 1;
    }
    .mpred-close:hover { background: var(--grey-100); }
    .mpred-league-bar {
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mpred-body { overflow-y: auto; flex: 1; padding: 0.5rem 0; min-height: 120px; }
    .mpred-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.625rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
    }
    .mpred-row:last-child { border-bottom: none; }
    .mpred-you { background: rgba(200,241,53,0.1); }
    .mpred-name { flex: 1; font-size: 0.875rem; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mpred-score { font-family: var(--font-serif); font-size: 1.05rem; color: var(--ink); min-width: 40px; text-align: center; flex-shrink: 0; }
    .mpred-lock-note {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      font-size: 0.8rem;
      color: var(--grey-500);
      background: var(--grey-100);
      border-top: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <span>Match Centre</span></nav>
      <h1 class="page-title">Match Centre</h1>
      <p class="page-desc">All 104 fixtures &middot; Live scores &middot; Everyone's predictions</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem">

      <div class="filter-bar mb-4">
        <span class="filter-label">Round:</span>
        <button class="btn btn-lime btn-sm" data-filter="all">All</button>
        <button class="btn btn-outline btn-sm" data-filter="group">Group Stage</button>
        <button class="btn btn-outline btn-sm" data-filter="r32">R32</button>
        <button class="btn btn-outline btn-sm" data-filter="r16">R16</button>
        <button class="btn btn-outline btn-sm" data-filter="qf">QF</button>
        <button class="btn btn-outline btn-sm" data-filter="sf">SF</button>
        <button class="btn btn-outline btn-sm" data-filter="final">Final</button>
      </div>

      <div id="matchCentreContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

    </div>
  </main>

  <div id="matchPredModal"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=8"></script>
  <script src="../js/data.js?v=8"></script>
  <script src="../js/supabase-client.js?v=8"></script>
  <script src="../js/scoring.js?v=8"></script>
  <script src="../js/ui.js?v=8"></script>
  <script>
    DB.initSupabase();
    Nav.render('matches');

    let allResults       = {};
    let allPreds         = [];
    let currentFilter    = 'all';
    let currentUserId    = null;
    let myLeagues        = [];
    let activePredLeague = 'global';
    let memberCache      = {};

    async function load() {
      const session = await DB.getSession();
      currentUserId = session?.user?.id || null;

      // Compute which match question_keys have already kicked off
      const now = Date.now();
      const lockedKeys = [
        ...GROUP_FIXTURES
          .filter(f => now >= new Date(`${f[1]}T${f[2]}:00Z`).getTime())
          .map(f => `m${f[0]}`),
        ...Object.values(KNOCKOUT_ROUNDS)
          .flatMap(r => r.matches || [])
          .filter(m => m.date && m.time && now >= new Date(`${m.date}T${m.time}:00Z`).getTime())
          .map(m => `m${m.id}`)
      ];

      // Own predictions (always safe) + all-user preds only for kicked-off matches
      const ownPredsPromise    = currentUserId ? DB.getUserPredictions(currentUserId).catch(() => []) : Promise.resolve([]);
      const ownProfilePromise  = currentUserId ? DB.getProfiles([currentUserId]).catch(() => [])      : Promise.resolve([]);
      const lockedPredsPromise = lockedKeys.length ? DB.getAllPredictions(null, lockedKeys).catch(() => []) : Promise.resolve([]);

      const [matchResults, ownPreds, ownProfiles, lockedPreds] = await Promise.all([
        DB.getMatchResults().catch(() => []),
        ownPredsPromise,
        ownProfilePromise,
        lockedPredsPromise
      ]);

      matchResults.forEach(r => { allResults[r.match_id] = r; });
      const ownProfile = ownProfiles[0] || null;

      // Pre-kickoff matches: own prediction only, enriched with own profile for modal avatar rendering
      const lockedKeySet = new Set(lockedKeys);
      const ownPreKickoffPreds = ownPreds
        .filter(p => !lockedKeySet.has(p.question_key))
        .map(p => ({ ...p, profiles: ownProfile }));

      // allPreds: all-user data for locked matches + own-only for pre-kickoff
      // Others' pre-kickoff predictions are never fetched â€” enforcement is at query level above
      allPreds = [...lockedPreds, ...ownPreKickoffPreds];

      if (currentUserId) {
        myLeagues = await DB.getMyLeagues(currentUserId).catch(() => []);
      }

      render();
      renderLeagueFilter();
    }

    function renderLeagueFilter() {
      const privateLeagues = myLeagues.filter(l => !l.is_global);
      if (!privateLeagues.length) return;
      const bar = document.querySelector('.filter-bar');
      if (!bar || document.getElementById('inlineLeagueGroup')) return;
      const group = document.createElement('div');
      group.id = 'inlineLeagueGroup';
      group.style.cssText = 'display:flex;align-items:center;gap:0.5rem;margin-left:auto';
      group.innerHTML = `
        <i class="ti ti-users-group" style="color:var(--grey-400);font-size:0.9rem"></i>
        <select id="inlineLeaguePicker" class="form-control" style="font-size:0.82rem;padding:0.25rem 0.6rem;height:auto;min-width:150px">
          <option value="global">All Players</option>
          ${privateLeagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}
        </select>`;
      bar.appendChild(group);
      document.getElementById('inlineLeaguePicker').value = activePredLeague;
      document.getElementById('inlineLeaguePicker').addEventListener('change', async e => {
        activePredLeague = e.target.value;
        if (activePredLeague !== 'global' && !memberCache[activePredLeague]) {
          memberCache[activePredLeague] = await DB.getLeagueMemberIds(activePredLeague).catch(() => []);
        }
        // Sync modal picker if open
        const modalPicker = document.getElementById('mpredLeaguePicker');
        if (modalPicker) modalPicker.value = activePredLeague;
        render();
      });
    }

    // ---- Per-match kick-off time (UTC) ----
    function getMatchKickoff(matchId) {
      const gf = GROUP_FIXTURES.find(f => f[0] === matchId);
      if (gf) return new Date(`${gf[1]}T${gf[2]}:00Z`);
      for (const round of Object.values(KNOCKOUT_ROUNDS)) {
        const m = round.matches?.find(m => m.id === matchId);
        if (m?.date && m?.time) return new Date(`${m.date}T${m.time}:00Z`);
      }
      return null;
    }

    // ---- Match predictions modal ----
    async function openMatchModal(matchId) {
      const kickoff  = getMatchKickoff(matchId);
      // FAIRNESS: only reveal others' predictions after the match has kicked off
      const isLocked = kickoff ? Date.now() >= kickoff.getTime() : false;

      let home = { name: 'TBD', code: null }, away = { name: 'TBD', code: null };
      let matchLabel = `Match ${matchId}`, matchDate = '';
      const gf = GROUP_FIXTURES.find(f => f[0] === matchId);
      if (gf) {
        home = getTeam(gf[4]); away = getTeam(gf[5]);
        matchLabel = `Match ${matchId} Â· Group ${gf[3]}`;
        matchDate  = gf[1];
      } else {
        for (const round of Object.values(KNOCKOUT_ROUNDS)) {
          const m = round.matches?.find(m => m.id === matchId);
          if (m) {
            home      = m.home_team ? getTeam(m.home_team) : home;
            away      = m.away_team ? getTeam(m.away_team) : away;
            matchLabel = m.match_label || matchLabel;
            matchDate  = m.date || '';
            break;
          }
        }
      }

      const result    = allResults[matchId];
      const hasResult = result && result.home_score !== null;

      const privateLeagues = myLeagues.filter(l => !l.is_global);
      const leagueOpts = [
        `<option value="global">All Players</option>`,
        ...privateLeagues.map(l => `<option value="${l.id}">${l.name}</option>`)
      ].join('');
      const leagueBarHtml = privateLeagues.length ? `
        <div class="mpred-league-bar">
          <i class="ti ti-users-group" style="color:var(--grey-400);flex-shrink:0"></i>
          <select id="mpredLeaguePicker" class="form-control" style="flex:1;min-width:0;font-size:0.82rem;padding:0.25rem 0.5rem;height:auto">${leagueOpts}</select>
        </div>` : '';

      document.getElementById('matchPredModal').innerHTML = `
        <div class="mpred-overlay" id="mpredOverlay">
          <div class="mpred-panel">
            <div class="mpred-header">
              <div class="mpred-teams">
                ${home.code ? teamFlagImg(home.code) : ''}<span>${home.name}</span>
                <span style="color:var(--grey-400);font-weight:400;font-size:0.8rem">vs</span>
                <span>${away.name}</span>${away.code ? teamFlagImg(away.code) : ''}
              </div>
              <div class="mpred-meta">${matchLabel}${matchDate ? ' Â· ' + formatDate(matchDate) : ''}${hasResult ? ` Â· <strong>${result.home_score}â€“${result.away_score}</strong>` : ''}</div>
              <button class="mpred-close" onclick="closeMatchModal()"><i class="ti ti-x"></i></button>
            </div>
            ${leagueBarHtml}
            <div id="mpredBody" class="mpred-body"><div class="spinner" style="margin:2rem auto;display:block;width:32px;height:32px"></div></div>
          </div>
        </div>`;

      document.body.style.overflow = 'hidden';
      document.getElementById('mpredOverlay').addEventListener('click', e => {
        if (e.target.id === 'mpredOverlay') closeMatchModal();
      });
      if (privateLeagues.length) {
        const picker = document.getElementById('mpredLeaguePicker');
        picker.value = activePredLeague;
        picker.addEventListener('change', e => {
          activePredLeague = e.target.value;
          loadMatchModalBody(matchId, isLocked);
        });
      }

      await loadMatchModalBody(matchId, isLocked);
    }

    async function loadMatchModalBody(matchId, isLocked) {
      const bodyEl = document.getElementById('mpredBody');
      if (!bodyEl) return;
      bodyEl.innerHTML = '<div class="spinner" style="margin:2rem auto;display:block;width:32px;height:32px"></div>';

      // Current user's own prediction (always visible, regardless of lock)
      const myPredRow = allPreds.find(p => p.user_id === currentUserId && p.question_key === `m${matchId}`);
      let myVal = null;
      if (myPredRow) { try { myVal = JSON.parse(myPredRow.value); } catch {} }

      if (!isLocked) {
        // Pre-kickoff: own prediction only + lock note
        const myHtml = myVal
          ? `<div class="mpred-row mpred-you">
              ${renderAvatar(myPredRow.profiles, 'avatar', 'width:32px;height:32px;font-size:0.85rem')}
              <span class="mpred-name">You <span class="you-badge">You</span></span>
              <span class="mpred-score">${myVal.home}â€“${myVal.away}</span>
            </div>`
          : `<div class="mpred-row mpred-you" style="color:var(--grey-400)">
              <i class="ti ti-circle-dashed" style="font-size:1.5rem;flex-shrink:0"></i>
              <span class="mpred-name">You haven't predicted this match yet</span>
            </div>`;
        bodyEl.innerHTML = myHtml +
          `<div class="mpred-lock-note"><i class="ti ti-lock"></i> Other predictions reveal at kick-off</div>`;
        return;
      }

      // Post-kickoff: filter allPreds by league if needed, then render all
      let memberIds = null;
      if (activePredLeague !== 'global') {
        if (!memberCache[activePredLeague]) {
          memberCache[activePredLeague] = await DB.getLeagueMemberIds(activePredLeague).catch(() => []);
        }
        memberIds = memberCache[activePredLeague];
      }

      let matchPreds = allPreds.filter(p => p.question_key === `m${matchId}`);
      if (memberIds) matchPreds = matchPreds.filter(p => memberIds.includes(p.user_id));

      if (!matchPreds.length) {
        bodyEl.innerHTML = `<div style="text-align:center;padding:2rem 1rem;color:var(--grey-400)">
          <i class="ti ti-inbox" style="font-size:2rem;display:block;margin-bottom:0.75rem"></i>
          No predictions for this match.</div>`;
        return;
      }

      // Sort: current user first, then alphabetical
      matchPreds.sort((a, b) => {
        if (a.user_id === currentUserId) return -1;
        if (b.user_id === currentUserId) return 1;
        return (a.profiles?.display_name || '').localeCompare(b.profiles?.display_name || '');
      });

      const result    = allResults[matchId];
      const hasResult = result && result.home_score !== null;

      bodyEl.innerHTML = matchPreds.map(p => {
        let val = null;
        try { val = JSON.parse(p.value); } catch {}
        const isYou = p.user_id === currentUserId;
        let chipHtml = '';
        if (hasResult && val !== null) {
          const actH = result.home_score, actA = result.away_score;
          if (val.home === actH && val.away === actA)
            chipHtml = `<span class="pred-pill exact">Exact</span>`;
          else if (Math.sign(val.home - val.away) === Math.sign(actH - actA))
            chipHtml = `<span class="pred-pill result">Result</span>`;
          else
            chipHtml = `<span class="pred-pill wrong">Wrong</span>`;
        }
        return `<div class="mpred-row${isYou ? ' mpred-you' : ''}">
          ${renderAvatar(p.profiles, 'avatar', 'width:32px;height:32px;font-size:0.85rem')}
          <span class="mpred-name">${p.profiles?.display_name || 'Player'}${isYou ? ' <span class="you-badge">You</span>' : ''}</span>
          <span class="mpred-score">${val !== null ? `${val.home}â€“${val.away}` : 'â€”'}</span>
          ${chipHtml}
        </div>`;
      }).join('');
    }

    function closeMatchModal() {
      document.getElementById('matchPredModal').innerHTML = '';
      document.body.style.overflow = '';
    }

    function buildPredMap() {
      // Apply league filter if active
      const memberIds = (activePredLeague !== 'global' && memberCache[activePredLeague])
        ? new Set(memberCache[activePredLeague])
        : null;

      const map = {};
      allPreds.forEach(p => {
        if (!p.question_key.startsWith('m')) return;
        if (memberIds && !memberIds.has(p.user_id)) return;
        const matchId = parseInt(p.question_key.slice(1));
        if (isNaN(matchId)) return;
        let val;
        try { val = JSON.parse(p.value); } catch { return; }
        if (!map[matchId]) map[matchId] = [];
        map[matchId].push({
          name: p.profiles?.display_name || 'Player',
          home: val.home,
          away: val.away,
          userId: p.user_id
        });
      });
      return map;
    }

    function render() {
      const predMap = buildPredMap();
      const content = document.getElementById('matchCentreContent');
      const sections = [];

      if (currentFilter === 'all' || currentFilter === 'group') {
        'ABCDEFGHIJKL'.split('').forEach(g => {
          const matches = GROUP_FIXTURES.filter(m => m[3] === g);
          sections.push({
            title: `Group ${g}`,
            matches: matches.map(m => buildGroupMatchRow(m, predMap, allResults)),
          });
        });
      }

      const koFilters = {
        r32:   { title: 'Round of 32',    data: KNOCKOUT_ROUNDS.round32 },
        r16:   { title: 'Round of 16',    data: KNOCKOUT_ROUNDS.round16 },
        qf:    { title: 'Quarter Finals', data: KNOCKOUT_ROUNDS.quarterfinals },
        sf:    { title: 'Semi Finals',    data: KNOCKOUT_ROUNDS.semifinals },
        final: { title: 'The Final',      data: KNOCKOUT_ROUNDS.final },
      };

      if (currentFilter === 'all') {
        Object.entries(koFilters).forEach(([, val]) => {
          sections.push({
            title: val.title,
            matches: val.data.matches.map(m => buildKoMatchRow(m, predMap, allResults)),
          });
        });
      } else if (koFilters[currentFilter]) {
        const { title, data } = koFilters[currentFilter];
        sections.push({
          title,
          matches: data.matches.map(m => buildKoMatchRow(m, predMap, allResults)),
        });
      }

      if (!sections.length) {
        content.innerHTML = '<div class="no-matches"><i class="ti ti-circle-x" style="font-size:2rem;display:block;margin-bottom:1rem"></i>No matches for selected filter.</div>';
        return;
      }

      content.innerHTML = sections.map(s => `
        <div class="round-section">
          <div class="round-section-header">
            <span class="round-section-title"><i class="ti ti-ball-football"></i> ${s.title}</span>
            <span class="match-count">${s.matches.length} matches</span>
          </div>
          <div class="match-list">${s.matches.join('')}</div>
        </div>
      `).join('');
    }

    function buildGroupMatchRow(m, predMap, results) {
      const [id, date, , group, homeCode, awayCode, venue, city] = m;
      const home = getTeam(homeCode);
      const away = getTeam(awayCode);
      const result = results[id];
      return buildMatchRowHtml(id, date, home, away, result, predMap[id] || [], `Match ${id} Â· Group ${group}`, venue, city, 7, 5);
    }

    function buildKoMatchRow(m, predMap, results) {
      const result = results[m.id];
      const home = m.home_team ? getTeam(m.home_team) : { flag: 'ðŸ³ï¸', name: 'TBD', code: 'TBD' };
      const away = m.away_team ? getTeam(m.away_team) : { flag: 'ðŸ³ï¸', name: 'TBD', code: 'TBD' };
      const exactPts = m.id === 104 ? 10 : 7;
      const resultPts = m.id === 104 ? 7 : 5;
      return buildMatchRowHtml(m.id, m.date, home, away, result, predMap[m.id] || [], m.match_label, '', '', exactPts, resultPts);
    }

    function buildMatchRowHtml(id, date, home, away, result, preds, label, venue, city, exactPts, resultPts) {
      const hasResult = result && result.home_score !== null;
      const isLive = result?.status === 'IN_PLAY' || result?.status === 'PAUSED';

      let statusBadge = `<span class="chip chip-grey">${formatDate(date)}</span>`;
      let scoreLine = `<span class="match-vs-text">VS</span>`;

      if (isLive) {
        statusBadge = `<div class="live-badge"><div class="live-dot-sm"></div>LIVE</div>`;
        scoreLine = `<div class="match-scoreline">${result.home_score} â€“ ${result.away_score}</div>`;
      } else if (hasResult) {
        statusBadge = `<span class="finished-badge">Final</span>`;
        scoreLine = `<div class="match-scoreline">${result.home_score} â€“ ${result.away_score}</div>`;
      }

      let predsHtml = '';
      if (preds.length > 0) {
        const pills = preds.map(p => {
          const predText = `${p.home}â€“${p.away}`;
          let cls = '';
          if (hasResult) {
            const actH = result.home_score, actA = result.away_score;
            if (p.home === actH && p.away === actA) cls = 'exact';
            else if (Math.sign(p.home - p.away) === Math.sign(actH - actA)) cls = 'result';
            else cls = 'wrong';
          }
          const isYou = p.userId === currentUserId;
          return `<span class="pred-pill ${cls}"><span class="pred-name">${isYou ? '<strong>You</strong>' : p.name}:</span>${predText}</span>`;
        }).join('');
        predsHtml = `<div class="preds-row"><span class="preds-label"><i class="ti ti-list-check"></i> Picks:</span>${pills}</div>`;
      }

      return `
        <div class="match-row ${isLive ? 'live' : hasResult ? 'finished' : ''}" data-match-id="${id}">
          <div class="match-row-main">
            <div class="match-info">
              <div class="match-num">${label}</div>
              <div>${formatDate(date)}</div>
              ${venue ? `<div class="match-venue">${venue}${city ? `, ${city}` : ''}</div>` : ''}
            </div>
            <div class="match-team-block">
              ${teamFlagImg(home.code)}
              <span class="match-team-name">${home.name}</span>
            </div>
            <div class="match-score-centre">
              ${scoreLine}
              ${statusBadge}
            </div>
            <div class="match-team-block right">
              ${teamFlagImg(away.code)}
              <span class="match-team-name">${away.name}</span>
            </div>
            <div class="match-status-block"></div>
          </div>
          ${predsHtml}
        </div>
      `;
    }

    document.querySelector('.filter-bar').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-bar [data-filter]').forEach(b => {
        b.className = b.dataset.filter === currentFilter ? 'btn btn-lime btn-sm' : 'btn btn-outline btn-sm';
      });
      render();
    });

    // Click any match row to open the predictions modal
    document.getElementById('matchCentreContent').addEventListener('click', e => {
      if (e.target.closest('button, a, select')) return;
      const row = e.target.closest('.match-row[data-match-id]');
      if (!row) return;
      openMatchModal(parseInt(row.dataset.matchId));
    });

    DB.subscribeToMatchResults(() => {
      DB.getMatchResults().then(r => {
        allResults = {};
        r.forEach(res => { allResults[res.match_id] = res; });
        render();
      });
    });

    load();
  </script>
</body>
</html>
