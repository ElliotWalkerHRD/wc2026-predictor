<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Match Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=50">
  <style>
    .round-section { margin-bottom: 2.5rem; }

    .round-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.625rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 1rem;
    }

    .round-section-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .match-count { font-size: 0.75rem; color: var(--grey-400); }

    .match-list { display: flex; flex-direction: column; gap: 0.625rem; }

    .match-row {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s;
    }

    .match-row.live { border-color: var(--red); }
    .match-row.finished { border-color: var(--grey-300); }

    .match-row-main {
      display: grid;
      grid-template-columns: 140px 1fr auto 1fr 100px;
      align-items: center;
      padding: 0.875rem 1.25rem;
      gap: 0.875rem;
    }

    @media (max-width: 880px) {
      .match-row-main {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .match-status-block { display: none; }
      .match-team-block.right { flex-direction: row; }
    }

    .match-info { font-size: 0.75rem; color: var(--grey-500); }
    .match-info .match-num { font-weight: 600; color: var(--ink); margin-bottom: 0.15rem; }
    .match-info .match-venue { margin-top: 0.15rem; }

    .match-team-block { display: flex; align-items: center; gap: 0.5rem; }
    .match-team-block.right { flex-direction: row-reverse; }
    .match-team-flag { font-size: 1.4rem; }
    .match-team-name { font-size: 0.875rem; font-weight: 600; }

    .match-score-centre { text-align: center; min-width: 80px; }
    .match-scoreline { font-family: var(--font-serif); font-size: 1.5rem; color: var(--ink); line-height: 1; }
    .match-vs-text { font-size: 0.75rem; color: var(--grey-400); letter-spacing: 0.08em; }

    .preds-row {
      border-top: 1px solid var(--grey-100);
      padding: 0.55rem 1.25rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .preds-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey-400); margin-right: 0.25rem; }

    .pred-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: var(--grey-100);
      border: 1px solid var(--grey-300);
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .pred-pill.exact { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.06); }
    .pred-pill.result { border-color: var(--lime-dark); color: var(--lime-dark); background: rgba(184,224,32,0.08); }
    .pred-pill.wrong { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.05); }
    .pred-pill.pending { color: var(--grey-500); border-color: var(--grey-300); }
    .pred-pill.live-wait { border-color: #f59e0b; color: #b45309; background: rgba(245,158,11,0.06); }

    .pred-name { color: var(--grey-500); margin-right: 0.1rem; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--red);
      color: white;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .live-dot-sm {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: white;
      animation: blink 1s ease-in-out infinite;
    }

    .finished-badge {
      display: inline-flex;
      align-items: center;
      background: var(--grey-100);
      color: var(--grey-500);
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .live-badge.sm { font-size: 0.58rem; padding: 0.1rem 0.35rem; gap: 0.2rem; }
    .match-scoreline.live { color: var(--red); }

    .no-matches {
      text-align: center;
      padding: 3rem;
      color: var(--grey-400);
      font-size: 0.9rem;
    }

    /* ---- Per-match predictions modal ---- */
    .match-row[data-match-id] { cursor: pointer; }
    .match-row[data-match-id]:hover { border-color: var(--grey-400); }

    .mpred-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    @media (min-width: 560px) {
      .mpred-overlay { align-items: center; padding: 1.5rem; }
    }
    .mpred-panel {
      background: var(--white);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
    }
    @media (min-width: 560px) {
      .mpred-panel { border-radius: var(--radius-lg); max-width: 480px; max-height: 80vh; }
    }
    .mpred-header {
      position: relative;
      padding: 1rem 3rem 0.875rem 1.25rem;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .mpred-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    .mpred-meta { font-size: 0.72rem; color: var(--grey-500); }
    .mpred-close {
      position: absolute;
      top: 0.875rem; right: 1rem;
      background: none; border: none;
      cursor: pointer; color: var(--grey-500);
      padding: 0.25rem; border-radius: var(--radius-sm);
      font-size: 1.1rem; line-height: 1;
    }
    .mpred-close:hover { background: var(--grey-100); }
    .mpred-league-bar {
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mpred-body { overflow-y: auto; flex: 1; padding: 0.5rem 0; min-height: 120px; }
    .mpred-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.625rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
    }
    .mpred-row:last-child { border-bottom: none; }
    .mpred-you { background: rgba(200,241,53,0.1); }
    .mpred-name { flex: 1; font-size: 0.875rem; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mpred-score { font-family: var(--font-serif); font-size: 1.05rem; color: var(--ink); min-width: 40px; text-align: center; flex-shrink: 0; }
    .mpred-lock-note {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      font-size: 0.8rem;
      color: var(--grey-500);
      background: var(--grey-100);
      border-top: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .mpred-status-note {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      font-size: 0.8rem;
      flex-shrink: 0;
      border-bottom: 1px solid var(--grey-200);
    }
    .mpred-status-note.pending-note { color: var(--grey-500); background: var(--grey-100); }
    .mpred-status-note.live-note { color: #b45309; background: rgba(245,158,11,0.06); border-bottom-color: rgba(245,158,11,0.2); }
    .pred-pill.auto { border-style: dashed; color: var(--grey-500); }
    .auto-tag { display: inline-block; font-size: 0.62em; background: var(--grey-200); color: var(--grey-500); border-radius: 3px; padding: 0 3px; margin-left: 2px; vertical-align: middle; font-weight: 700; letter-spacing: 0; }
    .mpred-auto .mpred-score { color: var(--grey-400); }
    .auto-badge { display: inline-block; font-size: 0.65rem; background: var(--grey-200); color: var(--grey-500); border-radius: 3px; padding: 1px 5px; margin-left: 3px; font-weight: 600; letter-spacing: 0.02em; vertical-align: middle; }
    .match-info-score { font-family: var(--font-serif); font-weight: 600; font-size: 0.9rem; color: var(--ink); }
    .match-kickoff { color: var(--grey-600); }

    /* ---- Match centre controls ---- */
    .filter-bar.mc-controls { flex-direction: column; gap: 0.5rem; flex-wrap: nowrap; align-items: stretch; margin-bottom: 1.25rem; }
    .mc-top-row { display: flex; align-items: center; gap: 0.5rem; justify-content: space-between; flex-wrap: wrap; }
    .mc-top-left { display: flex; align-items: center; gap: 0.5rem; }
    /* Segmented sort control */
    .mc-seg-group { display: flex; border: 1px solid var(--grey-300); border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0; }
    .mc-seg-btn { background: var(--grey-100); border: none; padding: 0.375rem 0.75rem; font-size: 0.82rem; font-weight: 600; color: var(--grey-500); cursor: pointer; display: flex; align-items: center; gap: 0.3rem; transition: background 0.15s, color 0.15s; white-space: nowrap; line-height: 1.4; }
    .mc-seg-btn + .mc-seg-btn { border-left: 1px solid var(--grey-300); }
    .mc-seg-btn.active { background: var(--ink); color: var(--white); }
    .mc-seg-btn:hover:not(.active) { background: var(--grey-200); color: var(--ink); }
    /* Round filter strip */
    .mc-filter-strip { display: flex; align-items: center; gap: 0.375rem; flex-wrap: wrap; }
    .mc-filter-strip > * { flex-shrink: 0; }
    .mc-filter-btns { display: flex; align-items: center; gap: 0.375rem; }
    .mc-filter-btns > * { flex-shrink: 0; }
    .mc-filter-select { display: none; font-size: 0.85rem; border: 1px solid var(--grey-300); border-radius: var(--radius-md); background: var(--white); padding: 0.375rem 0.6rem; color: var(--ink); }
    @media (max-width: 600px) {
      .mc-filter-select { min-height: 44px; flex: 1; }
    }

    /* ---- Win probability bar ---- */
    .prob-bar-section {
      border-top: 1px solid var(--grey-100);
      padding: 0.55rem 1.25rem 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .prob-bar-section:hover { background: #fafafa; }

    .prob-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .prob-bar-title {
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--grey-400);
    }
    .prob-chevron {
      font-size: 0.8rem;
      color: var(--grey-400);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .prob-chevron.open { transform: rotate(180deg); }

    .prob-bar {
      display: flex;
      height: 26px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      gap: 2px;
    }
    .prob-seg {
      min-width: 0;
      transition: flex 0.3s ease;
    }
    .prob-seg.home { background: #c8f135; border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .prob-seg.draw { background: #9ca3af; }
    .prob-seg.away { background: #3b82f6; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

    .prob-label-row {
      display: flex;
      justify-content: space-between;
      margin-top: 0.3rem;
      font-size: 0.68rem;
      color: var(--grey-600);
      font-weight: 500;
    }
    .prob-label-row span:first-child  { color: #4a6a00; }
    .prob-label-row span:last-child   { text-align: right; color: #1d4ed8; }
    .prob-label-row span:nth-child(2) { text-align: center; color: var(--grey-400); }

    /* Expanded factor rows */
    .prob-factors { padding-top: 0.45rem; flex-direction: column; gap: 0.3rem; border-top: 1px solid var(--grey-100); margin-top: 0.45rem; }
    .prob-factors:not([hidden]) { display: flex; }

    .prob-factor-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .prob-factor-label {
      width: 118px;
      flex-shrink: 0;
      font-size: 0.67rem;
      color: var(--grey-500);
      line-height: 1.3;
    }
    .prob-mini-bar {
      flex: 1;
      display: flex;
      height: 8px;
      border-radius: 3px;
      overflow: hidden;
      gap: 1px;
      min-width: 0;
    }
    .prob-mini-seg.home { background: #c8f135; border-radius: 3px 0 0 3px; }
    .prob-mini-seg.draw { background: #9ca3af; }
    .prob-mini-seg.away { background: #3b82f6; border-radius: 0 3px 3px 0; }

    .prob-factor-pcts {
      flex-shrink: 0;
      font-size: 0.65rem;
      color: var(--grey-500);
      text-align: right;
      width: 86px;
    }
    .prob-low-sample {
      display: inline-block;
      background: var(--grey-200);
      color: var(--grey-500);
      border-radius: 3px;
      padding: 0 3px;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      vertical-align: middle;
    }
    .prob-no-crowd { color: var(--grey-400); font-size: 0.67rem; font-style: italic; flex: 1; }
  </style>
</head>
<body>
  <style>
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #f9f9f8;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .placeholder-card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 2.75rem 2.25rem;
      text-align: center;
    }
    .placeholder-icon { font-size: 2.5rem; color: #e8b923; margin-bottom: 1rem; }
    .placeholder-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .placeholder-card p { color: #6b7280; font-size: 0.92rem; line-height: 1.6; margin: 0 0 1.5rem; }
    .placeholder-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d0d0d;
      color: #c8f135;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
    }
  </style>
  <div class="placeholder-card">
    <div class="placeholder-icon"><i class="ti ti-trophy"></i></div>
    <h1>Tournament complete</h1>
    <p>The WC2026 Prediction Game has finished and this page is no longer active. Final results are on the home page.</p>
    <a href="../index.html"><i class="ti ti-arrow-left"></i> Back to results</a>
  </div>
</body>
</html>
