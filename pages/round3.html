<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Round 3: Group Stage Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=12">
  <style>
    .score-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .score-team {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex: 1;
      min-width: 0;
    }
    .score-team.away { flex-direction: row-reverse; text-align: right; }
    .score-team-flag { font-size: 1.3rem; flex-shrink: 0; }
    .score-team-name { flex: 1; min-width: 0; font-size: 0.8rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .score-inputs {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      justify-content: center;
      flex-shrink: 0;
    }
    .score-num {
      width: 46px;
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      padding: 0.3rem;
      border: 1.5px solid var(--grey-300);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .score-num:focus { border-color: var(--ink); }
    .score-num:disabled { background: var(--grey-100); color: var(--grey-400); }
    .score-sep { font-size: 1.2rem; color: var(--grey-400); }
    .result-actual {
      text-align: center;
      font-size: 0.72rem;
      color: var(--grey-500);
      margin-top: 0.4rem;
      font-weight: 500;
    }
    .score-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.625rem;
    }
    .match-id { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--grey-400); }
    .match-date-time { font-size: 0.7rem; color: var(--grey-400); }
    .group-header {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .matches-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    /* min-width:0 lets score-card respect its 1fr track and not bleed beyond it */
    .matches-grid .score-card { min-width: 0; }
    @media (min-width: 560px) { .matches-grid { grid-template-columns: repeat(2,1fr); } }
    @media (min-width: 1024px) { .matches-grid { grid-template-columns: repeat(3,1fr); } }

    /* Stack score cards on very narrow screens: teams side-by-side, inputs below */
    @media (max-width: 440px) {
      .score-teams { flex-wrap: wrap; gap: 0.5rem 0.4rem; }
      .score-team  { flex: 1 1 calc(50% - 1.25rem); }
      .score-inputs { order: 3; flex: 0 0 100%; justify-content: center; }
    }

    /* Per-match lock pills — compact variant */
    @keyframes lockPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(200,241,53,0.55); }
      50%       { opacity: 0.82; box-shadow: 0 0 0 5px rgba(200,241,53,0); }
    }
    .lock-pill--sm { padding: 0.18rem 0.5rem 0.18rem 0.35rem; font-size: 0.68rem; gap: 0.28rem; margin: 0; flex-shrink: 0; }
    .lock-pill--sm > i { font-size: 0.8rem; }
    .lock-pill--open { background: rgba(200,241,53,0.18); color: #5c7000; border: 1px solid rgba(200,241,53,0.45); }
    .lock-pill--locked { background: var(--grey-100); color: var(--grey-500); border: 1px solid var(--grey-200); }
    .lock-pill--open.urgent { animation: lockPulse 1.8s ease-in-out infinite; }
    .lock-pill { display: inline-flex; align-items: center; gap: 0.55rem; border-radius: 9999px; font-weight: 600; line-height: 1.3; }

    /* ---- View picks button (locked cards only) ---- */
    .view-picks-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.35rem;
      background: none;
      border: 1px solid var(--grey-200);
      border-radius: var(--radius-md);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--grey-500);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .view-picks-btn:hover { background: var(--grey-100); color: var(--ink); }

    /* ---- Pick comparison modal ---- */
    .pred-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    @media (min-width: 560px) {
      .pred-modal-overlay { align-items: center; padding: 1.5rem; }
    }
    .pred-modal-panel {
      background: var(--white);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
    }
    @media (min-width: 560px) {
      .pred-modal-panel { border-radius: var(--radius-lg); max-width: 460px; max-height: 80vh; }
    }
    .pred-modal-header {
      position: relative;
      padding: 1rem 3rem 0.875rem 1.25rem;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .pred-modal-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .pred-modal-meta { font-size: 0.72rem; color: var(--grey-500); margin-top: 0.15rem; }
    .pred-modal-close {
      position: absolute;
      top: 0.875rem; right: 1rem;
      background: none; border: none;
      cursor: pointer; color: var(--grey-500);
      padding: 0.25rem; border-radius: var(--radius-sm);
      font-size: 1.1rem; line-height: 1;
    }
    .pred-modal-close:hover { background: var(--grey-100); }
    .pred-modal-league-bar {
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--grey-500);
    }
    .pred-modal-body { overflow-y: auto; flex: 1; }
    .player-pred-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 1.25rem;
      border-bottom: 1px solid var(--grey-100);
    }
    .player-pred-row:last-child { border-bottom: none; }
    .player-pred-row.is-you { background: rgba(200,241,53,0.08); }
    .player-pred-name {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 600;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-pred-score {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--ink);
      flex-shrink: 0;
      min-width: 44px;
      text-align: center;
    }
    .player-pred-score.no-pred {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--grey-400);
      font-weight: 400;
    }
    .pred-chip {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.12rem 0.42rem;
      border-radius: 9999px;
      flex-shrink: 0;
    }
    .pred-chip.exact  { background: rgba(34,197,94,0.15); color: #15803d; }
    .pred-chip.result { background: rgba(200,241,53,0.3); color: #5c7000; }
    .pred-chip.wrong  { background: rgba(239,68,68,0.12); color: #b91c1c; }

    /* ---- Locking soon section ---- */
    #lockingSoonSection { margin-bottom: 2rem; }
    .locking-soon-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-serif);
      font-size: 1.15rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 0.875rem;
    }
    .locking-soon-tag {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--grey-400);
    }

    /* ---- Sort bar ---- */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      margin-bottom: 0.875rem;
    }

    /* ---- My Predicted Tables ---- */
    #predTablesSection { margin-top: 2.5rem; }
    .pred-tables-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-serif);
      font-size: 1.15rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 0.875rem;
    }
    .pred-tables-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    @media (min-width: 600px)  { .pred-tables-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1100px) { .pred-tables-grid { grid-template-columns: 1fr 1fr 1fr; } }
    .group-card {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .group-card-header {
      background: var(--ink);
      color: var(--white);
      padding: 0.55rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .group-card-header .group-label { font-family: var(--font-serif); font-size: 1.05rem; }
    .group-played-chip {
      font-size: 0.68rem; font-weight: 600;
      background: rgba(255,255,255,0.12);
      border-radius: 999px; padding: 0.15rem 0.6rem;
      color: rgba(255,255,255,0.65); letter-spacing: 0.03em;
    }
    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: fixed; }
    .standings-table th {
      padding: 0.35rem 0.5rem; text-align: center;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.07em;
      color: var(--grey-500); text-transform: uppercase;
      background: var(--grey-100); border-bottom: 1px solid var(--grey-300);
      white-space: nowrap; overflow: hidden;
    }
    .standings-table th.team-col { text-align: left; padding-left: 0.75rem; }
    .standings-table th:not(.team-col) { width: 26px; }
    .standings-table th:last-child,
    .standings-table td:last-child { width: 32px; padding-right: 0.75rem; }
    .standings-table th:last-child { overflow: visible; }
    .standings-table td {
      padding: 0.45rem 0.5rem; text-align: center;
      border-bottom: 1px solid var(--grey-100); color: var(--grey-700);
    }
    .standings-table td.team-col { text-align: left; padding-left: 0; overflow: hidden; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr.qual-1 td.team-col { border-left: 3px solid var(--lime-dark); }
    .standings-table tr.qual-2 td.team-col { border-left: 3px solid var(--lime-dark); }
    .standings-table tr.qual-3 td.team-col { border-left: 3px solid #a3e635; }
    .team-cell { display: flex; align-items: center; gap: 0.4rem; padding-left: 0.5rem; overflow: hidden; }
    .team-rank { color: var(--grey-400); font-size: 0.7rem; width: 12px; flex-shrink: 0; text-align: right; }
    .team-cell .team-name-full,
    .team-cell .team-name-abbr { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .team-name-abbr { display: none; }
    /* Multi-col (600px+): hide GF/GA/GD at both 2-col and 3-col layouts. */
    @media (min-width: 600px) {
      .standings-table .col-gf, .standings-table .col-ga, .standings-table .col-gd { display: none; }
    }
    @media (min-width: 600px) and (max-width: 799px) {
      .team-name-full { display: none; }
      .team-name-abbr { display: inline; }
    }
    .pts-cell { font-weight: 700; color: var(--ink); }
    .gd-pos { color: #16a34a; font-weight: 600; }
    .gd-neg { color: var(--red); font-weight: 600; }
    .legend { display: flex; gap: 1.25rem; flex-wrap: wrap; font-size: 0.72rem; color: var(--grey-500); margin-bottom: 2rem; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .legend-stripe { width: 10px; height: 14px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <a href="predictions.html">Predictions</a> &rsaquo; <span>Round 3</span></nav>
      <h1 class="page-title">Group Stage Scores</h1>
      <p class="page-desc">Predict exact scores for all 72 matches &middot; 7pts exact &middot; 5pts correct result</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:6rem">

      <div id="lockedBanner" class="alert alert-info hidden mb-3">
        <i class="ti ti-lock"></i> Round locked. Showing your submitted predictions.
      </div>

      <div class="filter-bar" id="filterBar">
        <span class="filter-label">Group:</span>
        <button class="btn btn-lime btn-sm" data-group="ALL">All</button>
      </div>

      <div class="sort-bar" id="sortBar"></div>
      <div id="lockingSoonSection"></div>

      <div id="matchesContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

      <div id="predTablesSection"></div>

      <div class="sticky-dock" id="stickySave" style="display:none">
        <div class="sticky-dock-inner">
          <div class="dock-status" id="progressText">
            Filled <strong id="filledCount">0</strong> / 72 predictions
          </div>
          <div class="dock-actions">
            <a href="predictions.html" class="btn btn-ghost btn-sm"><i class="ti ti-arrow-left"></i> Back</a>
            <button class="btn btn-lime" id="saveBtn"><i class="ti ti-device-floppy"></i> Save All</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=12"></script>
  <script src="../js/data.js?v=12"></script>
  <script src="../js/supabase-client.js?v=12"></script>
  <script src="../js/scoring.js?v=12"></script>
  <script src="../js/ui.js?v=12"></script>
  <script>
    DB.initSupabase();
    Nav.render('predictions');

    let userId = null;
    let saved = {};
    let results = {};
    let locked = false;
    let activeGroup = 'ALL';
    let sortOrder = 'group';
    let leagues = [];
    let memberCache = {};
    let profileCache = {};
    let activePredLeague = 'global';

    function getMatchKey(id) { return `m${id}`; }

    async function load() {
      const session = await requireAuthFromPages();
      if (!session) return;
      userId = session.user.id;

      await DB.initRoundOverrides();
      locked = DB.isRoundLocked('round3');
      if (locked) document.getElementById('lockedBanner').classList.remove('hidden');
      else document.getElementById('stickySave').style.display = 'block';

      const [preds, matchResults, myLeagues] = await Promise.all([
        DB.getUserPredictions(userId, 'round3').catch(() => []),
        DB.getMatchResults().catch(() => []),
        DB.getMyLeagues(userId).catch(() => [])
      ]);

      preds.forEach(p => {
        try { saved[p.question_key] = JSON.parse(p.value); }
        catch { saved[p.question_key] = p.value; }
      });

      matchResults.forEach(r => { results[r.match_id] = r; });
      leagues = myLeagues;

      // Default to first private league so the modal is immediately useful
      const firstPrivate = leagues.find(l => !l.is_global);
      if (firstPrivate && activePredLeague === 'global') activePredLeague = firstPrivate.id;

      const filterBar = document.getElementById('filterBar');
      filterBar.innerHTML = `
        <span class="filter-label">Group:</span>
        <button class="btn btn-lime btn-sm" data-group="ALL">All</button>
        ${'ABCDEFGHIJKL'.split('').map(g =>
          `<button class="btn btn-outline btn-sm" data-group="${g}">Grp ${g}</button>`
        ).join('')}
      `;

      filterBar.addEventListener('click', e => {
        const btn = e.target.closest('[data-group]');
        if (!btn) return;
        activeGroup = btn.dataset.group;
        filterBar.querySelectorAll('button').forEach(b => {
          b.className = b.dataset.group === activeGroup
            ? 'btn btn-lime btn-sm'
            : 'btn btn-outline btn-sm';
        });
        renderMatches();
      });

      const sortBar = document.getElementById('sortBar');
      sortBar.innerHTML = `
        <span class="filter-label">Sort:</span>
        <button class="btn btn-lime btn-sm" data-sort="group">By group</button>
        <button class="btn btn-outline btn-sm" data-sort="kickoff">By kickoff</button>
      `;
      sortBar.addEventListener('click', e => {
        const btn = e.target.closest('[data-sort]');
        if (!btn) return;
        sortOrder = btn.dataset.sort;
        sortBar.querySelectorAll('[data-sort]').forEach(b => {
          b.className = b.dataset.sort === sortOrder ? 'btn btn-lime btn-sm' : 'btn btn-outline btn-sm';
        });
        renderMatches();
      });

      renderLockingSoon();
      renderMatches();
      renderPredTables();
      tickMatchLocks();
      const _lockTick = setInterval(tickMatchLocks, 10_000);
      window.addEventListener('pagehide', () => clearInterval(_lockTick), { once: true });
    }

    function wireMatchInputs(m, prefix) {
      const [id] = m;
      const key = getMatchKey(id);
      const hEl = document.getElementById(`${prefix}h_${id}`);
      const aEl = document.getElementById(`${prefix}a_${id}`);
      if (!hEl || !aEl) return;
      [hEl, aEl].forEach(el => {
        el.addEventListener('input', () => {
          saved[key] = { home: hEl.value, away: aEl.value };
          // Bidirectional sync: keep the other section's inputs in step
          const otherP = prefix ? '' : 'qs_';
          const oh = document.getElementById(`${otherP}h_${id}`);
          const oa = document.getElementById(`${otherP}a_${id}`);
          if (oh && oa) { oh.value = hEl.value; oa.value = aEl.value; }
          updateFilledCount();
          renderPredTables();
        });
      });
    }

    function renderLockingSoon() {
      const container = document.getElementById('lockingSoonSection');
      if (!container) return;
      const now = Date.now();
      const upcoming = GROUP_FIXTURES
        .filter(m => now < new Date(m[1] + 'T' + m[2] + ':00Z').getTime())
        .sort((a, b) => new Date(a[1] + 'T' + a[2] + ':00Z') - new Date(b[1] + 'T' + b[2] + ':00Z'))
        .slice(0, 5);
      if (!upcoming.length) {
        container.innerHTML = '';
        return;
      }
      const cards = upcoming.map(m => renderMatchCard(m, 'qs_')).join('');
      container.innerHTML = `
        <div class="locking-soon-hd">
          <span><i class="ti ti-flame" style="color:var(--lime-dark)"></i> Locking soon</span>
          <span class="locking-soon-tag">${upcoming.length} open &middot; soonest first</span>
        </div>
        <div class="matches-grid">${cards}</div>
      `;
      upcoming.forEach(m => wireMatchInputs(m, 'qs_'));
    }

    function renderMatches() {
      const content = document.getElementById('matchesContent');
      let html;

      if (sortOrder === 'kickoff') {
        let fixtures = [...GROUP_FIXTURES].sort((a, b) =>
          new Date(a[1] + 'T' + a[2] + ':00Z') - new Date(b[1] + 'T' + b[2] + ':00Z')
        );
        if (activeGroup !== 'ALL') fixtures = fixtures.filter(m => m[3] === activeGroup);
        const byDate = {};
        const dateOrder = [];
        fixtures.forEach(m => {
          if (!byDate[m[1]]) { byDate[m[1]] = []; dateOrder.push(m[1]); }
          byDate[m[1]].push(m);
        });
        html = dateOrder.map(date => {
          const cards = byDate[date].map(m => renderMatchCard(m)).join('');
          return `
            <div class="group-section">
              <div class="group-header"><i class="ti ti-calendar"></i> ${formatDate(date)}</div>
              <div class="matches-grid">${cards}</div>
            </div>
          `;
        }).join('');
      } else {
        const groups = activeGroup === 'ALL' ? 'ABCDEFGHIJKL'.split('') : [activeGroup];
        html = groups.map(g => {
          const matches = GROUP_FIXTURES.filter(m => m[3] === g);
          const cards = matches.map(m => renderMatchCard(m)).join('');
          return `
            <div class="group-section">
              <div class="group-header"><i class="ti ti-ball-football"></i> Group ${g}</div>
              <div class="matches-grid">${cards}</div>
            </div>
          `;
        }).join('');
      }

      content.innerHTML = html;
      GROUP_FIXTURES.forEach(m => wireMatchInputs(m, ''));
      updateFilledCount();
    }

    function matchLockPill(id, date, time) {
      const lockDate = new Date(date + 'T' + time + ':00Z');
      const diff = lockDate.getTime() - Date.now();
      if (diff <= 0) {
        return `<div class="lock-pill lock-pill--locked lock-pill--sm"><i class="ti ti-lock"></i><span>Locked</span></div>`;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const mn = Math.floor((diff % 3600000) / 60000);
      const cdStr = d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${mn}m` : `${mn}m`;
      const urgent = diff < 3600000;
      return `<div class="lock-pill lock-pill--open lock-pill--sm${urgent ? ' urgent' : ''}"><i class="ti ti-lock-open"></i><span class="match-lock-cd" data-lock="${lockDate.toISOString()}" data-match="${id}">${cdStr}</span></div>`;
    }

    function tickMatchLocks() {
      let needsLockingSoonRefresh = false;
      document.querySelectorAll('.match-lock-cd[data-lock]').forEach(el => {
        const diff = new Date(el.dataset.lock) - Date.now();
        const matchId = el.dataset.match;
        if (diff <= 0) {
          const pill = el.closest('.lock-pill');
          if (pill) {
            pill.className = 'lock-pill lock-pill--locked lock-pill--sm';
            pill.innerHTML = '<i class="ti ti-lock"></i><span>Locked</span>';
          }
          const card = document.getElementById(`card_${matchId}`);
          if (card && !card.classList.contains('locked')) {
            card.classList.add('locked');
            card.querySelectorAll('.score-num').forEach(inp => { inp.disabled = true; });
            if (!card.querySelector('.view-picks-btn')) {
              const vBtn = document.createElement('button');
              vBtn.className = 'view-picks-btn';
              vBtn.dataset.match = matchId;
              vBtn.innerHTML = '<i class="ti ti-eye"></i> See picks';
              card.appendChild(vBtn);
            }
          }
          if (document.getElementById(`qs_card_${matchId}`)) needsLockingSoonRefresh = true;
          return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const mn = Math.floor((diff % 3600000) / 60000);
        el.textContent = d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${mn}m` : `${mn}m`;
        el.closest('.lock-pill')?.classList.toggle('urgent', diff < 3600000);
      });
      if (needsLockingSoonRefresh) renderLockingSoon();
    }

    function renderMatchCard(m, idPrefix = '') {
      const [id, date, time, group, homeCode, awayCode] = m;
      const home = getTeam(homeCode);
      const away = getTeam(awayCode);
      const key = getMatchKey(id);
      const pred = saved[key] || {};
      const result = results[id];
      const hasResult = result && result.home_score !== null;
      const homeVal = pred.home !== undefined ? pred.home : '';
      const awayVal = pred.away !== undefined ? pred.away : '';

      const matchLocked = Date.now() >= new Date(date + 'T' + time + ':00Z').getTime();

      let resultHtml = '';
      let cardClass = pred.home !== undefined ? 'saved' : '';
      if (hasResult && homeVal !== '' && awayVal !== '') {
        const actH = result.home_score, actA = result.away_score;
        const pH = parseInt(homeVal), pA = parseInt(awayVal);
        if (!isNaN(pH) && !isNaN(pA)) {
          if (pH === actH && pA === actA) {
            cardClass = 'exact';
            resultHtml = `<div class="result-actual" style="color:var(--green)"><i class="ti ti-check"></i> Exact! Result: ${actH}–${actA} &middot; +7 pts</div>`;
          } else if (Math.sign(pH - pA) === Math.sign(actH - actA)) {
            cardClass = 'result';
            resultHtml = `<div class="result-actual" style="color:#5a6e00"><i class="ti ti-check"></i> Result! Score: ${actH}–${actA} &middot; +5 pts</div>`;
          } else {
            cardClass = 'wrong';
            resultHtml = `<div class="result-actual" style="color:var(--red)"><i class="ti ti-x"></i> Wrong. Result: ${actH}–${actA}</div>`;
          }
        }
      } else if (hasResult) {
        resultHtml = `<div class="result-actual">Result: ${result.home_score}–${result.away_score}</div>`;
      }

      return `
        <div class="score-card ${cardClass} ${matchLocked ? 'locked' : ''}" id="${idPrefix}card_${id}">
          <div class="score-card-header">
            <div><span class="match-id">Match ${id}</span><span class="match-date-time"> &middot; ${formatDate(date)}</span></div>
            ${matchLockPill(id, date, time)}
          </div>
          <div class="score-teams">
            <div class="score-team">
              ${teamFlagImg(homeCode)}
              <span class="score-team-name">${home.name}</span>
            </div>
            <div class="score-inputs">
              <input type="number" id="${idPrefix}h_${id}" class="score-num" min="0" max="20"
                inputmode="numeric" pattern="[0-9]*"
                value="${homeVal}" placeholder="0" ${matchLocked ? 'disabled' : ''}>
              <span class="score-sep">–</span>
              <input type="number" id="${idPrefix}a_${id}" class="score-num" min="0" max="20"
                inputmode="numeric" pattern="[0-9]*"
                value="${awayVal}" placeholder="0" ${matchLocked ? 'disabled' : ''}>
            </div>
            <div class="score-team away">
              ${teamFlagImg(awayCode)}
              <span class="score-team-name">${away.name}</span>
            </div>
          </div>
          ${resultHtml}
          ${matchLocked ? `<button class="view-picks-btn" data-match="${id}"><i class="ti ti-eye"></i> See picks</button>` : ''}
        </div>
      `;
    }

    function renderPredGroupCard(groupKey) {
      const rows = computePredGroup(groupKey, saved);
      const count = Math.round(rows.reduce((n, r) => n + r.P, 0) / 2);
      const total = GROUPS[groupKey].teams.length * 3;
      const chipLabel = count > 0 ? `${count} / ${total} predicted` : 'None predicted';
      const tbody = rows.map((s, i) => {
        const qualClass = i < 2 ? `qual-${i + 1}` : i === 2 ? 'qual-3' : '';
        const gdStr = s.GD > 0 ? `+${s.GD}` : `${s.GD}`;
        const gdClass = s.GD > 0 ? 'gd-pos' : s.GD < 0 ? 'gd-neg' : '';
        return `
          <tr class="${qualClass}">
            <td class="team-col">
              <div class="team-cell">
                <span class="team-rank">${i + 1}</span>
                ${teamFlagImg(s.code)}
                <span class="team-name-full">${getTeam(s.code).name}</span>
                <span class="team-name-abbr">${s.code}</span>
              </div>
            </td>
            <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
            <td class="col-gf">${s.GF}</td>
            <td class="col-ga">${s.GA}</td>
            <td class="col-gd ${gdClass}">${s.P > 0 ? gdStr : '—'}</td>
            <td class="pts-cell">${s.Pts}</td>
          </tr>`;
      }).join('');
      return `
        <div class="group-card">
          <div class="group-card-header">
            <span class="group-label">Group ${groupKey}</span>
            <span class="group-played-chip">${chipLabel}</span>
          </div>
          <table class="standings-table">
            <thead><tr>
              <th class="team-col">Team</th>
              <th title="Played">P</th><th title="Won">W</th><th title="Drawn">D</th><th title="Lost">L</th>
              <th class="col-gf" title="Goals For">GF</th>
              <th class="col-ga" title="Goals Against">GA</th>
              <th class="col-gd" title="Goal Difference">GD</th>
              <th title="Points">Pts</th>
            </tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>`;
    }

    function renderPredTables() {
      const container = document.getElementById('predTablesSection');
      if (!container) return;
      const grid = 'ABCDEFGHIJKL'.split('').map(g => renderPredGroupCard(g)).join('');
      container.innerHTML = `
        <div class="pred-tables-hd">
          <span><i class="ti ti-layout-grid"></i> My Predicted Tables</span>
          <span style="font-family:var(--font-sans);font-size:0.68rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--grey-400)">Live &middot; updates as you type</span>
        </div>
        <div class="pred-tables-grid">${grid}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-stripe" style="background:var(--lime-dark)"></div><span>Top 2 — advance to R32</span></div>
          <div class="legend-item"><div class="legend-stripe" style="background:#a3e635"></div><span>3rd place — may advance</span></div>
        </div>`;
    }

    function updateFilledCount() {
      let count = 0;
      GROUP_FIXTURES.forEach(m => {
        const pred = saved[getMatchKey(m[0])];
        if (pred && pred.home !== undefined && pred.home !== '' && pred.away !== undefined && pred.away !== '') count++;
      });
      const el = document.getElementById('filledCount');
      if (el) el.textContent = count;
    }

    async function savePredictions() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> Saving&hellip;';

      const updates = [];
      GROUP_FIXTURES.forEach(m => {
        const key = getMatchKey(m[0]);
        const pred = saved[key];
        if (!pred || pred.home === undefined || pred.home === '' || pred.away === undefined || pred.away === '') return;
        updates.push(DB.savePrediction(userId, 'round3', key, {
          home: parseInt(pred.home), away: parseInt(pred.away)
        }));
      });

      try {
        await Promise.all(updates);
        Toast.success(`Saved ${updates.length} score predictions!`);
      } catch (err) {
        Toast.error('Save failed: ' + err.message);
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save All';
    }

    async function openMatchModal(matchId) {
      const fixture = GROUP_FIXTURES.find(f => f[0] === matchId);
      if (!fixture) return;
      const [id, date, time, group, homeCode, awayCode] = fixture;
      const home = getTeam(homeCode);
      const away = getTeam(awayCode);
      const result = results[id];
      const hasResult = result && result.home_score !== null;
      const privateLeagues = leagues.filter(l => !l.is_global);

      const leagueBarHtml = privateLeagues.length ? `
        <div class="pred-modal-league-bar">
          <i class="ti ti-users-group"></i>
          <select id="modalLeaguePicker" class="form-control" style="min-width:160px;max-width:240px">
            <option value="global">All Players</option>
            ${privateLeagues.map(l =>
              `<option value="${l.id}" ${activePredLeague === l.id ? 'selected' : ''}>${l.name}</option>`
            ).join('')}
          </select>
        </div>
      ` : '';

      const modalEl = document.getElementById('pickModal');
      modalEl.innerHTML = `
        <div class="pred-modal-overlay" id="modalOverlay">
          <div class="pred-modal-panel" role="dialog" aria-modal="true">
            <div class="pred-modal-header">
              <div class="pred-modal-teams">
                ${teamFlagImg(homeCode)}
                <span>${home.name}</span>
                <span style="color:var(--grey-400);font-weight:400;font-size:0.8rem;margin:0 0.1rem">vs</span>
                <span>${away.name}</span>
                ${teamFlagImg(awayCode)}
              </div>
              <div class="pred-modal-meta">Group ${group} &middot; ${formatDate(date)}</div>
              ${hasResult ? `<div class="pred-modal-meta" style="color:var(--ink);font-weight:700;margin-top:0.2rem">Result: ${result.home_score}–${result.away_score}</div>` : ''}
              <button class="pred-modal-close" id="modalCloseBtn" aria-label="Close"><i class="ti ti-x"></i></button>
            </div>
            ${leagueBarHtml}
            <div id="modalBody" class="pred-modal-body">
              <div style="padding:2.5rem;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('modalOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });
      document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

      if (privateLeagues.length) {
        document.getElementById('modalLeaguePicker').addEventListener('change', e => {
          activePredLeague = e.target.value;
          loadModalBody(matchId, hasResult, result);
        });
      }

      await loadModalBody(matchId, hasResult, result);
    }

    async function loadModalBody(matchId, hasResult, result) {
      const bodyEl = document.getElementById('modalBody');
      if (!bodyEl) return;
      bodyEl.innerHTML = `<div style="padding:2.5rem;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>`;

      // Per-match kickoff enforcement — others' picks only visible after the match starts
      const fixture = GROUP_FIXTURES.find(f => f[0] === matchId);
      const kickoff = fixture ? new Date(`${fixture[1]}T${fixture[2]}:00Z`) : null;
      if (!kickoff || Date.now() < kickoff.getTime()) {
        const myPred = saved[`m${matchId}`];
        const myHtml = (myPred && myPred.home !== undefined)
          ? `<div class="player-pred-row is-you">
              <span class="player-pred-name" style="font-weight:600">You</span>
              <span class="player-pred-score">${myPred.home}–${myPred.away}</span>
            </div>`
          : `<div style="padding:1rem 1.25rem;color:var(--grey-400)">You haven't predicted this match yet.</div>`;
        bodyEl.innerHTML = myHtml +
          `<div style="padding:0.75rem 1.25rem;font-size:0.8rem;color:var(--grey-400);border-top:1px solid var(--grey-100);display:flex;align-items:center;gap:0.5rem">
            <i class="ti ti-lock"></i> Other predictions reveal at kick-off
          </div>`;
        return;
      }

      try {
        let memberIds = null;
        if (activePredLeague !== 'global') {
          if (!memberCache[activePredLeague]) {
            memberCache[activePredLeague] = await DB.getLeagueMemberIds(activePredLeague);
          }
          memberIds = memberCache[activePredLeague];
        }

        const preds = await DB.getMatchPredictions(matchId, { userIds: memberIds, currentUserId: userId, isLocked: true });
        const predMap = {};
        preds.forEach(p => { predMap[p.user_id] = p; });

        let rows;
        if (memberIds) {
          // Private league: show every member, including those who didn't predict
          const missing = memberIds.filter(id => !predMap[id] && !profileCache[id]);
          if (missing.length) {
            const profiles = await DB.getProfiles(missing);
            profiles.forEach(p => { profileCache[p.id] = p; });
          }
          rows = memberIds.map(uid => {
            const pred = predMap[uid];
            return {
              uid,
              profile: pred ? pred.profiles : (profileCache[uid] || { display_name: 'Player', avatar_color: '#c8f135' }),
              value: pred ? pred.value : null
            };
          });
        } else {
          // Global: only show players who submitted a prediction
          rows = preds.map(p => ({ uid: p.user_id, profile: p.profiles, value: p.value }));
        }

        // Current user first, then alphabetical
        rows.sort((a, b) => {
          if (a.uid === userId) return -1;
          if (b.uid === userId) return 1;
          return (a.profile?.display_name || '').localeCompare(b.profile?.display_name || '');
        });

        if (!rows.length) {
          bodyEl.innerHTML = `
            <div style="padding:2.5rem 1.25rem;text-align:center">
              <i class="ti ti-user-x" style="font-size:2rem;color:var(--grey-300);display:block;margin-bottom:0.75rem"></i>
              <p style="font-weight:600;color:var(--grey-500)">No predictions for this match yet.</p>
            </div>
          `;
          return;
        }

        bodyEl.innerHTML = rows.map(row => {
          const isYou = row.uid === userId;
          let scoreHtml = `<span class="player-pred-score no-pred">—</span>`;
          let chipHtml = '';

          if (row.value !== null) {
            let val;
            try { val = JSON.parse(row.value); } catch {}
            if (val && val.home !== undefined && val.away !== undefined) {
              scoreHtml = `<span class="player-pred-score">${val.home}–${val.away}</span>`;
              if (hasResult) {
                const actH = result.home_score, actA = result.away_score;
                const pH = parseInt(val.home), pA = parseInt(val.away);
                if (pH === actH && pA === actA) {
                  chipHtml = `<span class="pred-chip exact">Exact</span>`;
                } else if (Math.sign(pH - pA) === Math.sign(actH - actA)) {
                  chipHtml = `<span class="pred-chip result">Result</span>`;
                } else {
                  chipHtml = `<span class="pred-chip wrong">Wrong</span>`;
                }
              }
            }
          }

          return `
            <div class="player-pred-row ${isYou ? 'is-you' : ''}">
              ${renderAvatar(row.profile, 'avatar', 'width:30px;height:30px;font-size:0.78rem')}
              <span class="player-pred-name">${row.profile?.display_name || 'Player'}${isYou ? ' <span class="you-badge">You</span>' : ''}</span>
              ${scoreHtml}
              ${chipHtml}
            </div>
          `;
        }).join('');

      } catch (err) {
        const bodyEl2 = document.getElementById('modalBody');
        if (bodyEl2) bodyEl2.innerHTML = `<div class="alert alert-error" style="margin:1rem"><i class="ti ti-alert-triangle"></i> ${err.message}</div>`;
      }
    }

    function closeModal() {
      const el = document.getElementById('pickModal');
      if (el) el.innerHTML = '';
    }

    document.getElementById('matchesContent').addEventListener('click', e => {
      const btn = e.target.closest('.view-picks-btn');
      if (!btn) return;
      openMatchModal(parseInt(btn.dataset.match));
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    document.getElementById('saveBtn')?.addEventListener('click', savePredictions);
    DB.subscribeToMatchResults(() => load());
    load();
  </script>

  <div id="pickModal"></div>
</body>
</html>
