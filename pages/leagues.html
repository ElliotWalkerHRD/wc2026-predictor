<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>WC2026 — Leagues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=50">
  <style>
    .leagues-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .league-row {
      background: var(--white);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-lg);
      padding: 1.125rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
      flex-wrap: wrap;
    }

    .league-row.is-global {
      border-color: var(--lime-dark);
      background: rgba(200,241,53,0.04);
    }

    .league-info { flex: 1; min-width: 0; }

    .league-name {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .league-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: var(--grey-500);
    }

    .league-code {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: monospace;
      font-size: 0.82rem;
      background: var(--grey-100);
      border: 1px solid var(--grey-300);
      border-radius: var(--radius-sm);
      padding: 0.15rem 0.5rem;
      color: var(--ink);
    }

    .league-code button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--grey-400);
      font-size: 0.85rem;
      line-height: 1;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .league-code button:hover { color: var(--ink); }

    .league-actions { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 640px) {
      .actions-grid { grid-template-columns: 1fr 1fr; }
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .empty-leagues {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--grey-400);
      background: var(--white);
      border: 1px dashed var(--grey-300);
      border-radius: var(--radius-lg);
      font-size: 0.9rem;
    }

    .new-league-result {
      background: rgba(200,241,53,0.08);
      border: 1px solid var(--lime-dark);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-top: 1rem;
    }

    .new-league-code {
      font-family: var(--font-serif);
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
  <style>
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #f9f9f8;
      color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .placeholder-card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      padding: 2.75rem 2.25rem;
      text-align: center;
    }
    .placeholder-icon { font-size: 2.5rem; color: #e8b923; margin-bottom: 1rem; }
    .placeholder-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .placeholder-card p { color: #6b7280; font-size: 0.92rem; line-height: 1.6; margin: 0 0 1.5rem; }
    .placeholder-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d0d0d;
      color: #c8f135;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
    }
  </style>
  <div class="placeholder-card">
    <div class="placeholder-icon"><i class="ti ti-trophy"></i></div>
    <h1>Tournament complete</h1>
    <p>The WC2026 Prediction Game has finished and this page is no longer active. Final results are on the home page.</p>
    <a href="../index.html"><i class="ti ti-arrow-left"></i> Back to results</a>
  </div>
</body>
</html>
