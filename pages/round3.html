<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Round 3: Group Stage Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css?v=3">
  <style>
    .score-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .score-team {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex: 1;
      min-width: 0;
    }
    .score-team.away { flex-direction: row-reverse; text-align: right; }
    .score-team-flag { font-size: 1.3rem; flex-shrink: 0; }
    .score-team-name { flex: 1; min-width: 0; font-size: 0.8rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .score-inputs {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      justify-content: center;
      flex-shrink: 0;
    }
    .score-num {
      width: 46px;
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      padding: 0.3rem;
      border: 1.5px solid var(--grey-300);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .score-num:focus { border-color: var(--ink); }
    .score-num:disabled { background: var(--grey-100); color: var(--grey-400); }
    .score-sep { font-size: 1.2rem; color: var(--grey-400); }
    .result-actual {
      text-align: center;
      font-size: 0.72rem;
      color: var(--grey-500);
      margin-top: 0.4rem;
      font-weight: 500;
    }
    .score-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.625rem;
    }
    .match-id { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--grey-400); }
    .match-date-time { font-size: 0.7rem; color: var(--grey-400); }
    .group-header {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid var(--grey-300);
      margin-bottom: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .matches-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    /* min-width:0 lets score-card respect its 1fr track and not bleed beyond it */
    .matches-grid .score-card { min-width: 0; }
    @media (min-width: 560px) { .matches-grid { grid-template-columns: repeat(2,1fr); } }
    @media (min-width: 1024px) { .matches-grid { grid-template-columns: repeat(3,1fr); } }

    /* Per-match lock pills — compact variant */
    @keyframes lockPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(200,241,53,0.55); }
      50%       { opacity: 0.82; box-shadow: 0 0 0 5px rgba(200,241,53,0); }
    }
    .lock-pill--sm { padding: 0.18rem 0.5rem 0.18rem 0.35rem; font-size: 0.68rem; gap: 0.28rem; margin: 0; flex-shrink: 0; }
    .lock-pill--sm > i { font-size: 0.8rem; }
    .lock-pill--open { background: rgba(200,241,53,0.18); color: #5c7000; border: 1px solid rgba(200,241,53,0.45); }
    .lock-pill--locked { background: var(--grey-100); color: var(--grey-500); border: 1px solid var(--grey-200); }
    .lock-pill--open.urgent { animation: lockPulse 1.8s ease-in-out infinite; }
    .lock-pill { display: inline-flex; align-items: center; gap: 0.55rem; border-radius: 9999px; font-weight: 600; line-height: 1.3; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-banner">
    <div class="container">
      <nav class="breadcrumb">WC2026 &rsaquo; <a href="predictions.html">Predictions</a> &rsaquo; <span>Round 3</span></nav>
      <h1 class="page-title">Group Stage Scores</h1>
      <p class="page-desc">Predict exact scores for all 72 matches &middot; 7pts exact &middot; 5pts correct result</p>
    </div>
  </div>

  <main class="main-content" style="padding-top:0">
    <div class="container" style="padding-top:2rem;padding-bottom:6rem">

      <div id="lockedBanner" class="alert alert-info hidden mb-3">
        <i class="ti ti-lock"></i> Round locked. Showing your submitted predictions.
      </div>

      <div class="filter-bar" id="filterBar">
        <span class="filter-label">Group:</span>
        <button class="btn btn-lime btn-sm" data-group="ALL">All</button>
      </div>

      <div id="matchesContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>

      <div class="sticky-dock" id="stickySave" style="display:none">
        <div class="sticky-dock-inner">
          <div class="dock-status" id="progressText">
            Filled <strong id="filledCount">0</strong> / 72 predictions
          </div>
          <div class="dock-actions">
            <a href="predictions.html" class="btn btn-ghost btn-sm"><i class="ti ti-arrow-left"></i> Back</a>
            <button class="btn btn-lime" id="saveBtn"><i class="ti ti-device-floppy"></i> Save All</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=3"></script>
  <script src="../js/data.js?v=3"></script>
  <script src="../js/supabase-client.js?v=3"></script>
  <script src="../js/scoring.js?v=3"></script>
  <script src="../js/ui.js?v=3"></script>
  <script>
    DB.initSupabase();
    Nav.render('predictions');

    let userId = null;
    let saved = {};
    let results = {};
    let locked = false;
    let activeGroup = 'ALL';

    function getMatchKey(id) { return `m${id}`; }

    async function load() {
      const session = await requireAuthFromPages();
      if (!session) return;
      userId = session.user.id;

      locked = DB.isRoundLocked('round3');
      if (locked) document.getElementById('lockedBanner').classList.remove('hidden');
      else document.getElementById('stickySave').style.display = 'block';

      const [preds, matchResults] = await Promise.all([
        DB.getUserPredictions(userId, 'round3').catch(() => []),
        DB.getMatchResults().catch(() => [])
      ]);

      preds.forEach(p => {
        try { saved[p.question_key] = JSON.parse(p.value); }
        catch { saved[p.question_key] = p.value; }
      });

      matchResults.forEach(r => { results[r.match_id] = r; });

      const filterBar = document.getElementById('filterBar');
      filterBar.innerHTML = `
        <span class="filter-label">Group:</span>
        <button class="btn btn-lime btn-sm" data-group="ALL">All</button>
        ${'ABCDEFGHIJKL'.split('').map(g =>
          `<button class="btn btn-outline btn-sm" data-group="${g}">Grp ${g}</button>`
        ).join('')}
      `;

      filterBar.addEventListener('click', e => {
        const btn = e.target.closest('[data-group]');
        if (!btn) return;
        activeGroup = btn.dataset.group;
        filterBar.querySelectorAll('button').forEach(b => {
          b.className = b.dataset.group === activeGroup
            ? 'btn btn-lime btn-sm'
            : 'btn btn-outline btn-sm';
        });
        renderMatches();
      });

      renderMatches();
      tickMatchLocks();
      const _lockTick = setInterval(tickMatchLocks, 10_000);
      window.addEventListener('pagehide', () => clearInterval(_lockTick), { once: true });
    }

    function renderMatches() {
      const groups = activeGroup === 'ALL' ? 'ABCDEFGHIJKL'.split('') : [activeGroup];
      const content = document.getElementById('matchesContent');
      content.innerHTML = groups.map(g => {
        const matches = GROUP_FIXTURES.filter(m => m[3] === g);
        const cards = matches.map(m => renderMatchCard(m)).join('');
        return `
          <div class="group-section">
            <div class="group-header"><i class="ti ti-ball-football"></i> Group ${g}</div>
            <div class="matches-grid">${cards}</div>
          </div>
        `;
      }).join('');

      GROUP_FIXTURES.forEach(m => {
        const hEl = document.getElementById(`h_${m[0]}`);
        const aEl = document.getElementById(`a_${m[0]}`);
        if (!hEl || !aEl) return;
        [hEl, aEl].forEach(el => {
          el.addEventListener('input', updateFilledCount);
          el.addEventListener('change', () => {
            saved[getMatchKey(m[0])] = { home: hEl.value, away: aEl.value };
          });
        });
      });

      updateFilledCount();
    }

    function matchLockPill(id, date, time) {
      const lockDate = new Date(date + 'T' + time + ':00Z');
      const diff = lockDate.getTime() - Date.now();
      if (diff <= 0) {
        return `<div class="lock-pill lock-pill--locked lock-pill--sm"><i class="ti ti-lock"></i><span>Locked</span></div>`;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const mn = Math.floor((diff % 3600000) / 60000);
      const cdStr = d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${mn}m` : `${mn}m`;
      const urgent = diff < 3600000;
      return `<div class="lock-pill lock-pill--open lock-pill--sm${urgent ? ' urgent' : ''}"><i class="ti ti-lock-open"></i><span class="match-lock-cd" data-lock="${lockDate.toISOString()}" data-match="${id}">${cdStr}</span></div>`;
    }

    function tickMatchLocks() {
      document.querySelectorAll('.match-lock-cd[data-lock]').forEach(el => {
        const diff = new Date(el.dataset.lock) - Date.now();
        const matchId = el.dataset.match;
        if (diff <= 0) {
          const pill = el.closest('.lock-pill');
          if (pill) {
            pill.className = 'lock-pill lock-pill--locked lock-pill--sm';
            pill.innerHTML = '<i class="ti ti-lock"></i><span>Locked</span>';
          }
          const card = document.getElementById(`card_${matchId}`);
          if (card && !card.classList.contains('locked')) {
            card.classList.add('locked');
            card.querySelectorAll('.score-num').forEach(inp => { inp.disabled = true; });
          }
          return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const mn = Math.floor((diff % 3600000) / 60000);
        el.textContent = d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${mn}m` : `${mn}m`;
        el.closest('.lock-pill')?.classList.toggle('urgent', diff < 3600000);
      });
    }

    function renderMatchCard(m) {
      const [id, date, time, group, homeCode, awayCode] = m;
      const home = getTeam(homeCode);
      const away = getTeam(awayCode);
      const key = getMatchKey(id);
      const pred = saved[key] || {};
      const result = results[id];
      const hasResult = result && result.home_score !== null;
      const homeVal = pred.home !== undefined ? pred.home : '';
      const awayVal = pred.away !== undefined ? pred.away : '';

      const matchLocked = Date.now() >= new Date(date + 'T' + time + ':00Z').getTime();

      let resultHtml = '';
      let cardClass = pred.home !== undefined ? 'saved' : '';
      if (hasResult && homeVal !== '' && awayVal !== '') {
        const actH = result.home_score, actA = result.away_score;
        const pH = parseInt(homeVal), pA = parseInt(awayVal);
        if (!isNaN(pH) && !isNaN(pA)) {
          if (pH === actH && pA === actA) {
            cardClass = 'exact';
            resultHtml = `<div class="result-actual" style="color:var(--green)"><i class="ti ti-check"></i> Exact! Result: ${actH}–${actA} &middot; +7 pts</div>`;
          } else if (Math.sign(pH - pA) === Math.sign(actH - actA)) {
            cardClass = 'result';
            resultHtml = `<div class="result-actual" style="color:#5a6e00"><i class="ti ti-check"></i> Result! Score: ${actH}–${actA} &middot; +5 pts</div>`;
          } else {
            cardClass = 'wrong';
            resultHtml = `<div class="result-actual" style="color:var(--red)"><i class="ti ti-x"></i> Wrong. Result: ${actH}–${actA}</div>`;
          }
        }
      } else if (hasResult) {
        resultHtml = `<div class="result-actual">Result: ${result.home_score}–${result.away_score}</div>`;
      }

      return `
        <div class="score-card ${cardClass} ${matchLocked ? 'locked' : ''}" id="card_${id}">
          <div class="score-card-header">
            <div><span class="match-id">Match ${id}</span><span class="match-date-time"> &middot; ${formatDate(date)}</span></div>
            ${matchLockPill(id, date, time)}
          </div>
          <div class="score-teams">
            <div class="score-team">
              ${teamFlagImg(homeCode)}
              <span class="score-team-name">${home.name}</span>
            </div>
            <div class="score-inputs">
              <input type="number" id="h_${id}" class="score-num" min="0" max="20"
                value="${homeVal}" placeholder="0" ${matchLocked ? 'disabled' : ''}>
              <span class="score-sep">–</span>
              <input type="number" id="a_${id}" class="score-num" min="0" max="20"
                value="${awayVal}" placeholder="0" ${matchLocked ? 'disabled' : ''}>
            </div>
            <div class="score-team away">
              ${teamFlagImg(awayCode)}
              <span class="score-team-name">${away.name}</span>
            </div>
          </div>
          ${resultHtml}
        </div>
      `;
    }

    function updateFilledCount() {
      let count = 0;
      GROUP_FIXTURES.forEach(m => {
        const hEl = document.getElementById(`h_${m[0]}`);
        const aEl = document.getElementById(`a_${m[0]}`);
        if (hEl && aEl && hEl.value !== '' && aEl.value !== '') count++;
      });
      const el = document.getElementById('filledCount');
      if (el) el.textContent = count;
    }

    async function savePredictions() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> Saving&hellip;';

      const updates = [];
      GROUP_FIXTURES.forEach(m => {
        const hEl = document.getElementById(`h_${m[0]}`);
        const aEl = document.getElementById(`a_${m[0]}`);
        if (!hEl || !aEl || hEl.value === '' || aEl.value === '') return;
        updates.push(DB.savePrediction(userId, 'round3', getMatchKey(m[0]), {
          home: parseInt(hEl.value), away: parseInt(aEl.value)
        }));
      });

      try {
        await Promise.all(updates);
        Toast.success(`Saved ${updates.length} score predictions!`);
      } catch (err) {
        Toast.error('Save failed: ' + err.message);
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save All';
    }

    document.getElementById('saveBtn')?.addEventListener('click', savePredictions);
    DB.subscribeToMatchResults(() => load());
    load();
  </script>
</body>
</html>
